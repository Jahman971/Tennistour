<html lang="fr">

<style>
:root{
  --bg:#0C0C0C; --s1:#141414; --s2:#1C1C1C; --s3:#242424; --brd:#2E2E2E;
  --accent:#D7E552; --accent2:rgba(215,229,82,.15); --accent3:rgba(215,229,82,.08);
  --live:#C1573A; --live2:rgba(193,87,58,.15);
  --court:#2E7D5B; --gold:#D97706;
  --white:#FFF; --light:#CCC; --gray:#777; --dim:#444;
  --fnt-head:'Barlow Condensed',sans-serif; --fnt-body:'Inter',sans-serif;
  --r:10px; --rL:14px; --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--fnt-body);
  background:var(--bg);
  color:var(--white);
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
h1,h2,h3,.score-num,.tab-bar .label,.brand{font-family:var(--fnt-head); letter-spacing:.02em;}
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* Top bar */
.topbar{
  background:var(--s1); color:var(--white);
  padding:14px 16px 10px; padding-top:calc(14px + env(safe-area-inset-top,0px));
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:20; border-bottom:1px solid var(--brd);
}
.topbar .brand{font-size:20px; font-weight:900; text-transform:uppercase; letter-spacing:3px; display:flex; align-items:center; gap:8px; color:var(--accent);}
.topbar .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent); box-shadow:0 0 8px var(--accent);}
.topbar .who{font-family:var(--fnt-head); font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:2px; font-weight:700; cursor:pointer; border:1px solid var(--brd); padding:6px 12px; border-radius:999px; background:var(--s2);}

main{flex:1; padding:16px 16px 90px;}

/* Cards / generic */
.card{background:var(--s2); border:1px solid var(--brd); border-radius:var(--rL); padding:14px; margin-bottom:12px;}
.card h3{margin:0 0 10px; font-size:16px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--white);}
.muted{color:var(--gray); font-size:13px;}
.row{display:flex; gap:8px; align-items:center;}
.row.between{justify-content:space-between;}
.pill{display:inline-block; font-size:9px; text-transform:uppercase; letter-spacing:1.5px; padding:3px 9px; border-radius:999px; font-weight:700; font-family:var(--fnt-head);}
.pill.live{background:var(--live2); color:var(--live); border:1px solid rgba(193,87,58,.4);}
.pill.upcoming{background:var(--s3); color:var(--gray); border:1px solid var(--brd);}
.pill.done{background:rgba(46,125,91,.15); color:var(--court); border:1px solid rgba(46,125,91,.35);}

/* Forms */
label{display:block; font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--gray); margin:14px 0 6px; font-weight:700;}
input,select{
  width:100%; padding:12px; border:1px solid var(--brd); border-radius:var(--r);
  font-size:15px; font-family:inherit; background:var(--s3); color:var(--white);
}
input::placeholder{color:var(--dim);}
input:focus,select:focus{outline:none; border-color:var(--accent);}
.btn{
  display:block; width:100%;
  border:none; border-radius:var(--r); padding:14px; font-size:15px; font-weight:700;
  font-family:var(--fnt-head); text-transform:uppercase; letter-spacing:2px;
  cursor:pointer; background:var(--accent); color:#0C0C0C; margin-top:14px; text-align:center;
  transition:transform .1s;
}
.btn:active{transform:scale(.98);}
.btn.secondary{background:var(--s3); color:var(--light); border:1px solid var(--brd);}
.btn.clay{background:var(--live); color:var(--white);}
.btn.ghost{background:none; color:var(--accent); text-transform:none; letter-spacing:0; font-family:var(--fnt-body); font-weight:600; padding:8px; border:1px solid rgba(215,229,82,.3); border-radius:var(--r); width:auto; margin-top:0;}
.btn.small{width:auto; padding:10px 16px; font-size:12px; margin-top:0;}
.error{color:var(--live); font-size:13px; margin-top:8px;}
.tabs{display:flex; gap:6px; margin-bottom:16px;}
.tabs button{flex:1; padding:10px; border-radius:var(--r); border:1px solid var(--brd); background:var(--s2); color:var(--light); font-family:var(--fnt-head); text-transform:uppercase; letter-spacing:1.5px; font-size:13px; font-weight:700; cursor:pointer;}
.tabs button.active{background:var(--accent); color:#0C0C0C; border-color:var(--accent);}

/* Bottom nav */
.tab-bar{
  position:fixed; bottom:0; left:0; right:0; max-width:560px; margin:0 auto;
  background:var(--s1); display:flex; padding:8px env(safe-area-inset-bottom) calc(8px + env(safe-area-inset-bottom));
  border-top:1px solid var(--brd);
}
.tab-bar button{
  flex:1; background:none; border:none; color:var(--gray); padding:8px 0;
  display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer;
}
.tab-bar button.active{color:var(--accent);}
.tab-bar .label{font-size:10px; text-transform:uppercase; letter-spacing:1.5px; font-weight:700;}

/* Scoreboard (signature element) */
.board{
  background:linear-gradient(135deg,#161616 0%,#0F0F0F 100%);
  color:var(--white); border:1px solid var(--brd); border-radius:var(--rL);
  padding:16px; margin-bottom:14px; overflow:hidden; position:relative;
}
.board .tour-name{font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--accent); margin-bottom:10px; font-weight:700;}
.board .player-row{
  display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center;
  padding:10px 0; border-bottom:1px solid var(--brd);
}
.board .player-row:last-of-type{border-bottom:none;}
.board .player-name{font-size:16px; font-weight:600; font-family:var(--fnt-head); letter-spacing:.5px;}
.board .sets{display:flex; gap:8px;}
.board .set-score{
  font-family:var(--fnt-head); font-size:20px; font-weight:700; min-width:28px; text-align:center;
  background:var(--s3); border-radius:6px; padding:4px 0; border:1px solid var(--brd);
}
.board .set-score.current{background:var(--accent); color:#0C0C0C; border-color:var(--accent);}
.board .tb-note{font-size:10px; vertical-align:super; opacity:.7;}
.board .live-tag{
  position:absolute; top:14px; right:16px; background:var(--live2); color:var(--live);
  border:1px solid rgba(193,87,58,.4);
  font-size:9px; font-family:var(--fnt-head); font-weight:700; text-transform:uppercase; letter-spacing:2px; padding:4px 10px; border-radius:999px;
  display:flex; align-items:center; gap:6px;
}
.board .live-tag .blink{width:6px;height:6px;border-radius:50%;background:var(--live);animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.board .tiebreak-banner{
  margin-top:12px; background:var(--accent3); border:1px solid rgba(215,229,82,.3); border-radius:var(--r); padding:10px 14px;
  display:flex; justify-content:space-between; align-items:center;
}
.board .tiebreak-banner .tb-points{font-family:var(--fnt-head); font-size:24px; font-weight:900; color:var(--accent);}
.board .tiebreak-banner .tb-label{font-size:10px; text-transform:uppercase; letter-spacing:1.5px; align-self:center; color:var(--light); font-weight:700;}

/* Coach scoring controls */
.point-display{
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; text-align:center;
}
.point-display .pt{
  background:var(--s2); border:1px solid var(--brd); border-radius:var(--r); padding:12px 0;
}
.point-display .pt .val{font-family:var(--fnt-head); font-size:38px; font-weight:900; line-height:1; color:var(--accent);}
.point-display .pt .name{font-size:11px; color:var(--gray); margin-top:4px; text-transform:uppercase; letter-spacing:1.5px; font-weight:700;}
.score-btns{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.score-btns .btn{margin-top:0; padding:20px 10px; font-size:14px;}
.code-badge{
  display:inline-flex; align-items:center; gap:8px; background:var(--s3); border:1px dashed var(--accent);
  border-radius:var(--r); padding:8px 12px; font-family:var(--fnt-head); font-size:18px; font-weight:700; letter-spacing:3px; margin-top:6px; color:var(--accent);
}
.empty{text-align:center; color:var(--gray); padding:40px 10px; font-size:14px;}
.empty .big{font-family:var(--fnt-head); font-size:40px; color:var(--brd); margin-bottom:10px;}
a.link{color:var(--accent); font-weight:600; text-decoration:none;}

</style>

<script type="module">

function showFatalError(err){
  console.error(err);
  app.innerHTML = `

// ---------------------------------------------------------------
// HELPERS
// ---------------------------------------------------------------
const esc = s => (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const genCode = () => Array.from({length:5}, () => 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]).join('');
function navigate(hash){ location.hash = hash; }
function toast(msg, isError){
  let t = document.querySelector('.toast');
  if(!t){ t = document.createElement('div'); t.className='toast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A2421;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;z-index:99;max-width:90%;text-align:center;';
    document.body.appendChild(t);
  }
  t.style.background = isError ? '#C1573A' : '#1A2421';
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(t._tm); t._tm = setTimeout(()=>{ t.style.opacity='0'; }, 2400);
}

// ---------------------------------------------------------------
// MOTEUR DE SCORE TENNIS (paramétrable selon le format du tournoi)
// ---------------------------------------------------------------
function initLiveState(format){
  return {
    format,
    sets: [],            // [{games:[g1,g2], tb:[t1,t2]|null, superTb:bool}]
    games: [0,0],
    points: [0,0],
    inTiebreak: false,
    inSuperTb: false,
    finished: false,
    winner: null
  };
}
function setWinner(s){
  if(s.superTb) return s.tb[0] > s.tb[1] ? 0 : 1;
  return s.games[0] > s.games[1] ? 0 : 1;
}
function setsWon(state){
  const w=[0,0];
  state.sets.forEach(s => w[setWinner(s)]++);
  return w;
}
function afterSetPush(state){
  const f = state.format;
  const sw = setsWon(state);
  if(sw[0] >= f.nb_sets_gagnants || sw[1] >= f.nb_sets_gagnants){
    state.finished = true;
    state.winner = sw[0] > sw[1] ? 0 : 1;
    return;
  }
  if(sw[0] === f.nb_sets_gagnants - 1 && sw[1] === f.nb_sets_gagnants - 1 && f.super_tb_set_final){
    state.inSuperTb = true; // le set décisif se joue directement en super tie-break
  }
}
function addPoint(state, p){
  if(state.finished) return state;
  const o = p===0?1:0, f = state.format;

  if(state.inTiebreak || state.inSuperTb){
    state.points[p]++;
    const target = state.inSuperTb ? f.points_super_tb : 7;
    if(state.points[p] >= target && (state.points[p]-state.points[o]) >= 2){
      const gset=[...state.games]; gset[p]++;
      state.sets.push({games:gset, tb:[...state.points], superTb: state.inSuperTb});
      state.games=[0,0]; state.points=[0,0];
      state.inTiebreak=false; state.inSuperTb=false;
      afterSetPush(state);
    }
    return state;
  }

  state.points[p]++;
  const a=state.points[p], b=state.points[o];
  let gameWon=false;
  if(f.no_ad){ if(a>=4 && a>b) gameWon=true; }
  else { if(a>=4 && (a-b)>=2) gameWon=true; }

  if(gameWon){
    state.games[p]++;
    state.points=[0,0];
    const g=state.games;
    if(g[p] >= f.jeux_par_set && (g[p]-g[o]) >= 2){
      state.sets.push({games:[...g], tb:null, superTb:false});
      state.games=[0,0];
      afterSetPush(state);
    } else if(g[0]===f.seuil_tiebreak && g[1]===f.seuil_tiebreak){
      state.inTiebreak = true;
    }
  }
  return state;
}
function removePoint(state, p){
  // Annulation simple : retire 1 point au dernier joueur marqué (pas de retour en arrière sur un set déjà clos)
  const o = p===0?1:0;
  if(state.inTiebreak || state.inSuperTb){
    if(state.points[p] > 0) state.points[p]--;
  } else if(state.points[p] > 0){
    state.points[p]--;
  } else if(state.games[p] > 0){
    state.games[p]--;
  }
  return state;
}
function pointLabel(state){
  if(state.inTiebreak || state.inSuperTb) return [String(state.points[0]), String(state.points[1])];
  const labels=['0','15','30','40'];
  const a=state.points[0], b=state.points[1];
  if(a>=3 && b>=3){
    if(a===b) return ['40','40'];
    return a>b ? ['Av','40'] : ['40','Av'];
  }
  return [labels[a]||'0', labels[b]||'0'];
}

// ---------------------------------------------------------------
// SCOREBOARD HTML (réutilisé côté coach et côté spectateur)
// ---------------------------------------------------------------
function scoreboardHTML(m, p1Name, p2Name, opts={}){
  const st = m.live_state && m.live_state.format ? m.live_state : null;
  const sets = st ? st.sets : [];
  const curGames = st ? st.games : [0,0];
  const tbActive = st && (st.inTiebreak || st.inSuperTb);
  const isLive = m.statut === 'en_cours';
  const isDone = m.statut === 'termine';

  let setsHtml = '';
  const renderSetCell = (idx, val, superTb, tb) => {
    let extra='';
    if(tb !== null && tb !== undefined) extra = `<span class="tb-note">${tb}</span>`;
    return `<div class="set-score">${val}${extra}</div>`;
  };

  // colonnes : sets terminés + set courant (si pas fini et pas en super TB pur)
  const colsP1=[], colsP2=[];
  sets.forEach(s=>{
    colsP1.push(renderSetCell(0, s.games[0], s.superTb, s.tb ? s.tb[0] : null));
    colsP2.push(renderSetCell(0, s.games[1], s.superTb, s.tb ? s.tb[1] : null));
  });
  if(st && !st.finished && !st.inSuperTb){
    colsP1.push(`<div class="set-score current">${curGames[0]}</div>`);
    colsP2.push(`<div class="set-score current">${curGames[1]}</div>`);
  }

  const tieHtml = (st && tbActive) ? `
    <div class="tiebreak-banner">
      <span class="tb-label">${st.inSuperTb ? 'Super tie-break' : 'Jeu décisif'}</span>
      <span class="tb-points">${st.points[0]} – ${st.points[1]}</span>
    </div>` : '';

  let liveTag = '';
  if(isLive) liveTag = `<div class="live-tag"><span class="blink"></span> Live</div>`;
  else if(isDone) liveTag = `<div class="live-tag" style="background:var(--court-2)">Terminé</div>`;
  else liveTag = `<div class="live-tag" style="background:var(--grey)">À venir</div>`;

  return `
  <div class="board">
    ${liveTag}
    <div class="tour-name">${esc(m.tour || 'Match')}${m.court ? ' · '+esc(m.court) : ''}</div>
    <div class="player-row">
      <div class="player-name">${esc(p1Name)}${(st && st.finished && st.winner===0) ? ' 🏆' : ''}</div>
      <div class="sets">${colsP1.join('') || '<span class="muted">—</span>'}</div>
    </div>
    <div class="player-row">
      <div class="player-name">${esc(p2Name)}${(st && st.finished && st.winner===1) ? ' 🏆' : ''}</div>
      <div class="sets">${colsP2.join('') || '<span class="muted">—</span>'}</div>
    </div>
    ${tieHtml}
  </div>`;
}

// ---------------------------------------------------------------
// VUE : AUTH
// ---------------------------------------------------------------
let authMode = 'login';
function viewAuth(){
  app.innerHTML = `
    <div class="topbar"><div class="brand"><span class="dot"></span> Set Point</div></div>
    <main>
      <div class="card">
        <h3>${authMode==='login' ? 'Connexion' : 'Créer un compte'}</h3>
        <p class="muted">Suivi en direct des tournois — coachs, parents &amp; joueurs.</p>
        <div class="tabs">
          <button class="${authMode==='login'?'active':''}" onclick="setAuthMode('login')">Connexion</button>
          <button class="${authMode==='signup'?'active':''}" onclick="setAuthMode('signup')">Inscription</button>
        </div>
        <form id="authForm">
          ${authMode==='signup' ? `
            <label>Nom / prénom</label>
            <input name="nom" required placeholder="Ex: Jimmy Martin">
            <label>Je suis…</label>
            <select name="role" required>
              <option value="coach">Coach</option>
              <option value="parent">Parent</option>
              <option value="enfant">Joueur / enfant</option>
            </select>
          ` : ''}
          <label>Email</label>
          <input type="email" name="email" required placeholder="email@exemple.com">
          <label>Mot de passe</label>
          <input type="password" name="password" required minlength="6" placeholder="6 caractères min.">
          <button class="btn clay" type="submit">${authMode==='login' ? 'Se connecter' : "S'inscrire"}</button>
          <div class="error" id="authError"></div>
        </form>
      </div>
    </main>`;
  document.getElementById('authForm').addEventListener('submit', onAuthSubmit);
}
window.setAuthMode = m => { authMode = m; viewAuth(); };
async function onAuthSubmit(e){
  e.preventDefault();
  const f = new FormData(e.target);
  const email = f.get('email'), password = f.get('password');
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  try{
    if(authMode==='login'){
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if(error) throw error;
    } else {
      const { data, error } = await supabase.auth.signUp({ email, password });
      if(error) throw error;
      if(!data.session){
        errEl.style.color = 'var(--ok)';
        errEl.textContent = "Compte créé. Si la confirmation par email est activée, vérifie ta boîte mail puis connecte-toi.";
        // tente de créer le profil si une session existe déjà (confirmation désactivée)
      }
      const uid = data.user?.id;
      if(uid){
        await supabase.from('profiles').upsert({ id:uid, role:f.get('role'), nom:f.get('nom') });
      }
    }
    await loadSession();
  }catch(err){
    errEl.style.color='var(--clay)';
    errEl.textContent = err.message || 'Erreur';
  }
}

async function viewCoachTournament(id){
  shell(`<div class="empty">Chargement…</div>`, 'home');

  const { data: t } = await supabase.from('tournaments').select('*, formats(*)').eq('id', id).single();
  if(!t){ shell(`<div class="empty">Tournoi introuvable.</div>`,'home'); return; }

  const { data: tp } = await supabase.from('tournament_players')
    .select('player_id, players(*)').eq('tournament_id', id);
  const players = (tp||[]).map(r=>r.players).filter(Boolean);
  const playerIds = new Set(players.map(p=>p.id));

  // Effectif de l'équipe non encore inscrit à ce tournoi
  const { data: roster } = await supabase.from('players').select('*').eq('team_id', t.team_id).order('nom');
  const rosterAvailable = (roster||[]).filter(p=>!playerIds.has(p.id));

  const { data: matches } = await supabase.from('matches')
    .select('*').eq('tournament_id', id).order('updated_at',{ascending:false});

  const playerName = pid => (players.find(p=>p.id===pid)?.nom) || '—';

  const matchesHtml = (matches||[]).length ? matches.map(m=>{
    const statusPill = m.statut==='en_cours' ? '<span class="pill live">Live</span>'
      : m.statut==='termine' ? '<span class="pill done">Terminé</span>'
      : '<span class="pill upcoming">À venir</span>';

      <div class="row between">
        <div><strong>${esc(playerName(m.joueur1_id))}</strong> vs <strong>${esc(playerName(m.joueur2_id))}</strong></div>
        ${statusPill}
      </div>
      <p class="muted">${esc(m.tour||'')} ${m.court?'· '+esc(m.court):''}</p>
    </div>`;
  }).join('') : `<div class="empty">Aucun match créé pour ce tournoi.</div>`;

  const playersHtml = players.length ? players.map(p=>`
    <div class="row between" style="padding:8px 0; border-bottom:1px solid var(--brd)">
      <div>${esc(p.nom)}</div>
      <div class="code-badge" style="font-size:14px; padding:4px 8px;">${esc(p.code)}</div>
    </div>`).join('') : `<p class="muted">Aucun joueur inscrit.</p>`;

  shell(`
    <button class="btn ghost" onclick="navigate('#/coach')">← Tous les tournois</button>
    <h2 style="margin:8px 0 2px">${esc(t.nom)}</h2>
    <p class="muted" style="margin-top:0">${esc(t.formats?.nom||'')}</p>

    <div class="card">
      <h3>Joueurs inscrits</h3>
      ${playersHtml}
      ${rosterAvailable.length ? `
      <form id="rosterForm" style="margin-top:10px">
        <label>Inscrire depuis l'effectif de l'équipe</label>
        <div class="row">
          <select name="player_id" style="flex:1">
            ${rosterAvailable.map(p=>`<option value="${p.id}">${esc(p.nom)} (${esc(p.code)})</option>`).join('')}
          </select>
          <button class="btn small" type="submit" style="width:auto">Ajouter</button>
        </div>
      </form>` : ''}
      <form id="addPlayerForm" style="margin-top:10px">
        <label>Nouveau joueur (pas encore dans l'effectif)</label>
        <div class="row">
          <input name="nom" placeholder="Ex: Lucas Petit" style="flex:1">
          <button class="btn small" type="submit" style="width:auto">Créer</button>
        </div>
        <p class="muted" style="margin-top:8px">Un code à 5 caractères est généré pour chaque joueur : les parents s'en servent pour suivre ses matchs en direct.</p>
      </form>
    </div>

    <h3 style="margin:18px 0 8px">Matchs</h3>
    <div class="card">
      <form id="matchForm">
        <label>Joueur 1</label>
        <select name="j1">${players.map(p=>`<option value="${p.id}">${esc(p.nom)}</option>`).join('')}</select>
        <label>Joueur 2</label>
        <select name="j2">${players.map(p=>`<option value="${p.id}">${esc(p.nom)}</option>`).join('')}</select>
        <label>Tour / phase (optionnel)</label>
        <input name="tour" placeholder="Ex: Demi-finale">
        <label>Court (optionnel)</label>
        <input name="court" placeholder="Ex: Court 2">
        <button class="btn clay" type="submit">+ Créer le match</button>
        <div class="error" id="matchErr"></div>
      </form>
    </div>
    ${matchesHtml}
  `, 'home');

  document.getElementById('rosterForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const playerId = new FormData(e.target).get('player_id');
    const { error } = await supabase.from('tournament_players').insert({ tournament_id: id, player_id: playerId });
    if(error){ toast(error.message, true); return; }
    toast('Joueur inscrit au tournoi');
    viewCoachTournament(id);
  });

  document.getElementById('addPlayerForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const nom = new FormData(e.target).get('nom').trim();
    if(!nom) return;
    const code = genCode();
    const { data: pl, error } = await supabase.from('players').insert({ nom, code, team_id: t.team_id, created_by: STATE.session.user.id }).select().single();
    if(error){ toast(error.message, true); return; }
    await supabase.from('tournament_players').insert({ tournament_id: id, player_id: pl.id });
    toast(`${nom} ajouté à l'effectif · code ${code}`);
    viewCoachTournament(id);
  });

  document.getElementById('matchForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const f = new FormData(e.target);

    if(!j1 || !j2 || j1===j2){ document.getElementById('matchErr').textContent='Choisis deux joueurs différents.'; return; }

      tournament_id: id, joueur1_id:j1, joueur2_id:j2,
      tour: f.get('tour')||null, court: f.get('court')||null,
      live_state
    }).select().single();
    if(error){ document.getElementById('matchErr').textContent = error.message; return; }
    navigate('#/coach/match/'+data.id);
  });
}

// VUE : COACH — SAISIE DU SCORE EN DIRECT
// ---------------------------------------------------------------
async function viewCoachMatch(id){
  shell(`<div class="empty">Chargement…</div>`, 'home');
  const { data: m } = await supabase.from('matches').select('*, tournaments(nom, format_id)').eq('id', id).single();
  if(!m){ shell(`<div class="empty">Match introuvable.</div>`,'home'); return; }
  const { data: p1 } = await supabase.from('players').select('nom').eq('id', m.joueur1_id).single();
  const { data: p2 } = await supabase.from('players').select('nom').eq('id', m.joueur2_id).single();

  STATE.history = [];
  renderCoachMatch(m, p1.nom, p2.nom);
}

function renderCoachMatch(m, n1, n2){
  const st = m.live_state;
  const labels = pointLabel(st);
  const tbActive = st.inTiebreak || st.inSuperTb;

  let actionBtn = '';
  if(m.statut === 'a_venir'){
    actionBtn = `<button class="btn clay" onclick="startMatch()">Démarrer le match</button>`;
  } else if(m.statut === 'en_cours'){
    actionBtn = `<button class="btn secondary" onclick="undoPoint()">↺ Annuler le dernier point</button>`;
  } else {
    actionBtn = `<div class="card" style="text-align:center"><strong>Match terminé</strong><br><span class="muted">Vainqueur : ${esc(st.winner===0?n1:n2)}</span></div>
    <button class="btn secondary" onclick="resetMatch()">Réinitialiser le match</button>`;
  }

  shell(`
    <button class="btn ghost" onclick="navigate('#/coach/tournoi/${m.tournament_id}')">← Retour au tournoi</button>
    ${scoreboardHTML(m, n1, n2)}
    ${m.statut==='en_cours' ? `
      <div class="point-display">
        <div class="pt"><div class="val">${esc(labels[0])}</div><div class="name">${esc(n1)}</div></div>
        <div class="pt"><div class="val">${esc(labels[1])}</div><div class="name">${esc(n2)}</div></div>
      </div>
      ${tbActive ? `<p class="muted" style="text-align:center;margin-top:-8px">${st.inSuperTb?'Super tie-break':'Jeu décisif'} en cours</p>` : ''}
      <div class="score-btns">
        <button class="btn" onclick="scorePoint(0)">+1 ${esc(n1)}</button>
        <button class="btn" onclick="scorePoint(1)">+1 ${esc(n2)}</button>
      </div>
    ` : ''}
    ${actionBtn}
  `, 'home');

  window._currentMatch = m;
  window._n1 = n1; window._n2 = n2;
}

window.startMatch = async () => {
  const m = window._currentMatch;
  m.statut = 'en_cours';
  await supabase.from('matches').update({ statut:'en_cours', updated_at:new Date().toISOString() }).eq('id', m.id);
  renderCoachMatch(m, window._n1, window._n2);
};
window.scorePoint = async (p) => {
  const m = window._currentMatch;
  STATE.history.push(JSON.parse(JSON.stringify(m.live_state)));
  addPoint(m.live_state, p);
  if(m.live_state.finished) m.statut = 'termine';
  await saveMatch(m);
};
window.undoPoint = async () => {
  const m = window._currentMatch;
  if(STATE.history.length){
    m.live_state = STATE.history.pop();
    m.statut = m.live_state.finished ? 'termine' : 'en_cours';
  }
  await saveMatch(m);
};
window.resetMatch = async () => {
  const m = window._currentMatch;
  if(!confirm('Réinitialiser ce match à 0-0 ?')) return;
  m.live_state = initLiveState(m.live_state.format);
  m.statut = 'a_venir';
  await saveMatch(m);
};
async function saveMatch(m){
  const winner_id = m.live_state.finished ? (m.live_state.winner===0 ? m.joueur1_id : m.joueur2_id) : null;
  await supabase.from('matches').update({
    live_state: m.live_state, statut: m.statut, winner_id, updated_at: new Date().toISOString()
  }).eq('id', m.id);
  renderCoachMatch(m, window._n1, window._n2);
}

    myPlayer = data;
  }

  const { data: follows } = await supabase.from('follows').select('player_id, players(*)').eq('parent_id', uid);
  const followedPlayers = (follows||[]).map(f=>f.players).filter(Boolean);
  const allPlayerIds = [...followedPlayers.map(p=>p.id), ...(myPlayer ? [myPlayer.id] : [])];

  let matches = [];
  if(allPlayerIds.length){
    const { data } = await supabase.from('matches')
      .select('*, tournaments(nom)')
      .or(allPlayerIds.map(pid=>`joueur1_id.eq.${pid},joueur2_id.eq.${pid}`).join(','))
      .order('updated_at',{ascending:false});
    matches = data || [];
  }

  // Récup noms des joueurs présents dans les matchs
  const idsNeeded = new Set();
  matches.forEach(m=>{ idsNeeded.add(m.joueur1_id); idsNeeded.add(m.joueur2_id); });
  let namesMap = {};
  if(idsNeeded.size){
    const { data: pls } = await supabase.from('players').select('id,nom').in('id', [...idsNeeded]);
    (pls||[]).forEach(p=>namesMap[p.id]=p.nom);
  }

  const order = { en_cours:0, a_venir:1, termine:2 };
  matches.sort((a,b)=> (order[a.statut]??3) - (order[b.statut]??3));

  const matchesHtml = matches.length ? matches.map(m => `
    <div onclick="navigate('#/match/${m.id}')" style="cursor:pointer">
      <p class="muted" style="margin:0 0 4px">${esc(m.tournaments?.nom||'')}</p>
      ${scoreboardHTML(m, namesMap[m.joueur1_id]||'—', namesMap[m.joueur2_id]||'—')}
    </div>`).join('') : `<div class="empty"><div class="big">🎾</div>Aucun match suivi pour l'instant.</div>`;

  const claimBox = (STATE.profile.role==='enfant' && !myPlayer) ? `
    <div class="card">
      <h3>Relier ma fiche joueur</h3>
      <p class="muted">Ton coach t'a donné un code à 5 caractères : entre-le ici pour voir automatiquement tes matchs.</p>
      <form id="claimForm">
        <input name="code" placeholder="CODE" style="text-transform:uppercase">
        <button class="btn clay" type="submit">Relier mon profil</button>
        <div class="error" id="claimErr"></div>
      </form>
    </div>` : '';

  const followBox = `
    <div class="card">
      <h3>Suivre un joueur</h3>
      <p class="muted">Entre le code donné par le coach pour suivre les matchs de cet enfant en direct.</p>
      <form id="followForm">
        <input name="code" placeholder="CODE" style="text-transform:uppercase">
        <button class="btn clay" type="submit">Suivre</button>
        <div class="error" id="followErr"></div>
      </form>
      ${followedPlayers.length ? `<p class="muted" style="margin-top:10px">Suivis : ${followedPlayers.map(p=>esc(p.nom)).join(', ')}</p>` : ''}
    </div>`;

  shell(`
    <h2 style="margin:4px 0 14px">Mes matchs</h2>
    ${myPlayer ? `<p class="muted">Profil joueur lié : <strong>${esc(myPlayer.nom)}</strong></p>` : ''}
    ${claimBox}
    ${followBox}
    ${matchesHtml}
  `, 'home');

  document.getElementById('followForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const code = new FormData(e.target).get('code').trim().toUpperCase();
    const { data: pl, error } = await supabase.from('players').select('*').eq('code', code).maybeSingle();
    if(error || !pl){ document.getElementById('followErr').textContent='Code introuvable.'; return; }
    const { error: fErr } = await supabase.from('follows').insert({ parent_id: uid, player_id: pl.id });
    if(fErr && !fErr.message.includes('duplicate')){ document.getElementById('followErr').textContent=fErr.message; return; }
    toast(`Tu suis maintenant ${pl.nom}`);
    viewSuivi();
  });

  document.getElementById('claimForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const code = new FormData(e.target).get('code').trim().toUpperCase();
    const { data: pl, error } = await supabase.from('players').select('*').eq('code', code).maybeSingle();
    if(error || !pl){ document.getElementById('claimErr').textContent='Code introuvable.'; return; }
    if(pl.profile_id){ document.getElementById('claimErr').textContent='Ce profil est déjà relié.'; return; }
    const { error: uErr } = await supabase.from('players').update({ profile_id: uid }).eq('id', pl.id);
    if(uErr){ document.getElementById('claimErr').textContent=uErr.message; return; }
    toast('Profil relié !');
    viewSuivi();
  });
}

// ---------------------------------------------------------------
// VUE : MATCH PUBLIC (live, lecture seule, niveau "jeu" + points en tie-break)
// ---------------------------------------------------------------
let liveChannel = null;
async function viewMatchPublic(id){
  shell(`<div class="empty">Chargement…</div>`, 'home');
  const { data: m } = await supabase.from('matches').select('*, tournaments(nom)').eq('id', id).single();
  if(!m){ shell(`<div class="empty">Match introuvable.</div>`,'home'); return; }
  const { data: p1 } = await supabase.from('players').select('nom').eq('id', m.joueur1_id).single();
  const { data: p2 } = await supabase.from('players').select('nom').eq('id', m.joueur2_id).single();
  renderPublicMatch(m, p1.nom, p2.nom);

  if(liveChannel) supabase.removeChannel(liveChannel);
  liveChannel = supabase.channel('match-'+id)
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'matches', filter:`id=eq.${id}` }, payload => {
      renderPublicMatch(payload.new, p1.nom, p2.nom);
    }).subscribe();
}
function renderPublicMatch(m, n1, n2){
  const backRoute = (STATE.profile?.role === 'coach' || STATE.profile?.role === 'admin') ? '#/coach' : '#/suivi';
  shell(`
    <button class="btn ghost" onclick="navigate('${backRoute}')">← Retour</button>
    <p class="muted" style="margin:4px 0">${esc(m.tournaments?.nom||'')}</p>
    ${scoreboardHTML(m, n1, n2)}
    <p class="muted" style="text-align:center">Score mis à jour en direct par le coach.</p>
  `, 'home');
}

// ---------------------------------------------------------------
// ROUTAGE
// ---------------------------------------------------------------
function setLoadingStatus(text){
  const el = document.getElementById('boot-status');
  if(el) el.textContent = text;
}
function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error(`Délai dépassé (${label})`)), ms))
  ]);
}
async function loadSession(){
  setLoadingStatus('Connexion à Supabase…');
  try{
    const { data, error } = await withTimeout(supabase.auth.getSession(), 5000, 'session');
    if(error) throw error;
    STATE.session = data.session;
  }catch(err){
    console.warn('getSession a échoué/timeout', err);
    setLoadingStatus('Erreur session : ' + (err?.message || err));
    STATE.session = null;
  }
  if(STATE.session){
    setLoadingStatus('Chargement du profil…');
    try{
      const { data: profile, error } = await withTimeout(
        supabase.from('profiles').select('*').eq('id', STATE.session.user.id).maybeSingle(),
        5000, 'profil'
      );
      if(error) throw error;
      STATE.profile = profile;
    }catch(err){
      console.warn('chargement du profil a échoué/timeout', err);
      setLoadingStatus('Erreur profil : ' + (err?.message || err));
      STATE.profile = null;
    }
  } else {
    STATE.profile = null;
  }
  setLoadingStatus('Affichage…');
  router();
}
function router(){
  if(liveChannel && !location.hash.startsWith('#/match/')){ supabase.removeChannel(liveChannel); liveChannel=null; }
  if(!STATE.session){ viewAuth(); return; }
  if(!STATE.profile){ shell(`<div class="empty">Profil introuvable. Reconnecte-toi.</div><button class="btn secondary" onclick="logout()">Déconnexion</button>`); return; }

  const hash = location.hash || '#/';
  const role = STATE.profile.role;

  // Un coach doit appartenir à une équipe avant d'accéder au reste de l'app
  if(role === 'coach' && !STATE.profile.team_id && hash !== '#/equipe' && hash !== '#/profil'){
    navigate('#/equipe'); return;
  }
  // Un coach adjoint qui vient de rejoindre une équipe attend la validation du coach principal
  if(role === 'coach' && STATE.profile.team_id && STATE.profile.statut === 'en_attente' && hash !== '#/profil'){
    return viewWaitingValidation();
  }

  let mTour, mMatch;
  if(hash === '#/' || hash === '#/login'){
    navigate((role==='coach'||role==='admin') ? '#/coach' : '#/suivi'); return;
  }
  if(hash === '#/profil') return viewProfil();
  if(hash === '#/equipe') return viewTeamSetup();
  if(hash === '#/coach') return role==='admin' ? viewAdminHome() : viewCoachHome();
  if(hash === '#/suivi') return viewSuivi();
  if((mTour = hash.match(/^#\/coach\/tournoi\/(.+)$/))) return viewCoachTournament(mTour[1]);
  if((mMatch = hash.match(/^#\/coach\/match\/(.+)$/))) return viewCoachMatch(mMatch[1]);
  if((mMatch = hash.match(/^#\/match\/(.+)$/))) return viewMatchPublic(mMatch[1]);
  navigate((role==='coach'||role==='admin') ? '#/coach' : '#/suivi');
}
window.navigate = navigate;
window.addEventListener('hashchange', router);

supabase.auth.onAuthStateChange((_event, session) => {
  STATE.session = session;
  if(!session){ STATE.profile=null; navigate('#/login'); router(); }
});

loadSession().catch(showFatalError);

// PWA : service worker
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
