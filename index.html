async function viewCoachMatch(id){
  shell(`<div class="empty">Chargement…</div>`, 'home');
  const { data: m } = await supabase.from('matches').select('*, tournaments(nom, format_id, tournee_id), match_coaches(profile_id, profiles(nom,prenom))').eq('id', id).single();
  if(!m){ shell(`<div class="empty">Match introuvable.</div>`,'home'); return; }
  const { data: p1 } = await supabase.from('players').select('nom,prenom').eq('id', m.joueur1_id).single();
  const n2 = m.joueur_ext_nom || (m.joueur2_id ? await supabase.from('players').select('nom,prenom').eq('id', m.joueur2_id).single().then(r=>fullName(r.data)) : '—');
  // Charger les coachs de l'équipe pour la section d'affectation
  let teamCoaches = [];
  if(m.tournaments?.tournee_id){
    const { data: tournee } = await supabase.from('tournees').select('team_id').eq('id', m.tournaments.tournee_id).maybeSingle();
    if(tournee){
      const { data: coaches } = await supabase.from('profiles').select('id,nom,prenom').eq('team_id', tournee.team_id).eq('role','coach').eq('statut','actif');
      teamCoaches = coaches || [];
    }
  }
  STATE.history = [];
  STATE._matchTeamCoaches = teamCoaches;
  renderCoachMatch(m, fullName(p1), n2);
}

function lsSnack(msg){
  let el = document.getElementById('lsSnackEl');
  if(!el){ el=document.createElement('div'); el.id='lsSnackEl'; el.className='lsSnack'; document.body.appendChild(el); }
  el.innerHTML = msg;
  el.classList.add('show');
  clearTimeout(window._lsSnackT);
  window._lsSnackT = setTimeout(()=>el.classList.remove('show'), 2200);
}

function renderCoachMatch(m, n1, n2){
  const st = m.live_state;
  const tbActive = st.inTiebreak || st.inSuperTb;
  const modeLabel = st.inSuperTb ? 'Super TB' : (st.inTiebreak ? 'Tie-break' : 'Standard');
  const sw = setsWon(st);
  const disp1 = tbActive ? st.points[0] : st.games[0];
  const disp2 = tbActive ? st.points[1] : st.games[1];
  const ptLabel = ['0','15','30','40'];
  const ptDisp = (i) => {
    if(tbActive) return st.points[i];
    return ptLabel[Math.min(st.points?.[i]||0, 3)] || '0';
  };
  const isOver = m.statut === 'termine';
  const isLive = m.statut === 'en_cours';
  const unit = tbActive ? 'point' : 'jeu';

  // Sets précédents
  const setsHtml = (st.sets||[]).map((s,i)=>{
    const tbNote = s.tb ? `<sup class="board .tb-note">(${s.tb[0]}-${s.tb[1]})</sup>` : '';
    const w = s.superTb ? (s.tb[0]>s.tb[1]?0:1) : (s.games[0]>s.games[1]?0:1);
    return `<span style="font-size:11px; color:var(--dim)">S${i+1}: <b style="color:${w===0?'var(--accent)':'var(--light)'}">${s.games[0]}</b>-<b style="color:${w===1?'var(--accent)':'var(--light)'}">${s.games[1]}</b>${tbNote}</span>`;
  }).join(' &nbsp;');

  shell(`
    <button class="btn ghost" onclick="navigate('#/coach/tournoi/${m.tournament_id}')">← Tournoi</button>
    ${scoreboardHTML(m, n1, n2)}

    ${isLive ? `
    <div class="lsBoard">
      <div class="lsHeader">
        <span>🔴 Live — ${esc(modeLabel)}</span>
        <span>${(m.match_coaches||[]).map(mc=>esc(fullName(mc.profiles))).filter(Boolean).map(n=>`🧑‍🏫 ${n}`).join(' ')||''} ${setsHtml}</span>
      </div>
      <div class="lsScoreRow">
        <div class="lsPlayer ${st.serve===0?'serving':''}">
          <div class="lsPlayerName">
            <span>${esc(n1)}</span>
            <span class="lsServeIcon" style="opacity:${st.serve===0?1:.2}">🎾</span>
          </div>
          <div class="lsBig">${disp1}</div>
          ${tbActive ? '' : `<div class="lsMini">
            <div class="lsMiniBox"><span class="k">Points</span><span class="v">${ptDisp(0)}</span></div>
            <div class="lsMiniBox"><span class="k">Sets</span><span class="v">${sw[0]}</span></div>
          </div>`}
        </div>
        <div class="lsVs">
          <span class="lsMode">${esc(modeLabel)}</span>
          <span class="lsSets">${sw[0]}-${sw[1]}</span>
          <span class="lsSetsSub">Sets</span>
        </div>
        <div class="lsPlayer ${st.serve===1?'serving':''}">
          <div class="lsPlayerName">
            <span class="lsServeIcon" style="opacity:${st.serve===1?1:.2}">🎾</span>
            <span>${esc(n2)}</span>
          </div>
          <div class="lsBig">${disp2}</div>
          ${tbActive ? '' : `<div class="lsMini">
            <div class="lsMiniBox"><span class="k">Points</span><span class="v">${ptDisp(1)}</span></div>
            <div class="lsMiniBox"><span class="k">Sets</span><span class="v">${sw[1]}</span></div>
          </div>`}
        </div>
      </div>
    </div>

    <div class="pointZone">
      <button class="pointBtn primary" onclick="scorePoint(0)">
        <span class="pbWho">${esc(n1)}</span>
        <span class="pbPlus">+1</span>
        <span class="pbUnit">+1 ${unit}</span>
      </button>
      <button class="pointBtn" onclick="scorePoint(1)">
        <span class="pbWho">${esc(n2)}</span>
        <span class="pbPlus">+1</span>
        <span class="pbUnit">+1 ${unit}</span>
      </button>
    </div>
    <div class="lsActions">
      <button class="btn secondary" onclick="toggleServe()">🎾 Service</button>
      <button class="btn secondary" onclick="undoPoint()">↺ Annuler</button>
      <button class="btn secondary" onclick="resetMatch()">⟳ Reset</button>
    </div>
    ` : ''}

    ${m.statut==='a_venir' ? `<button class="btn clay" onclick="startMatch()">▶ Démarrer le match</button>` : ''}

    <div class="card" style="margin-top:10px">
      <h3>🧑‍🏫 Coachs accompagnants</h3>
      ${(m.match_coaches||[]).length
        ? `<p class="muted" style="margin:0 0 8px">${(m.match_coaches||[]).map(mc=>esc(fullName(mc.profiles))).filter(Boolean).join(', ')}</p>`
        : `<p class="muted" style="margin:0 0 8px">Aucun coach affecté à ce match.</p>`}
      ${(STATE._matchTeamCoaches||[]).length ? `
      <form id="matchCoachForm">
        <div class="chk-group">
          ${(STATE._matchTeamCoaches||[]).map((c,i)=>{
            const checked = (m.match_coaches||[]).some(mc=>mc.profile_id===c.id);
            return `<div class="chk-item"><input type="checkbox" name="coach_ids" value="${c.id}" id="mca_${i}" ${checked?'checked':''}><label for="mca_${i}">${esc(fullName(c))}</label></div>`;
          }).join('')}
        </div>
        <button class="btn small secondary" type="submit">Enregistrer</button>
      </form>` : ''}
    </div>

    ${isOver ? `
    <div class="card" style="text-align:center; margin-bottom:10px">
      <h3 style="margin:0 0 4px">🏆 Match terminé</h3>
      <p class="muted">Vainqueur : <strong>${esc(st.winner===0?n1:n2)}</strong></p>
    </div>
    <div class="card">
      <h3>📝 Débrief — ${esc(n1)}</h3>
      <form id="debriefForm1">
        <textarea name="debrief" rows="4" placeholder="Ex: Bon match, travaille la première balle…">${esc(m.debrief||'')}</textarea>
        <button class="btn clay" type="submit">Enregistrer</button>
        <div class="error" id="debriefMsg1"></div>
      </form>
    </div>
    ${m.joueur2_id ? `
    <div class="card">
      <h3>📝 Débrief — ${esc(n2)}</h3>
      <form id="debriefForm2">
        <textarea name="debrief" rows="4" placeholder="Ex: Belle progression, travailler le revers…">${esc(m.debrief_j2||'')}</textarea>
        <button class="btn clay" type="submit">Enregistrer</button>
        <div class="error" id="debriefMsg2"></div>
      </form>
    </div>` : ''}
    <button class="btn secondary" style="margin-top:8px" onclick="resetMatch()">⟳ Réinitialiser le match</button>
    ` : ''}
  `, 'home');

  window._currentMatch = m;
  window._n1 = n1; window._n2 = n2;

  document.getElementById('matchCoachForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const selected = [...e.target.querySelectorAll('input[name=coach_ids]:checked')].map(i=>i.value);
    await supabase.from('match_coaches').delete().eq('match_id', m.id);
    if(selected.length){
      await supabase.from('match_coaches').insert(selected.map(pid=>({ match_id: m.id, profile_id: pid })));
    }
    // Recharger les match_coaches à jour
    const { data: mc } = await supabase.from('match_coaches').select('profile_id, profiles(nom,prenom)').eq('match_id', m.id);
    m.match_coaches = mc || [];
    toast('Coachs mis à jour');
    renderCoachMatch(m, n1, n2);
  });

  document.getElementById('debriefForm1')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const debrief = new FormData(e.target).get('debrief');
    const { error } = await supabase.from('matches').update({ debrief }).eq('id', m.id);
    const msgEl = document.getElementById('debriefMsg1');
    if(error){ msgEl.style.color='var(--clay)'; msgEl.textContent = error.message; return; }
    m.debrief = debrief;
    msgEl.style.color='var(--accent)'; msgEl.textContent = '✅ Enregistré.';
  });
  document.getElementById('debriefForm2')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const debrief_j2 = new FormData(e.target).get('debrief');
    const { error } = await supabase.from('matches').update({ debrief_j2 }).eq('id', m.id);
    const msgEl = document.getElementById('debriefMsg2');
    if(error){ msgEl.style.color='var(--clay)'; msgEl.textContent = error.message; return; }
    m.debrief_j2 = debrief_j2;
    msgEl.style.color='var(--accent)'; msgEl.textContent = '✅ Enregistré.';
  });
}

window.startMatch = async () => {
  const m = window._currentMatch;
  m.statut = 'en_cours';
  await supabase.from('matches').update({ statut:'en_cours', updated_at:new Date().toISOString() }).eq('id', m.id);
  renderCoachMatch(m, window._n1, window._n2);
};
window.scorePoint = async (p) => {
  const m = window._currentMatch;
  STATE.history.push(JSON.parse(JSON.stringify(m.live_state)));
  const prev = JSON.parse(JSON.stringify(m.live_state));
  addPoint(m.live_state, p);
  const tbActive = m.live_state.inTiebreak || m.live_state.inSuperTb;
  const wasGame = !tbActive && (m.live_state.games[p] > prev.games[p]);
  const wasSet = m.live_state.sets.length > prev.sets.length;
  const n = p===0 ? window._n1 : window._n2;
  if(m.live_state.finished){ m.statut='termine'; lsSnack(`🏆 Match terminé — ${esc(n)} gagne !`); }
  else if(wasSet){ lsSnack(`🏁 Set pour ${esc(n)}`); }
  else if(wasGame){ lsSnack(`🔥 +1 jeu — ${esc(n)}`); }
  else { lsSnack(`🟢 +1 ${tbActive?'point':'point'} — ${esc(n)}`); }
  await saveMatch(m);
};
window.undoPoint = async () => {
  const m = window._currentMatch;
  if(!STATE.history.length){ lsSnack('Rien à annuler'); return; }
  m.live_state = STATE.history.pop();
  m.statut = m.live_state.finished ? 'termine' : 'en_cours';
  lsSnack('↺ Annulé');
  await saveMatch(m);
};
window.resetMatch = async () => {
  const m = window._currentMatch;
  if(!confirm('Réinitialiser ce match à 0-0 ?')) return;
  m.live_state = initLiveState(m.live_state.format);
  m.statut = 'a_venir';
  lsSnack('⟳ Match réinitialisé');
  await saveMatch(m);
};
window.toggleServe = async () => {
  const m = window._currentMatch;
  STATE.history.push(JSON.parse(JSON.stringify(m.live_state)));
  m.live_state.serve = m.live_state.serve===0 ? 1 : 0;
  const n = m.live_state.serve===0 ? window._n1 : window._n2;
  lsSnack(`🎾 Service : ${esc(n)}`);
  await saveMatch(m);
};
async function saveMatch(m){
  const winner_id = m.live_state.finished ? (m.live_state.winner===0 ? m.joueur1_id : m.joueur2_id) : null;
  await supabase.from('matches').update({
    live_state: m.live_state, statut: m.statut, winner_id, updated_at: new Date().toISOString()
  }).eq('id', m.id);
  renderCoachMatch(m, window._n1, window._n2);
}

// ---------------------------------------------------------------
// VUE : PARENT / ENFANT — SUIVI
// ---------------------------------------------------------------
async function viewSuivi(){
  shell(`<div class="empty">Chargement…</div>`, 'home');
  const uid = STATE.session.user.id;

  // L'enfant peut "réclamer" sa fiche joueur via son code
  let myPlayer = null;
  if(STATE.profile.role === 'enfant'){
    const { data } = await supabase.from('players').select('*').eq('profile_id', uid).maybeSingle();
    myPlayer = data;
  }

  const { data: follows } = await supabase.from('follows').select('player_id, players(*)').eq('parent_id', uid);
  const followedPlayers = (follows||[]).map(f=>f.players).filter(Boolean);
  const allPlayerIds = [...followedPlayers.map(p=>p.id), ...(myPlayer ? [myPlayer.id] : [])];

  let matches = [];
  if(allPlayerIds.length){
    const { data } = await supabase.from('matches')
      .select('*, tournaments(nom)')
      .or(allPlayerIds.map(pid=>`joueur1_id.eq.${pid},joueur2_id.eq.${pid}`).join(','))
      .order('updated_at',{ascending:false});
    matches = data || [];
  }

  // Récup noms des joueurs présents dans les matchs
  const idsNeeded = new Set();
  matches.forEach(m=>{ idsNeeded.add(m.joueur1_id); idsNeeded.add(m.joueur2_id); });
  let namesMap = {};
  if(idsNeeded.size){
    const { data: pls } = await supabase.from('players').select('id,nom,prenom').in('id', [...idsNeeded]);
    (pls||[]).forEach(p=>namesMap[p.id]=fullName(p));
  }

  const order = { en_cours:0, a_venir:1, termine:2 };
  matches.sort((a,b)=> (order[a.statut]??3) - (order[b.statut]??3));

  const matchesHtml = matches.length ? matches.map(m => `
    <div onclick="navigate('#/match/${m.id}')" style="cursor:pointer">
      <p class="muted" style="margin:0 0 4px">${esc(m.tournaments?.nom||'')}</p>
      ${scoreboardHTML(m, namesMap[m.joueur1_id]||'—', namesMap[m.joueur2_id]||'—')}
    </div>`).join('') : `<div class="empty"><div class="big">🎾</div>Aucun match suivi pour l'instant.</div>`;

  const claimBox = (STATE.profile.role==='enfant' && !myPlayer) ? `
    <div class="card">
      <h3>Relier ma fiche joueur</h3>
      <p class="muted">Ton coach t'a donné un code à 5 caractères : entre-le ici pour voir automatiquement tes matchs.</p>
      <form id="claimForm">
        <input name="code" placeholder="CODE" style="text-transform:uppercase">
        <button class="btn clay" type="submit">Relier mon profil</button>
        <div class="error" id="claimErr"></div>
      </form>
    </div>` : '';

  const followBox = `
    <div class="card">
      <h3>Suivre un joueur</h3>
      <p class="muted">Entre le code donné par le coach pour suivre les matchs de cet enfant en direct.</p>
      <form id="followForm">
        <input name="code" placeholder="CODE" style="text-transform:uppercase">
        <button class="btn clay" type="submit">Suivre</button>
        <div class="error" id="followErr"></div>
      </form>
      ${followedPlayers.length ? `<p class="muted" style="margin-top:10px">Suivis : ${followedPlayers.map(p=>esc(fullName(p))).join(', ')}</p>` : ''}
    </div>`;

  shell(`
    <h2 style="margin:4px 0 14px">Mes matchs</h2>
    ${myPlayer ? `<p class="muted">Profil joueur lié : <strong>${esc(fullName(myPlayer))}</strong></p>` : ''}
    ${claimBox}
    ${followBox}
    ${matchesHtml}
  `, 'home');

  document.getElementById('followForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const code = new FormData(e.target).get('code').trim().toUpperCase();
    const { data: pl, error } = await supabase.from('players').select('*').eq('code', code).maybeSingle();
    if(error || !pl){ document.getElementById('followErr').textContent='Code introuvable.'; return; }
    const { error: fErr } = await supabase.from('follows').insert({ parent_id: uid, player_id: pl.id });
    if(fErr && !fErr.message.includes('duplicate')){ document.getElementById('followErr').textContent=fErr.message; return; }
    toast(`Tu suis maintenant ${fullName(pl)}`);
    viewSuivi();
  });

  document.getElementById('claimForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const code = new FormData(e.target).get('code').trim().toUpperCase();
    const { data: pl, error } = await supabase.from('players').select('*').eq('code', code).maybeSingle();
    if(error || !pl){ document.getElementById('claimErr').textContent='Code introuvable.'; return; }
    if(pl.profile_id){ document.getElementById('claimErr').textContent='Ce profil est déjà relié.'; return; }
    const { error: uErr } = await supabase.from('players').update({ profile_id: uid }).eq('id', pl.id);
    if(uErr){ document.getElementById('claimErr').textContent=uErr.message; return; }
    toast('Profil relié !');
    viewSuivi();
  });
}

// ---------------------------------------------------------------
// VUE : MATCH PUBLIC (live, lecture seule, niveau "jeu" + points en tie-break)
// ---------------------------------------------------------------
let liveChannel = null;
async function viewMatchPublic(id){
  shell(`<div class="empty">Chargement…</div>`, 'home');
  const { data: m } = await supabase.from('matches').select('*, tournaments(nom)').eq('id', id).single();
  if(!m){ shell(`<div class="empty">Match introuvable.</div>`,'home'); return; }
  const { data: p1 } = await supabase.from('players').select('nom,prenom').eq('id', m.joueur1_id).single();
  const { data: p2 } = await supabase.from('players').select('nom,prenom').eq('id', m.joueur2_id).single();
  renderPublicMatch(m, fullName(p1), fullName(p2));

  if(liveChannel) supabase.removeChannel(liveChannel);
  liveChannel = supabase.channel('match-'+id)
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'matches', filter:`id=eq.${id}` }, payload => {
      renderPublicMatch(payload.new, fullName(p1), fullName(p2));
    }).subscribe();
}
function renderPublicMatch(m, n1, n2){
  const backRoute = (STATE.profile?.role === 'coach' || STATE.profile?.role === 'admin') ? '#/coach' : '#/suivi';
  shell(`
    <button class="btn ghost" onclick="navigate('${backRoute}')">← Retour</button>
    <p class="muted" style="margin:4px 0">${esc(m.tournaments?.nom||'')}</p>
    ${scoreboardHTML(m, n1, n2)}
    <p class="muted" style="text-align:center">Score mis à jour en direct par le coach.</p>
  `, 'home');
}

// ---------------------------------------------------------------
// ROUTAGE
// ---------------------------------------------------------------
function setLoadingStatus(text){
  const el = document.getElementById('boot-status');
  if(el) el.textContent = text;
}
function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error(`Délai dépassé (${label})`)), ms))
  ]);
}
async function loadSession(){
  setLoadingStatus('Connexion à Supabase…');
  try{
    const { data, error } = await withTimeout(supabase.auth.getSession(), 5000, 'session');
    if(error) throw error;
    STATE.session = data.session;
  }catch(err){
    console.warn('getSession a échoué/timeout', err);
    setLoadingStatus('Erreur session : ' + (err?.message || err));
    STATE.session = null;
  }
  if(STATE.session){
    setLoadingStatus('Chargement du profil…');
    try{
      const { data: profile, error } = await withTimeout(
        supabase.from('profiles').select('*').eq('id', STATE.session.user.id).maybeSingle(),
        5000, 'profil'
      );
      if(error) throw error;
      STATE.profile = profile;
    }catch(err){
      console.warn('chargement du profil a échoué/timeout', err);
      setLoadingStatus('Erreur profil : ' + (err?.message || err));
      STATE.profile = null;
    }
  } else {
    STATE.profile = null;
  }
  setLoadingStatus('Affichage…');
  router();
}
function router(){
  const hash = location.hash || '#/';
  if(liveChannel && !location.hash.startsWith('#/match/')){ supabase.removeChannel(liveChannel); liveChannel=null; }

  // Accès public par code joueur (aucun compte requis)
  let mCode;
  if((mCode = hash.match(/^#\/j\/(.+)$/))) return viewPlayerCode(mCode[1].toUpperCase());

  let mTour, mMatch;

  // Routes publiques — accessibles sans compte
  if((mMatch = hash.match(/^#\/match\/(.+)$/))) return viewMatchPublic(mMatch[1]);
  if((mMatch = hash.match(/^#\/j\/(.+)$/))) return viewPlayerCode(mMatch[1]);

  if(!STATE.session){
    if(hash === '#/coach-login') return viewAuth();
    return viewLanding();
  }
  if(!STATE.profile){ shell(`<div class="empty">Profil introuvable. Reconnecte-toi.</div><button class="btn secondary" onclick="logout()">Déconnexion</button>`); return; }

  if(STATE.profile.must_change_password) return viewChangePassword();

  const role = STATE.profile.role;

  // Un coach doit appartenir à une équipe avant d'accéder au reste de l'app
  if(role === 'coach' && !STATE.profile.team_id && hash !== '#/equipe' && hash !== '#/profil'){
    navigate('#/equipe'); return;
  }
  // Un coach adjoint qui vient de rejoindre une équipe attend la validation du coach principal
  if(role === 'coach' && STATE.profile.team_id && STATE.profile.statut === 'en_attente' && hash !== '#/profil'){
    return viewWaitingValidation();
  }

  if(hash === '#/' || hash === '#/login' || hash === '#/coach-login'){
    navigate((role==='coach'||role==='admin') ? '#/coach' : '#/suivi'); return;
  }
  if(hash === '#/profil') return viewProfil();
  if(hash === '#/equipe') return viewTeamSetup();
  if(hash === '#/coach') return role==='admin' ? viewAdminHome() : viewCoachHome();
  if(hash === '#/mon-equipe') return STATE.profile.team_id ? viewCoachHome() : (navigate('#/coach'), undefined);
  if(hash === '#/coach/planning') return STATE.profile.team_id ? viewMyPlanning() : (navigate('#/coach'), undefined);
  if(hash === '#/admin/utilisateurs') return role==='admin' ? viewAdminUsers() : (navigate('#/coach'), undefined);
  if(hash === '#/suivi') return viewSuivi();
  if((mTour = hash.match(/^#\/planning\/tournee\/(.+)$/))) return viewTourneePlanning(mTour[1], 0);
  if((mTour = hash.match(/^#\/coach\/tournee\/(.+)$/))) return viewCoachTournee(mTour[1]);
  if((mTour = hash.match(/^#\/coach\/tournoi\/(.+)$/))) return viewCoachTournament(mTour[1]);
  if((mMatch = hash.match(/^#\/coach\/match\/(.+)$/))) return viewCoachMatch(mMatch[1]);
  navigate((role==='coach'||role==='admin') ? '#/coach' : '#/suivi');
}
window.navigate = navigate;
window.addEventListener('hashchange', router);

supabase.auth.onAuthStateChange((_event, session) => {
  STATE.session = session;
  if(!session){ STATE.profile=null; navigate('#/'); router(); }
});

loadSession().catch(showFatalError);

// PWA : service worker
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
