<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C0C0C">
<title>Tennistour — Suivi de tournois</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Palette */
  --bg:#0A0A0A; --s1:#111; --s2:#181818; --s3:#202020; --brd:#2A2A2A;
  --accent:#C9E040; --accent2:rgba(201,224,64,.18); --accent3:rgba(201,224,64,.06);
  --live:#E05C3A; --live2:rgba(224,92,58,.15);
  --court:#27976B; --gold:#E09A20;
  --white:#F5F5F5; --light:#B8B8B8; --gray:#666; --dim:#3A3A3A;
  --fnt-head:'Barlow Condensed',sans-serif; --fnt-body:'Inter',sans-serif;
  --r:12px; --rL:18px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--fnt-body);
  background:var(--bg);
  color:var(--white);
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
h1,h2,h3,.score-num,.tab-bar .label,.brand{font-family:var(--fnt-head); letter-spacing:.02em;}
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* Top bar */
.topbar{
  background:var(--s1); color:var(--white);
  padding:14px 16px 10px; padding-top:calc(14px + env(safe-area-inset-top,0px));
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:20; border-bottom:1px solid var(--brd);
}
.topbar .brand{font-size:20px; font-weight:900; text-transform:uppercase; letter-spacing:3px; display:flex; align-items:center; gap:8px; color:var(--accent);}
.topbar .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent); box-shadow:0 0 8px var(--accent);}
.topbar .who{font-family:var(--fnt-head); font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:2px; font-weight:700; cursor:pointer; border:1px solid var(--brd); padding:6px 12px; border-radius:999px; background:var(--s2);}

main{flex:1; padding:16px 16px 100px;} h2{font-size:22px; font-weight:900; letter-spacing:.5px; margin:0 0 16px;} h3{font-size:15px;}

/* Cards / generic */
.card{background:var(--s2); border:1px solid var(--brd); border-radius:var(--rL); padding:16px; margin-bottom:10px; transition:border-color .15s;}
.card h3{margin:0 0 12px; font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--light);}
.muted{color:var(--gray); font-size:13px;}
.row{display:flex; gap:8px; align-items:center;}
.row.between{justify-content:space-between;}
.pill{display:inline-block; font-size:9px; text-transform:uppercase; letter-spacing:1.5px; padding:3px 9px; border-radius:999px; font-weight:700; font-family:var(--fnt-head);}
.pill.live{background:var(--live2); color:var(--live); border:1px solid rgba(193,87,58,.4);}
.pill.upcoming{background:var(--s3); color:var(--gray); border:1px solid var(--brd);}
.pill.done{background:rgba(46,125,91,.15); color:var(--court); border:1px solid rgba(46,125,91,.35);}

/* Forms */
label{display:block; font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--gray); margin:14px 0 6px; font-weight:700;}
input,select,textarea{
  width:100%; padding:12px; border:1px solid var(--brd); border-radius:var(--r);
  font-size:15px; font-family:inherit; background:var(--s3); color:var(--white);
}
input::placeholder,textarea::placeholder{color:var(--dim);}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--accent);}
textarea{resize:vertical; min-height:90px;}
.btn{
  display:block; width:100%;
  border:none; border-radius:var(--r); padding:15px; font-size:14px; font-weight:700;
  font-family:var(--fnt-head); text-transform:uppercase; letter-spacing:2px;
  cursor:pointer; background:var(--accent); color:#0A0A0A; margin-top:12px; text-align:center;
  transition:opacity .1s, transform .1s;
}
.btn:active{opacity:.85; transform:scale(.99);}
.btn.secondary{background:var(--s3); color:var(--light); border:1px solid var(--brd);}
.btn.clay{background:var(--live); color:var(--white); border:none;}
.btn.ghost{background:none; color:var(--accent); text-transform:none; letter-spacing:0; font-family:var(--fnt-body); font-weight:600; padding:8px; border:1px solid rgba(215,229,82,.3); border-radius:var(--r); width:auto; margin-top:0;}
.btn.small{width:auto; padding:10px 16px; font-size:12px; margin-top:0;}
.error{color:var(--live); font-size:13px; margin-top:8px;}
.tabs{display:flex; gap:6px; margin-bottom:16px;}
.tabs button{flex:1; padding:10px; border-radius:var(--r); border:1px solid var(--brd); background:var(--s2); color:var(--light); font-family:var(--fnt-head); text-transform:uppercase; letter-spacing:1.5px; font-size:13px; font-weight:700; cursor:pointer;}
.tabs button.active{background:var(--accent); color:#0C0C0C; border-color:var(--accent);}

/* Bottom nav */
.tab-bar{
  position:fixed; bottom:0; left:0; right:0; max-width:560px; margin:0 auto;
  background:rgba(10,10,10,.95); display:flex; padding:8px env(safe-area-inset-bottom) calc(8px + env(safe-area-inset-bottom));
  border-top:1px solid var(--brd); backdrop-filter:blur(12px);
}
.tab-bar button{
  flex:1; background:none; border:none; color:var(--gray); padding:8px 0;
  display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;
  transition:color .15s;
}
.tab-bar button.active{color:var(--accent);}
.tab-bar button:active{opacity:.7;}
.tab-bar .label{font-size:9px; text-transform:uppercase; letter-spacing:1.5px; font-weight:700;}

/* Scoreboard (signature element) */
.board{
  background:linear-gradient(135deg,#161616 0%,#0F0F0F 100%);
  color:var(--white); border:1px solid var(--brd); border-radius:var(--rL);
  padding:16px; margin-bottom:14px; overflow:hidden; position:relative;
}
.board .tour-name{font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--accent); margin-bottom:10px; font-weight:700;}
.board .player-row{
  display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center;
  padding:10px 0; border-bottom:1px solid var(--brd);
}
.board .player-row:last-of-type{border-bottom:none;}
.board .player-name{font-size:16px; font-weight:600; font-family:var(--fnt-head); letter-spacing:.5px;}
.board .sets{display:flex; gap:8px;}
.board .set-score{
  font-family:var(--fnt-head); font-size:20px; font-weight:700; min-width:28px; text-align:center;
  background:var(--s3); border-radius:6px; padding:4px 0; border:1px solid var(--brd);
}
.board .set-score.current{background:var(--accent); color:#0C0C0C; border-color:var(--accent);}
.board .tb-note{font-size:10px; vertical-align:super; opacity:.7;}
.board .live-tag{
  position:absolute; top:14px; right:16px; background:var(--live2); color:var(--live);
  border:1px solid rgba(193,87,58,.4);
  font-size:9px; font-family:var(--fnt-head); font-weight:700; text-transform:uppercase; letter-spacing:2px; padding:4px 10px; border-radius:999px;
  display:flex; align-items:center; gap:6px;
}
.board .live-tag .blink{width:6px;height:6px;border-radius:50%;background:var(--live);animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
@keyframes pulseLive{0%,100%{border-color:var(--live);}50%{border-color:rgba(224,92,58,.3);}}
.board .tiebreak-banner{
  margin-top:12px; background:var(--accent3); border:1px solid rgba(215,229,82,.3); border-radius:var(--r); padding:10px 14px;
  display:flex; justify-content:space-between; align-items:center;
}
.board .tiebreak-banner .tb-points{font-family:var(--fnt-head); font-size:24px; font-weight:900; color:var(--accent);}
.board .tiebreak-banner .tb-label{font-size:10px; text-transform:uppercase; letter-spacing:1.5px; align-self:center; color:var(--light); font-weight:700;}

/* Section titles */
.section-title{font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--gray); font-weight:700; margin:20px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--brd);}
/* Empty state */
.empty-state{text-align:center; padding:48px 24px; color:var(--gray);}
.empty-state .icon{font-size:48px; margin-bottom:12px;}
.empty-state p{margin:0; font-size:14px;}
/* Checkboxes groupées */
.chk-group{display:flex; flex-direction:column; gap:6px; margin:6px 0 10px;}
.chk-item{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--r); background:var(--s2); border:1px solid var(--brd); cursor:pointer; user-select:none; transition:border-color .1s;}
.chk-item:has(input:checked){border-color:var(--accent); background:var(--accent3);}
.chk-item input[type=checkbox]{width:16px; height:16px; accent-color:var(--accent); cursor:pointer; flex-shrink:0;}
.chk-item label{cursor:pointer; font-size:13px; flex:1;}
/* Planning semaine tableau */
.week-table{width:100%; border-collapse:collapse; table-layout:fixed; font-size:12px;}
.week-table th{padding:6px 4px; text-align:center; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--light); border-bottom:2px solid var(--accent); background:var(--s1);}
.week-table th.today-col{color:var(--accent); border-bottom-color:var(--accent); background:var(--accent3);}
.week-table td{vertical-align:top; padding:4px 3px; border-right:1px solid var(--brd); min-height:48px;}
.week-table td:last-child{border-right:none;}
.week-match{background:var(--s2); border:1px solid var(--brd); border-radius:8px; padding:6px 8px; margin-bottom:5px; cursor:pointer; transition:background .15s;}
.week-match:hover{background:var(--s3);}
.week-match.live{border-color:var(--live); background:rgba(224,92,58,.1); animation:pulseLive 2s infinite;}
.week-match.done{opacity:.7;}
.week-match .wm-time{font-size:10px; color:var(--accent); font-weight:700; margin-bottom:2px; opacity:.8;}
.week-match .wm-players{font-weight:700; font-size:11px; line-height:1.3;}
.week-match .wm-sub{font-size:10px; color:var(--dim); margin-top:2px;}
.week-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; background:var(--s2); border:1px solid var(--brd); border-radius:var(--r); padding:10px 12px;}
.week-nav h3{margin:0; font-size:13px; font-weight:700; color:var(--white);}
/* ── Live scoring ── */
.lsBoard{
  border:1px solid var(--brd); border-radius:var(--rL);
  background:var(--s1); overflow:hidden; margin-bottom:12px;
}
.lsHeader{
  padding:8px 14px; font-size:10px; text-transform:uppercase; letter-spacing:2px;
  color:var(--accent2); font-weight:700; border-bottom:1px solid var(--brd);
  display:flex; align-items:center; justify-content:space-between;
}
.lsScoreRow{
  display:grid; grid-template-columns:1fr 80px 1fr; gap:8px;
  padding:12px 10px; align-items:stretch;
}
.lsPlayer{
  border:1px solid var(--brd); border-radius:var(--r);
  background:var(--s2); padding:10px 12px;
  display:flex; flex-direction:column; gap:6px;
}
.lsPlayer.serving{ border-color:var(--accent); background:rgba(255,90,0,.08); }
.lsPlayerName{
  font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.8px;
  display:flex; align-items:center; justify-content:space-between;
}
.lsServeIcon{ font-size:14px; }
.lsBig{ font-family:var(--fnt-head); font-size:44px; font-weight:900; line-height:1; color:var(--accent); }
.lsMini{ display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:4px; }
.lsMiniBox{
  border:1px solid var(--brd); border-radius:8px; padding:6px; text-align:center;
  background:var(--s1);
}
.lsMiniBox .k{ font-size:10px; color:var(--dim); display:block; }
.lsMiniBox .v{ font-size:16px; font-weight:900; display:block; margin-top:1px; }
.lsVs{
  border:1px dashed var(--brd); border-radius:var(--r); background:var(--s1);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:8px 4px; gap:4px;
}
.lsVs .lsMode{ font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--live); font-weight:700; }
.lsVs .lsSets{ font-size:20px; font-weight:900; font-family:var(--fnt-head); }
.lsVs .lsSetsSub{ font-size:10px; color:var(--dim); }
.pointZone{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.pointBtn{
  border:none; border-radius:var(--rL); padding:0 14px;
  min-height:130px; display:flex; flex-direction:column;
  justify-content:center; align-items:flex-start; gap:6px;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
  border:1px solid var(--brd); background:var(--s2);
  box-shadow:0 8px 24px rgba(0,0,0,.2);
  transition:transform .06s ease; user-select:none;
}
.pointBtn:active{ transform:scale(.985); }
.pointBtn.primary{ background:linear-gradient(135deg,rgba(25,118,210,.9),rgba(255,90,0,.4)); border-color:rgba(255,255,255,.2); }
.pointBtn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }
.pointBtn .pbWho{ font-weight:900; font-size:14px; letter-spacing:.2px; }
.pointBtn .pbUnit{ font-size:11px; color:rgba(255,255,255,.7); margin-top:2px; }
.pointBtn .pbPlus{ font-size:36px; font-weight:900; line-height:1; }
.lsActions{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
.lsSnack{
  position:fixed; left:12px; right:12px; bottom:calc(72px + env(safe-area-inset-bottom));
  background:rgba(10,10,10,.88); border:1px solid var(--brd);
  border-radius:var(--r); padding:10px 14px;
  font-size:13px; font-weight:700; color:var(--white);
  backdrop-filter:blur(10px); z-index:99;
  transform:translateY(12px); opacity:0;
  transition:opacity .15s, transform .15s;
  pointer-events:none;
}
.lsSnack.show{ opacity:1; transform:translateY(0); }
.score-btns{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.score-btns .btn{margin-top:0; padding:20px 10px; font-size:14px;}
.code-badge{
  display:inline-flex; align-items:center; gap:8px; background:var(--s3); border:1px dashed var(--accent);
  border-radius:var(--r); padding:8px 12px; font-family:var(--fnt-head); font-size:18px; font-weight:700; letter-spacing:3px; margin-top:6px; color:var(--accent);
}
.empty{text-align:center; color:var(--gray); padding:40px 10px; font-size:14px;}
.empty .big{font-family:var(--fnt-head); font-size:40px; color:var(--brd); margin-bottom:10px;}
a.link{color:var(--accent); font-weight:600; text-decoration:none;}

</style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0C0C0C;color:#D7E552;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;gap:10px;text-align:center;padding:20px;">
    <div>Chargement…</div>
    <div id="boot-status" style="font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0;text-transform:none;color:#777;"></div>
  </div>
</div>

<script type="module">
import { createClient } from './supabase.bundle.js';

// ====================== CONFIGURATION ======================
// Remplace par les valeurs de ton projet Supabase (Project Settings > API)
const SUPABASE_URL = 'https://oijaymahnevydzfgqlhi.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_49oduZZ5jt9TOo1p4oTbpw_LwpbWUXV';
// =============================================================

const app = document.getElementById('app');
const STATE = { session:null, profile:null, route:'#/login', cache:{}, history:[] };

// Affiche toute erreur fatale au lieu de laisser un écran noir silencieux
function showFatalError(err){
  console.error(err);
  app.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#0C0C0C;">
      <div style="max-width:400px;text-align:center;color:#fff;font-family:'Inter',sans-serif;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:#C1573A;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;">Erreur de chargement</div>
        <p style="color:#CCC;font-size:14px;line-height:1.6;margin-bottom:10px;">${(err && (err.message||err.toString())) || 'Erreur inconnue'}</p>
        <p style="color:#777;font-size:12px;">Vérifie ta connexion internet, puis recharge la page.</p>
      </div>
    </div>`;
}
window.addEventListener('error', e => showFatalError(e.error || e.message));
window.addEventListener('unhandledrejection', e => showFatalError(e.reason));

let supabase;
try{
  supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}catch(err){
  showFatalError(err);
  throw err;
}

// ---------------------------------------------------------------
// HELPERS
// ---------------------------------------------------------------
const esc = s => (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fullName = p => [p?.prenom, p?.nom].filter(Boolean).join(' ') || '—';
window.showPlayerCode = (code, nom) => {
  toast(`📋 ${nom} — Code : ${code}`);
  navigator.clipboard?.writeText(code).catch(()=>{});
};
window.viewPlayerPlanning = async (playerId, tourneeId, weekOffset=0, selectedDay=null) => {
  shell(`<div class="empty">Chargement…</div>`, 'personnes');

  const { data: player } = await supabase.from('players').select('*').eq('id', playerId).maybeSingle();
  if(!player){ shell(`<div class="empty">Joueur introuvable.</div>`,'personnes'); return; }

  const { data: tournee } = await supabase.from('tournees').select('*, teams(nom)').eq('id', tourneeId).maybeSingle();
  const { data: etapes } = await supabase.from('tournaments').select('id,nom,formats(*)').eq('tournee_id', tourneeId);
  const etapeIds = (etapes||[]).map(e=>e.id);

  let playerMatches = [];
  if(etapeIds.length){
    const { data: m } = await supabase.from('matches').select('*, tournaments(nom)')
      .in('tournament_id', etapeIds)
      .or(`joueur1_id.eq.${playerId},joueur2_id.eq.${playerId}`)
      .order('scheduled_at');
    playerMatches = m || [];
  }

  const { data: trainingLinks } = await supabase.from('training_players').select('trainings(*)').eq('player_id', playerId);
  const playerTrainings = (trainingLinks||[]).map(l=>l.trainings).filter(Boolean);

  const { data: allPlayers } = await supabase.from('players').select('id,nom,prenom,genre').eq('team_id', player.team_id);
  const playerName = pid => fullName((allPlayers||[]).find(p=>p.id===pid));
  const isSuperviseur = STATE.profile?.superviseur || STATE.profile?.role==='admin';

  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const monday = new Date(now);
  const dow = now.getDay();
  monday.setDate(now.getDate() - (dow===0?6:dow-1) + weekOffset*7);
  monday.setHours(0,0,0,0);
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
  const dayKeys = days.map(d=>d.toISOString().slice(0,10));
  const dayNamesShort = ['L','M','M','J','V','S','D'];
  const monthFmt = new Intl.DateTimeFormat('fr-FR',{day:'numeric',month:'short'});
  const dayFmt = new Intl.DateTimeFormat('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const timeFmt = new Intl.DateTimeFormat('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const weekLabel = `${monthFmt.format(days[0])} – ${monthFmt.format(days[6])} ${days[0].getFullYear()}`;

  const items = [
    ...playerMatches.map(m=>({ type:'match', date:m.scheduled_at, data:m })),
    ...playerTrainings.map(tr=>({ type:'training', date:tr.scheduled_at, data:tr }))
  ];
  const byDay = {}; dayKeys.forEach(k=>byDay[k]=[]);
  items.forEach(it=>{ const k=(it.date||'').slice(0,10); if(byDay[k]) byDay[k].push(it); });

  // Jour sélectionné : par défaut aujourd'hui si dans la semaine, sinon le premier jour avec événements
  let active = selectedDay && dayKeys.includes(selectedDay) ? selectedDay
    : (dayKeys.includes(todayStr) ? todayStr
    : (dayKeys.find(k=>(byDay[k]||[]).length) || dayKeys[0]));

  const renderDay = (k) => {
    const dayItems = (byDay[k]||[]).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    if(!dayItems.length && !isSuperviseur) return `<div class="empty-state" style="padding:24px"><div class="icon" style="font-size:32px">🎾</div><p>Aucun événement ce jour.</p></div>`;
    const itemsHtml = dayItems.map(it=>{
      const time = it.date ? timeFmt.format(new Date(it.date)) : '';
      if(it.type==='match'){
        const m = it.data;
        const opp = m.joueur1_id===playerId ? (m.joueur_ext_nom||playerName(m.joueur2_id)) : playerName(m.joueur1_id);
        const statusPill = m.statut==='en_cours' ? '<span class="pill live">Live 🔴</span>'
          : m.statut==='termine' ? '<span class="pill done">Terminé</span>' : '<span class="pill upcoming">À venir</span>';
        return `<div class="card" style="margin-bottom:8px">

// ---------------------------------------------------------------
// MOTEUR DE SCORE TENNIS (paramétrable selon le format du tournoi)
// ---------------------------------------------------------------
function initLiveState(format){
  return {
    format,
    sets: [],            // [{games:[g1,g2], tb:[t1,t2]|null, superTb:bool}]
    games: [0,0],
    points: [0,0],       // utilisé uniquement en tie-break / super tie-break
    serve: 0,            // 0 ou 1 : index du joueur au service
    inTiebreak: false,
    inSuperTb: false,
    finished: false,
    winner: null
  };
}
function setWinner(s){
  if(s.superTb) return s.tb[0] > s.tb[1] ? 0 : 1;
  return s.games[0] > s.games[1] ? 0 : 1;
}
function setsWon(state){
  const w=[0,0];
  state.sets.forEach(s => w[setWinner(s)]++);
  return w;
}
function afterSetPush(state){
  const f = state.format;
  const sw = setsWon(state);
  if(sw[0] >= f.nb_sets_gagnants || sw[1] >= f.nb_sets_gagnants){
    state.finished = true;
    state.winner = sw[0] > sw[1] ? 0 : 1;
    return;
  }
  if(sw[0] === f.nb_sets_gagnants - 1 && sw[1] === f.nb_sets_gagnants - 1 && f.super_tb_set_final){
    state.inSuperTb = true; // le set décisif se joue directement en super tie-break
    state.points=[0,0];
  }
}
// Ajoute 1 jeu (mode normal) ou 1 point (tie-break / super tie-break) au joueur p
function addPoint(state, p){
  if(state.finished) return state;
  const o = p===0?1:0, f = state.format;

  if(state.inTiebreak || state.inSuperTb){
    state.points[p]++;
    const target = state.inSuperTb ? f.points_super_tb : 7;
    if(state.points[p] >= target && (state.points[p]-state.points[o]) >= 2){
      const gset=[...state.games]; gset[p]++;
      state.sets.push({games:gset, tb:[...state.points], superTb: state.inSuperTb});
      state.games=[0,0]; state.points=[0,0];
      state.inTiebreak=false; state.inSuperTb=false;
      state.serve = o;
      afterSetPush(state);
    }
    return state;
  }

  // Mode normal : +1 jeu directement
  state.games[p]++;
  const g=state.games;
  if(g[p] >= f.jeux_par_set && (g[p]-g[o]) >= 2){
    state.sets.push({games:[...g], tb:null, superTb:false});
    state.games=[0,0];
    state.serve = o;
    afterSetPush(state);
  } else if(g[0]===f.seuil_tiebreak && g[1]===f.seuil_tiebreak){
    state.inTiebreak = true;
    state.points=[0,0];
  } else {
    state.serve = o; // alternance du service à chaque jeu
  }
  return state;
}

// SCOREBOARD HTML (réutilisé côté coach et côté spectateur)
// ---------------------------------------------------------------
function scoreboardHTML(m, p1Name, p2Name, opts={}){
  const st = m.live_state && m.live_state.format ? m.live_state : null;
  const sets = st ? st.sets : [];
  const curGames = st ? st.games : [0,0];
  const tbActive = st && (st.inTiebreak || st.inSuperTb);
  const isLive = m.statut === 'en_cours';
  const isDone = m.statut === 'termine';

  let setsHtml = '';
  const renderSetCell = (idx, val, superTb, tb) => {
    let extra='';
    if(tb !== null && tb !== undefined) extra = `<span class="tb-note">${tb}</span>`;
    return `<div class="set-score">${val}${extra}</div>`;
  };

  // colonnes : sets terminés + set courant (si pas fini et pas en super TB pur)
  const colsP1=[], colsP2=[];
  sets.forEach(s=>{
    colsP1.push(renderSetCell(0, s.games[0], s.superTb, s.tb ? s.tb[0] : null));
    colsP2.push(renderSetCell(0, s.games[1], s.superTb, s.tb ? s.tb[1] : null));
  });
  if(st && !st.finished && !st.inSuperTb){
    colsP1.push(`<div class="set-score current">${curGames[0]}</div>`);
    colsP2.push(`<div class="set-score current">${curGames[1]}</div>`);
  }

  const tieHtml = (st && tbActive) ? `
    <div class="tiebreak-banner">
      <span class="tb-label">${st.inSuperTb ? 'Super tie-break' : 'Jeu décisif'}</span>
      <span class="tb-points">${st.points[0]} – ${st.points[1]}</span>
    </div>` : '';

  let liveTag = '';
  if(isLive) liveTag = `<div class="live-tag"><span class="blink"></span> Live</div>`;
  else if(isDone) liveTag = `<div class="live-tag" style="background:var(--court-2)">Terminé</div>`;
  else liveTag = `<div class="live-tag" style="background:var(--grey)">À venir</div>`;

  return `
  <div class="board">
    ${liveTag}
    <div class="tour-name">${m.scheduled_at ? '🕐 '+new Intl.DateTimeFormat('fr-FR',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(m.scheduled_at))+' · ' : ''}${esc(m.tour || 'Match')}${m.court ? ' · '+esc(m.court) : ''}</div>
    <div class="player-row">
      <div class="player-name">${esc(p1Name)}${(st && st.finished && st.winner===0) ? ' 🏆' : ''}${(isLive && st && st.serve===0) ? ' 🎾' : ''}</div>
      <div class="sets">${colsP1.join('') || '<span class="muted">—</span>'}</div>
    </div>
    <div class="player-row">
      <div class="player-name">${esc(p2Name)}${(st && st.finished && st.winner===1) ? ' 🏆' : ''}${(isLive && st && st.serve===1) ? ' 🎾' : ''}</div>
      <div class="sets">${colsP2.join('') || '<span class="muted">—</span>'}</div>
    </div>
    ${tieHtml}
  </div>`;
}

async function viewPlayerCode(code){
  app.innerHTML = `<main><div class="empty">Chargement…</div></main>`;
  const { data: player, error } = await supabase.from('players').select('*').eq('code', code).maybeSingle();
  if(error || !player){
    app.innerHTML = `
      <main>
        <div class="card" style="text-align:center">
          <h3>Code introuvable</h3>
          <p class="muted">Vérifie le code donné par le coach (5 caractères).</p>
          <button class="btn clay" onclick="navigate('#/')">← Retour</button>
        </div>
      </main>`;
    return;
  }
  saveCode(player.code, fullName(player));

  const { data: matches } = await supabase.from('matches')
    .select('*, tournaments(nom)')
    .or(`joueur1_id.eq.${player.id},joueur2_id.eq.${player.id}`)
    .order('scheduled_at', {ascending: true, nullsFirst: false});

  // Entraînements non affichés aux parents

  const idsNeeded = new Set();
  (matches||[]).forEach(m=>{ idsNeeded.add(m.joueur1_id); idsNeeded.add(m.joueur2_id); });
  let namesMap = {};
  if(idsNeeded.size){
    const { data: pls } = await supabase.from('players').select('id,nom,prenom').in('id', [...idsNeeded]);
    (pls||[]).forEach(p=>namesMap[p.id]=fullName(p));
  }

  const order = { en_cours:0, a_venir:1, termine:2 };
  const sorted = [...(matches||[])].sort((a,b)=> (order[a.statut]??3) - (order[b.statut]??3));

  // --- Matchs live (en cours) — PRIORITÉ ABSOLUE ---
  const liveMatches = sorted.filter(m=>m.statut==='en_cours');
  const liveHtml = liveMatches.length ? liveMatches.map(m=>`
    <div onclick="navigate('#/match/${m.id}')" style="cursor:pointer;margin-bottom:10px">
      ${scoreboardHTML(m, namesMap[m.joueur1_id]||'—', m.joueur_ext_nom||(namesMap[m.joueur2_id]||'—'))}
      <p class="muted" style="text-align:center;margin-top:-6px;font-size:12px">Touche pour voir le live ↑</p>
    </div>`).join('') : '';

  // --- Prochains matchs ---
  const upcomingMatches = sorted.filter(m=>m.statut==='a_venir');
  const upcomingHtml = upcomingMatches.length ? upcomingMatches.map(m=>{
    const time = m.scheduled_at ? new Intl.DateTimeFormat('fr-FR',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(m.scheduled_at)) : null;
    const opp = m.joueur1_id===player.id ? (m.joueur_ext_nom||namesMap[m.joueur2_id]||'—') : namesMap[m.joueur1_id]||'—';
    return `<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 14px">
      <div style="font-size:24px">🎾</div>
      <div style="flex:1">
        <div style="font-weight:700">vs ${esc(opp)}</div>
        <div class="muted">${time?esc(time):'À programmer'}${m.court?' · Court '+esc(m.court):''}</div>
        <div class="muted">${esc(m.tournaments?.nom||'')}</div>
      </div>
      <span class="pill upcoming">À venir</span>
    </div>`;
  }).join('') : '';

  // --- Résultats avec débriefs ---
  const doneHtml = sorted.filter(m=>m.statut==='termine').map(m=>{
    const isJ1 = m.joueur1_id===player.id;
    const myDebrief = isJ1 ? m.debrief : m.debrief_j2;
    const n1 = namesMap[m.joueur1_id]||'—';
    const n2 = m.joueur_ext_nom||(namesMap[m.joueur2_id]||'—');
    return `<div style="margin-bottom:10px">
      ${scoreboardHTML(m, n1, n2)}
      ${myDebrief ? `<div class="card" style="margin-top:-6px;border-top:none;border-radius:0 0 var(--rL) var(--rL);background:var(--s1)">
        <p style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray);margin:0 0 6px">📝 Débrief du coach</p>
        <p style="margin:0;white-space:pre-wrap;font-size:14px;line-height:1.5">${esc(myDebrief)}</p>
      </div>` : ''}
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><span class="dot"></span> Tennistour</div>
      <button class="btn ghost" onclick="navigate('#/')" style="font-size:11px">✕ Quitter</button>
    </div>
    <main>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <div style="font-size:32px">${player.genre==='F'?'👧':player.genre==='G'?'👦':'🎾'}</div>
        <div>
          <div style="font-family:var(--fnt-head);font-size:22px;font-weight:900">${esc(fullName(player))}</div>
          <div class="muted" style="font-size:12px">Tournée tennis</div>
        </div>
      </div>

      ${liveMatches.length ? `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--live);animation:blink 1s infinite"></div>
          <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--live)">En cours</span>
        </div>
        ${liveHtml}` : ''}

      ${upcomingMatches.length ? `
        <p class="section-title">À venir</p>
        ${upcomingHtml}` : ''}

      ${doneHtml ? `
        <p class="section-title">Résultats & débriefs</p>
        ${doneHtml}` : ''}

      ${!sorted.length ? `<div class="empty-state"><div class="icon">🎾</div><p>Aucun match programmé pour l'instant.</p></div>` : ''}
    </main>`;
}

const AUTH_DOMAIN = '@setpoint.local';
function loginToEmail(login){
  const clean = (login||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,'');
  return clean + AUTH_DOMAIN;
}
function emailToLogin(email){
  return (email||'').replace(AUTH_DOMAIN,'');
}
function viewAuth(){
  app.innerHTML = `
    <div class="topbar"><div class="brand"><span class="dot"></span> Tennistour</div></div>
    <main>
      <button class="btn ghost" onclick="navigate('#/')">← Retour</button>
      <div class="card" style="margin-top:12px;">
        <h3>🔑 Accès Coach</h3>
        <p class="muted">Accès réservé aux coachs et superviseurs. Tes identifiants t'ont été fournis par l'administrateur.</p>
        <form id="authForm">
          <label>Identifiant</label>
          <input name="login" required placeholder="Ex: jimmy" autocapitalize="none" autocomplete="username" pattern="[A-Za-z0-9._\-]+">
          <label>Mot de passe</label>
          <input type="password" name="password" required minlength="6" placeholder="Mot de passe" autocomplete="current-password">
          <button class="btn clay" type="submit">Se connecter</button>
          <div class="error" id="authError"></div>
        </form>
      </div>
    </main>`;
  document.getElementById('authForm').addEventListener('submit', onAuthSubmit);
}
async function onAuthSubmit(e){
  e.preventDefault();
  const f = new FormData(e.target);
  const email = loginToEmail(f.get('login')), password = f.get('password');
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  try{
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if(error) throw error;
    await loadSession();
  }catch(err){
    errEl.style.color='var(--clay)';
    errEl.textContent = err.message || 'Erreur';
  }
}

    toast('Mot de passe mis à jour');

  });
}

  const { data: profile } = await supabase.from('profiles').select('*').eq('id', STATE.session.user.id).maybeSingle();

  if(profile?.role === 'coach'){
    const { data: myTeams } = await supabase.from('coach_teams').select('team_id,superviseur,statut').eq('profile_id', profile.id);
    STATE.coachTeams = myTeams || [];

          ${c.superviseur?'<span class="pill live" style="font-size:8px;padding:1px 5px">Superv.</span>':''}
          ${c.statut!=='actif'?'<span class="pill upcoming" style="font-size:8px;padding:1px 5px">Attente</span>':''}

// HELPER : rendu planning semaine/jour (coach ou joueur)
// ---------------------------------------------------------------
function buildPlanningHtml(items, playerName, canScoreMatch){
  if(!items.length) return `<div class="empty"><div class="big">📅</div>Aucun événement programmé.</div>`;

  const dateFmt = new Intl.DateTimeFormat('fr-FR', { weekday:'long', day:'numeric', month:'long' });
  const timeFmt = new Intl.DateTimeFormat('fr-FR', { hour:'2-digit', minute:'2-digit' });

  const groups = new Map();
  items.forEach(it=>{
    const key = it.date ? it.date.slice(0,10) : 'none';
    if(!groups.has(key)) groups.set(key, []);
    groups.get(key).push(it);
  });
  const sortedKeys = [...groups.keys()].sort((a,b)=> a==='none'?1 : b==='none'?-1 : a.localeCompare(b));

  // semaines
  const weekFmt = new Intl.DateTimeFormat('fr-FR', { day:'numeric', month:'short' });
  const getWeekKey = dateStr => {
    if(dateStr==='none') return 'none';
    const d = new Date(dateStr+'T00:00:00');
    const day = d.getDay();
    const diff = (day===0?-6:1)-day;
    const mon = new Date(d); mon.setDate(d.getDate()+diff);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    return `${mon.toISOString().slice(0,10)}__${weekFmt.format(mon)} – ${weekFmt.format(sun)}`;
  };

  const weeks = new Map();
  sortedKeys.forEach(k=>{
    const wk = getWeekKey(k);
    if(!weeks.has(wk)) weeks.set(wk, []);
    weeks.get(wk).push(k);
  });

  return [...weeks.entries()].map(([wk, keys])=>{
    const [, weekLabel] = wk==='none' ? ['none','Non planifié'] : wk.split('__');
    const daysHtml = keys.map(key=>{
      const label = key==='none' ? '' : dateFmt.format(new Date(key+'T00:00:00'));
      const rows = groups.get(key).sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(it=>{
        const time = it.date ? timeFmt.format(new Date(it.date)) : '';
        if(it.type==='match'){
          const m = it.data;
          const isLive = m.statut==='en_cours';
          const isDone = m.statut==='termine';
          const statusPill = isLive
            ? '<span class="pill live" style="animation:pulse 1.2s infinite">🔴 Live</span>'
            : isDone ? '<span class="pill done">Terminé</span>'
            : '<span class="pill upcoming">À venir</span>';
          const clickable = canScoreMatch ? `onclick="navigate('#/coach/match/${m.id}')" style="cursor:pointer"` : `onclick="navigate('#/match/${m.id}')" style="cursor:pointer"`;

          // Score en cours (sets gagnés)
          let scoreHtml = '';
          const st = m.live_state;
          if(st && (isLive || isDone) && st.sets){
            const sw = [0,0];
            st.sets.forEach(s=>{ const w = s.superTb?(s.tb[0]>s.tb[1]?0:1):(s.games[0]>s.games[1]?0:1); sw[w]++; });
            const setsFmt = st.sets.map(s=>{
              const tb = s.tb ? `<sup style="font-size:9px;opacity:.7">${s.tb[0]}-${s.tb[1]}</sup>` : '';
              return `${s.games[0]}-${s.games[1]}${tb}`;
            }).join('  ');
            const curGames = st.games ? `${st.games[0]}-${st.games[1]}` : '';
            const serveIcon = st.serve===0 ? '🎾' : '';
            scoreHtml = `<div style="display:flex; align-items:center; gap:10px; margin-top:6px; font-family:var(--fnt-head)">
              <span style="font-size:22px; font-weight:900; color:var(--accent)">${sw[0]}</span>
              <span style="font-size:13px; color:var(--dim)">–</span>
              <span style="font-size:22px; font-weight:900; color:var(--light)">${sw[1]}</span>
              ${setsFmt ? `<span style="font-size:11px; color:var(--dim); margin-left:4px">${setsFmt}</span>` : ''}
              ${isLive && curGames ? `<span class="pill" style="font-size:11px; margin-left:4px">Jeu : ${curGames}</span>` : ''}
              ${isLive && (st.inTiebreak||st.inSuperTb) ? `<span class="pill live" style="font-size:10px">TB ${st.points[0]}-${st.points[1]}</span>` : ''}
            </div>`;
          }

          return `<div class="card" ${clickable} style="border-color:${isLive?'var(--live)':'var(--brd)'}">
            <div class="row between">
              <div>🎾 <strong>${esc(playerName(m.joueur1_id))}</strong>${st?.serve===0&&isLive?' 🎾':''} vs <strong>${esc((m.joueur_ext_nom || playerName(m.joueur2_id)))}</strong>${st?.serve===1&&isLive?' 🎾':''}</div>
              ${statusPill}
            </div>
            ${scoreHtml}
            <p class="muted" style="margin-top:4px">${time?`🕐 ${time} · `:''}${esc(m.etapeNom||m.tournaments?.nom||'')}${m.court?' · Court '+esc(m.court):''}</p>
            ${isLive||isDone ? `<p class="muted" style="font-size:11px; margin-top:2px">Appuie pour voir le score détaillé →</p>` : ''}
          </div>`;
        } else {
          const tr = it.data;
          const names = (tr.training_players||[]).map(tp=>playerName(tp.player_id)).filter(n=>n!=='—').join(', ');
          return `<div class="card" style="background:var(--s3)">
            <div class="row between"><div>🏋️ <strong>${esc(tr.titre)}</strong></div>${time?`<span class="muted">🕐 ${esc(time)}</span>`:''}</div>
            ${tr.lieu?`<p class="muted">📍 ${esc(tr.lieu)}</p>`:''}
            ${tr.description?`<p class="muted">${esc(tr.description)}</p>`:''}
            ${names?`<p class="muted">👥 ${esc(names)}</p>`:''}
          </div>`;
        }
      }).join('');
      return label ? `<h4 style="margin:12px 0 6px; text-transform:capitalize; color:var(--accent2)">${esc(label)}</h4>${rows}` : rows;
    }).join('');
    return `<div class="card" style="padding:12px 14px; margin-bottom:10px;">
      <h3 style="margin:0 0 8px; font-size:13px; text-transform:uppercase; letter-spacing:2px; color:var(--light)">📆 Semaine du ${esc(weekLabel)}</h3>
      ${daysHtml}
    </div>`;
  }).join('');
}

// VUE : COACH — MON PLANNING
// ---------------------------------------------------------------
async function viewMyPlanning(){
  shell(`<div class="empty">Chargement…</div>`, 'planning');
  const uid = STATE.session.user.id;
  const teamId = STATE.profile.team_id;

  // Matchs assignés via etape_coaches OU match_coaches
  // Équipes du coach (peut en avoir plusieurs)
  const { data: myTeams } = await supabase.from('coach_teams').select('team_id').eq('profile_id', uid);
  const myTeamIds = (myTeams||[]).map(t=>t.team_id);

  const { data: ec } = await supabase.from('etape_coaches').select('tournament_id').eq('profile_id', uid);
  const etapeIds = (ec||[]).map(r=>r.tournament_id);
  const { data: mc } = await supabase.from('match_coaches').select('match_id').eq('profile_id', uid);
  const matchCoachIds = (mc||[]).map(r=>r.match_id);

  const { data: tc } = await supabase.from('training_coaches').select('training_id').eq('profile_id', uid);
  const trainingIds = (tc||[]).map(r=>r.training_id);

  let matches = [], trainings = [];
  if(etapeIds.length){
    const { data: m } = await supabase.from('matches').select('*, tournaments(nom)').in('tournament_id', etapeIds);
    matches = m || [];
  }
  // Ajouter les matchs assignés directement (match_coaches) non déjà inclus
  if(matchCoachIds.length){
    const existingIds = new Set(matches.map(m=>m.id));
    const { data: m2 } = await supabase.from('matches').select('*, tournaments(nom)').in('id', matchCoachIds.filter(id=>!existingIds.has(id)));
    matches = [...matches, ...(m2||[])];
  }
  if(trainingIds.length){
    const { data: t } = await supabase.from('trainings').select('*, training_players(player_id), tournees(nom)').in('id', trainingIds);
    trainings = t || [];
  }

  const { data: roster } = await supabase.from('players').select('id,nom,prenom,genre').eq('team_id', teamId);
  const playerName = pid => fullName((roster||[]).find(p=>p.id===pid));

  // Matchs EN COURS — section prioritaire en haut
  const liveMatches = matches.filter(m=>m.statut==='en_cours');
  const liveHtml = liveMatches.length ? `
    <div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div class="blink" style="width:8px;height:8px;border-radius:50%;background:var(--live);animation:blink 1s infinite;flex-shrink:0"></div><h3 style="color:var(--live);margin:0;font-size:13px;text-transform:uppercase;letter-spacing:2px">Live · ${liveMatches.length} match${liveMatches.length>1?'s':''} en cours</h3></div>
      ${liveMatches.map(m=>`
        <div class="card" onclick="navigate('#/coach/match/${m.id}')" style="cursor:pointer; border-color:var(--live); background:rgba(255,60,0,.06)">
          <div class="row between">
            <div style="font-weight:700">🎾 ${esc(playerName(m.joueur1_id))} vs ${esc(m.joueur_ext_nom||playerName(m.joueur2_id))}</div>
            <span class="pill live">Live</span>
          </div>
          <p class="muted">${esc(m.tournaments?.nom||'')}${m.court?' · Court '+esc(m.court):''}</p>
        </div>`).join('')}
    </div>` : '';

  const items = [];
  matches.forEach(m=> items.push({ type:'match', date:m.scheduled_at, data:m }));
  trainings.forEach(tr=> items.push({ type:'training', date:tr.scheduled_at, data:tr }));

  const isSuperviseur = STATE.profile.superviseur;

  shell(`
    <h2 style="margin:4px 0 14px">Mon planning</h2>
    ${liveHtml}
    ${buildPlanningHtml(items, playerName, true)}
    ${isSuperviseur ? `<button class="btn secondary" style="margin-top:10px" onclick="navigate('#/coach')">🏟️ Gérer les tournées</button>` : ''}
  `, 'planning');
}

// ---------------------------------------------------------------
// VUE : PLANNING SEMAINE (tournée — tout le monde)
// ---------------------------------------------------------------
async function viewTourneePlanning(tourneeId, weekOffset=0, viewMode='joueurs'){
  STATE.activeTourneeId = tourneeId;
  shell(`<div class="empty">Chargement…</div>`, 'planning');

  const { data: tournee } = await supabase.from('tournees').select('*').eq('id', tourneeId).maybeSingle();
  if(!tournee){ shell(`<div class="empty">Tournée introuvable.</div>`,'planning'); return; }

  const { data: etapes } = await supabase.from('tournaments').select('id,nom').eq('tournee_id', tourneeId);
  const etapeIds = (etapes||[]).map(e=>e.id);
  const etapeNom = eid => (etapes||[]).find(e=>e.id===eid)?.nom || '';

  let allMatches = [];
  if(etapeIds.length){
    const { data: m } = await supabase.from('matches').select('*').in('tournament_id', etapeIds).order('scheduled_at');
    allMatches = m || [];
  }

  // Affectations coach par match (via etape_coaches)
  let coachesByEtape = {};
  if(etapeIds.length){
    const { data: ec } = await supabase.from('etape_coaches').select('tournament_id, profile_id, profiles(nom,prenom)').in('tournament_id', etapeIds);
    (ec||[]).forEach(r=>{ (coachesByEtape[r.tournament_id]||=[]).push(r.profiles); });
  }

  const { data: allPlayers } = await supabase.from('players').select('id,nom,prenom,genre')
    .eq('team_id', tournee.team_id).order('nom');
  const playerName = pid => fullName((allPlayers||[]).find(p=>p.id===pid));
  const playerObj = pid => (allPlayers||[]).find(p=>p.id===pid);

  const { data: teamCoaches } = await supabase.from('profiles')
    .select('id,nom,prenom').eq('team_id', tournee.team_id).eq('role','coach').eq('statut','actif');

  // Semaine
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const monday = new Date(now);
  const dow = now.getDay();
  monday.setDate(now.getDate() - (dow===0?6:dow-1) + weekOffset*7);
  monday.setHours(0,0,0,0);
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
  const dayKeys = days.map(d=>d.toISOString().slice(0,10));
  const dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const monthFmt = new Intl.DateTimeFormat('fr-FR',{day:'numeric',month:'short'});
  const timeFmt = new Intl.DateTimeFormat('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const weekLabel = `${monthFmt.format(days[0])} – ${monthFmt.format(days[6])} ${days[0].getFullYear()}`;

  const isCoach = ['admin','coach'].includes(STATE.profile?.role);
  const isSuperviseur = STATE.profile?.superviseur || STATE.profile?.role==='admin';

  // --- SEMAINE helpers ---
  const byDay = {};
  dayKeys.forEach(k=>byDay[k]=[]);
  allMatches.forEach(m=>{
    if(!m.scheduled_at) return;
    const k = m.scheduled_at.slice(0,10);
    if(byDay[k]) byDay[k].push(m);
  });

  const weekNav = `
    <div class="week-nav" style="margin-top:10px">
      <button class="btn small secondary" onclick="viewTourneePlanning('${tourneeId}',${weekOffset-1},'${viewMode}')">← Préc.</button>
      <h3>📆 ${esc(weekLabel)}</h3>
      <button class="btn small secondary" onclick="viewTourneePlanning('${tourneeId}',${weekOffset+1},'${viewMode}')">Suiv. →</button>
    </div>`;

  const tabBar = `
    <div class="tabs" style="margin-bottom:10px">
      <button class="${viewMode==='joueurs'?'active':''}" onclick="viewTourneePlanning('${tourneeId}',${weekOffset},'joueurs')">👤 Par joueur</button>
      <button class="${viewMode==='staff'?'active':''}" onclick="viewTourneePlanning('${tourneeId}',${weekOffset},'staff')">🧑‍🏫 Par coach</button>
    </div>`;

  // =====================================================================
  // VUE JOUEURS : un tableau par joueur avec ses matchs de la semaine
  // =====================================================================
  let mainHtml = '';

  if(viewMode==='joueurs'){
    // Joueurs actifs cette semaine ou tous si superviseur
    const joueurIds = new Set();
    allMatches.forEach(m=>{ joueurIds.add(m.joueur1_id); joueurIds.add(m.joueur2_id); });
    const joueursActifs = (allPlayers||[]).filter(p=>joueurIds.has(p.id));
    const joueursAffiches = isSuperviseur ? (allPlayers||[]) : joueursActifs;

    if(!joueursAffiches.length){
      mainHtml = `<div class="empty">Aucun joueur inscrit à cette tournée.</div>`;
    } else {
      mainHtml = joueursAffiches.map(player=>{
        const matchsJoueur = allMatches.filter(m=>m.joueur1_id===player.id||m.joueur2_id===player.id);

        const cols = dayKeys.map((k,i)=>{
          const isToday = k===todayStr;
          const cells = byDay[k].filter(m=>m.joueur1_id===player.id||m.joueur2_id===player.id)
            .sort((a,b)=>(a.scheduled_at||'').localeCompare(b.scheduled_at||''))
            .map(m=>{
              const time = timeFmt.format(new Date(m.scheduled_at));
              const opp = playerName(m.joueur1_id===player.id ? m.joueur2_id : m.joueur1_id);
              const cls = m.statut==='en_cours'?'live':m.statut==='termine'?'done':'';
              const route = isCoach ? `#/coach/match/${m.id}` : `#/match/${m.id}`;
              return `<div class="week-match ${cls}" onclick="navigate('${route}')">
                <div class="wm-time">🕐 ${esc(time)}</div>
                <div class="wm-players">vs ${esc(opp)}</div>
                <div class="wm-sub">${esc(etapeNom(m.tournament_id))}${m.court?' C.'+esc(m.court):''}</div>
              </div>`;
            }).join('') || '';
          return { isToday, cells, dayName: dayNames[i], date: monthFmt.format(days[i]) };
        });

        const hasMatchThisWeek = cols.some(c=>c.cells);
        if(!isSuperviseur && !hasMatchThisWeek) return '';

        return `<div class="card" style="padding:10px 12px; margin-bottom:10px">
          <div style="font-weight:700; margin-bottom:8px; font-size:13px">
            ${player.genre==='F'?'👧':'👦'} ${esc(fullName(player))}
            ${isSuperviseur ? `<button class="btn small secondary" style="float:right" onclick="preselectPlayer('${player.id}')">+ Match</button>` : ''}
          </div>
          <div style="overflow-x:auto">
            <table class="week-table">
              <thead><tr>
                ${cols.map(c=>`<th class="${c.isToday?'today-col':''}" style="padding:4px 2px">${c.dayName}<br><span style="font-weight:400">${c.date}</span></th>`).join('')}
              </tr></thead>
              <tbody><tr>${cols.map(c=>`<td>${c.cells||'<div style="height:20px"></div>'}</td>`).join('')}</tr></tbody>
            </table>
          </div>
        </div>`;
      }).filter(Boolean).join('') || `<div class="empty">Aucun match cette semaine.</div>`;
    }

  // =====================================================================
  // VUE STAFF : par coach, les matchs dont il est responsable cette semaine
  // =====================================================================
  } else {
    const { data: teamCoaches } = await supabase.from('profiles')
      .select('id,nom,prenom').eq('team_id', tournee.team_id).eq('role','coach').eq('statut','actif');

    if(!(teamCoaches||[]).length){
      mainHtml = `<div class="empty">Aucun coach dans l'équipe.</div>`;
    } else {
      mainHtml = (teamCoaches||[]).map(coach=>{
        const coachEtapeIds = etapeIds.filter(eid=>(coachesByEtape[eid]||[]).some(c=>c&&c.nom===coach.nom));
        const matchsCoach = allMatches.filter(m=>coachEtapeIds.includes(m.tournament_id));

        const cols = dayKeys.map((k,i)=>{
          const isToday = k===todayStr;
          const cells = (byDay[k]||[]).filter(m=>coachEtapeIds.includes(m.tournament_id))
            .sort((a,b)=>(a.scheduled_at||'').localeCompare(b.scheduled_at||''))
            .map(m=>{
              const time = timeFmt.format(new Date(m.scheduled_at));
              const cls = m.statut==='en_cours'?'live':m.statut==='termine'?'done':'';
              const route = `#/coach/match/${m.id}`;
              return `<div class="week-match ${cls}" onclick="navigate('${route}')">
                <div class="wm-time">🕐 ${esc(time)}</div>
                <div class="wm-players">${esc(playerName(m.joueur1_id))}</div>
                <div class="wm-players" style="color:var(--dim)">vs ${esc((m.joueur_ext_nom || playerName(m.joueur2_id)))}</div>
                <div class="wm-sub">${esc(etapeNom(m.tournament_id))}${m.court?' C.'+esc(m.court):''}</div>
              </div>`;
            }).join('') || '';
          return { isToday, cells, dayName: dayNames[i], date: monthFmt.format(days[i]) };
        });

        const hasMatchThisWeek = cols.some(c=>c.cells);
        if(!hasMatchThisWeek && !isSuperviseur) return '';

        return `<div class="card" style="padding:10px 12px; margin-bottom:10px">
          <div style="font-weight:700; margin-bottom:8px; font-size:13px">🧑‍🏫 ${esc(fullName(coach))}</div>
          ${hasMatchThisWeek ? `<div style="overflow-x:auto">
            <table class="week-table">
              <thead><tr>
                ${cols.map(c=>`<th class="${c.isToday?'today-col':''}" style="padding:4px 2px">${c.dayName}<br><span style="font-weight:400">${c.date}</span></th>`).join('')}
              </tr></thead>
              <tbody><tr>${cols.map(c=>`<td>${c.cells||'<div style="height:20px"></div>'}</td>`).join('')}</tr></tbody>
            </table>
          </div>` : `<p class="muted">Aucun match assigné cette semaine.</p>`}
        </div>`;
      }).filter(Boolean).join('') || `<div class="empty">Aucun coach affecté cette semaine.</div>`;
    }
  }

  // Formulaire "Programmer un match" pour superviseur (vue joueurs seulement)
  const formHtml = isSuperviseur && viewMode==='joueurs' ? `
    <p class="section-title">Programmer un match</p>
    <div class="card">
      <form id="quickMatchForm">
        <label>Joueur de la tournée</label>
        <select name="j1" required>
          ${(allPlayers||[]).map(p=>`<option value="${p.id}">${p.genre==='F'?'👧':'👦'} ${esc(fullName(p))}</option>`).join('')}
        </select>
        <label>Adversaire</label>
        <div class="tabs" style="margin-bottom:8px">
          <button type="button" class="active" onclick="setAdvMode(this,'interne')">Joueur de la tournée</button>
          <button type="button" onclick="setAdvMode(this,'externe')">Joueur externe</button>
        </div>
        <div id="advInterne">
          <select name="j2">
            ${(allPlayers||[]).map(p=>`<option value="${p.id}">${p.genre==='F'?'👧':'👦'} ${esc(fullName(p))}</option>`).join('')}
          </select>
        </div>
        <div id="advExterne" style="display:none">
          <input name="joueur_ext_nom" placeholder="Prénom Nom de l'adversaire (ex: Lucas Martin)">
          <p class="muted" style="margin-top:4px">Joueur hors tournée (adversaire FFT, autre club…)</p>
        </div>
        <label>Date et heure</label>
        <input type="datetime-local" name="scheduled_at" required>
        <label>Étape</label>
        <select name="tournament_id" required>
          ${(etapes||[]).map(e=>`<option value="${e.id}">${esc(e.nom)}</option>`).join('')}
        </select>
        <label>Court (optionnel)</label>
        <input name="court" placeholder="Ex: Court 3">
        <label>Tour / phase (optionnel)</label>
        <input name="tour" placeholder="Ex: 1er tour">
        <label>Coach accompagnant (optionnel)</label>
        <div class="chk-group">
          ${(allPlayers||[]).length === 0 ? '<p class="muted">Aucun coach disponible</p>' : ''}
          ${(teamCoaches||[]).map((c,i)=>`<div class="chk-item"><input type="checkbox" name="match_coach_ids" value="${c.id}" id="qmc_${i}"><label for="qmc_${i}">${esc(fullName(c))}</label></div>`).join('')}
        </div>
        <button class="btn clay" type="submit">Programmer</button>
        <div class="error" id="quickMatchErr"></div>
      </form>
    </div>` : '';

  shell(`
    <button class="btn ghost" onclick="history.back()">← ${esc(tournee.nom)}</button>
    ${weekNav}
    ${tabBar}
    ${mainHtml}
    ${formHtml}
  `, 'planning');

  window.setAdvMode = (btn, mode) => {
    btn.closest('.tabs').querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('advInterne').style.display = mode==='interne' ? '' : 'none';
    document.getElementById('advExterne').style.display = mode==='externe' ? '' : 'none';
  };

  document.getElementById('quickMatchForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const f = new FormData(e.target);
    const j1 = f.get('j1'), tid = f.get('tournament_id');
    const extNom = f.get('joueur_ext_nom')?.trim();
    const isExt = document.getElementById('advExterne')?.style.display !== 'none';
    const j2 = isExt ? null : f.get('j2');
    if(!isExt && (!j2 || j1===j2)){ document.getElementById('quickMatchErr').textContent='Choisis deux joueurs différents.'; return; }
    if(isExt && !extNom){ document.getElementById('quickMatchErr').textContent='Saisis le nom de l\'adversaire externe.'; return; }
    const { data: etape } = await supabase.from('tournaments').select('*, formats(*)').eq('id', tid).single();
    const { error } = await supabase.from('matches').insert({
      tournament_id: tid, joueur1_id:j1, joueur2_id:j2||null,
      joueur_ext_nom: isExt ? extNom : null,
      scheduled_at: new Date(f.get('scheduled_at')).toISOString(),
      court: f.get('court')||null, tour: f.get('tour')||null,
      live_state: initLiveState(etape.formats)
    });
    if(error){ document.getElementById('quickMatchErr').textContent=error.message; return; }
    // Affecter les coachs accompagnants
    const { data: newMatch } = await supabase.from('matches').select('id').eq('tournament_id', tid).eq('joueur1_id', j1).order('created_at', {ascending:false}).limit(1).single();
    const coachIds = [...(document.querySelectorAll('#quickMatchForm input[name=match_coach_ids]:checked'))].map(i=>i.value);
    if(newMatch && coachIds.length){
      await supabase.from('match_coaches').insert(coachIds.map(pid=>({ match_id: newMatch.id, profile_id: pid })));
    }
    toast('Match programmé ✅');
    viewTourneePlanning(tourneeId, weekOffset, viewMode);
  });
}
window.preselectPlayer = (playerId) => {
  const form = document.getElementById('quickMatchForm');
  if(!form) return;
  const j1 = form.querySelector('[name=j1]');
  if(j1){ j1.value = playerId; }
  form.scrollIntoView({ behavior:'smooth', block:'start' });
};
window.viewTourneePlanning = viewTourneePlanning;

// ---------------------------------------------------------------
// VUE : PERSONNES (joueurs + coachs de la tournée)
// ---------------------------------------------------------------

        <div style="display:flex;align-items:center;gap:10px">

            <div style="font-weight:700">${esc(fullName(p))}</div>

      <div class="row between">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:24px">🧑‍🏫</div>

          <button class="btn small" type="submit" style="width:auto">Inscrire</button>

      </form>` : ''}
      <form id="newPlayerForm">
        <div class="row" style="flex-wrap:wrap;gap:6px">

  document.getElementById('addExistingPlayerForm')?.addEventListener('submit', async e=>{
