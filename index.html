<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C0C0C">
<title>SetPoint — Programmation de tournée</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--s1:#141414;--s2:#1c1c1c;--s3:#262626;--brd:#3a3a3a;--accent:#d7e552;--green:#22c55e;--blue:#60a5fa;--yellow:#f59e0b;--red:#d94a35;--white:#fff;--gray:#a3a3a3;--head:'Barlow Condensed',sans-serif;--body:'Inter',sans-serif;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;background:var(--bg);color:var(--white);font-family:var(--body)}button,input,select,textarea{font-family:inherit}button{cursor:pointer}#app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--bg)}.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.login-box{width:100%;max-width:390px}.login-logo{font-family:var(--head);font-size:46px;font-weight:900;text-align:center;color:var(--accent);letter-spacing:2px;text-transform:uppercase}.login-sub{text-align:center;color:var(--gray);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:8px 0 26px}.card,.login-card{background:var(--s2);border:1px solid var(--brd);border-radius:18px;padding:14px;margin-bottom:12px}.login-card{padding:18px}.top{position:sticky;top:0;z-index:5;background:var(--s1);border-bottom:1px solid var(--brd);padding:14px 16px 10px;padding-top:calc(14px + env(safe-area-inset-top,0px));display:flex;justify-content:space-between;gap:12px}.brand{font-family:var(--head);font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}.subbrand{font-size:11px;color:var(--gray);margin-top:2px}.role-pill{font-family:var(--head);font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border:1px solid var(--brd);border-radius:999px;padding:7px 10px;background:var(--s2);color:#ddd}.main{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(84px + var(--safe))}.bottom{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;background:var(--s1);border-top:1px solid var(--brd);display:flex;padding:6px 4px calc(6px + var(--safe));z-index:10}.navbtn{flex:1;border:0;background:transparent;color:var(--gray);padding:8px 3px;border-radius:10px}.navbtn.active{color:#0c0c0c;background:var(--accent)}.ico{font-size:19px;display:block}.lbl{font-family:var(--head);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;display:block;margin-top:2px}.title{font-family:var(--head);font-size:25px;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin:0 0 4px}.card-title{font-family:var(--head);font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin:0 0 10px}.muted{color:var(--gray);font-size:13px;line-height:1.5}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row{display:flex;gap:10px;align-items:center}.between{justify-content:space-between}.stat{background:var(--s3);border:1px solid var(--brd);border-radius:12px;padding:12px;text-align:center}.stat .num{font-family:var(--head);font-size:30px;font-weight:900;color:var(--accent);line-height:1}.stat .txt{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);margin-top:3px}.btn{width:100%;border:0;border-radius:12px;padding:13px 14px;background:var(--accent);color:#0c0c0c;font-family:var(--head);font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;margin-top:10px}.btn.secondary{background:var(--s3);color:#fff;border:1px solid var(--brd)}.btn.small{width:auto;margin:0;padding:9px 12px;font-size:12px}.field{margin-bottom:11px}label{display:block;margin:0 0 6px;color:var(--gray);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:800}input,select,textarea{width:100%;background:var(--s3);color:#fff;border:1px solid var(--brd);border-radius:12px;padding:12px;font-size:15px;outline:none}textarea{min-height:84px}.day{background:var(--s2);border:1px solid var(--brd);border-radius:16px;margin-bottom:12px;overflow:hidden}.day-head{padding:12px 14px;background:var(--s3);border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center}.day-title{font-family:var(--head);font-size:19px;font-weight:900;text-transform:uppercase}.event{padding:12px 14px;border-bottom:1px solid var(--brd)}.event:last-child{border-bottom:0}.event-time{font-family:var(--head);font-weight:900;color:var(--accent);font-size:18px;min-width:58px}.event-main{flex:1}.event-name{font-weight:800;font-size:14px}.event-meta{font-size:12px;color:var(--gray);margin-top:3px;line-height:1.45}.chipline{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;border:1px solid var(--brd);color:#ddd;background:var(--s3)}.pill.green{color:var(--green);border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.08)}.pill.blue{color:var(--blue);border-color:rgba(96,165,250,.35);background:rgba(96,165,250,.08)}.pill.yellow{color:var(--yellow);border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.08)}.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#0c0c0c;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:900}.player{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--brd);border-radius:12px;background:var(--s3);margin-bottom:8px}.player-info{flex:1}.player-name{font-weight:800}.player-meta{font-size:12px;color:var(--gray);margin-top:2px}.select-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pick{border:1px solid var(--brd);border-radius:12px;padding:10px;background:var(--s3);font-size:13px}.pick input{width:auto;margin-right:7px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:50;display:none;align-items:flex-end}.modal.open{display:flex}.sheet{width:100%;max-width:560px;margin:0 auto;background:var(--s1);border-top:1px solid var(--brd);border-radius:20px 20px 0 0;padding:18px 16px calc(18px + var(--safe));max-height:86vh;overflow-y:auto}.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.x{background:transparent;border:0;color:var(--gray);font-size:28px;line-height:1}.empty{text-align:center;color:var(--gray);padding:36px 12px}.toast{position:fixed;left:50%;bottom:calc(84px + var(--safe));transform:translateX(-50%);background:var(--s1);border:1px solid var(--accent);color:#fff;padding:10px 14px;border-radius:999px;z-index:80;font-size:13px;display:none;max-width:90%;text-align:center}.toast.on{display:block}
</style>
</head>
<body>
<div id="app">
<section id="loginScreen" class="screen active"><div class="login"><div class="login-box"><div class="login-logo">SetPoint</div><div class="login-sub">Programmation de tournée tennis</div><div class="login-card"><div class="card-title">Connexion Supabase</div><div class="muted">Connecte-toi avec un compte créé dans Supabase Auth.</div><div class="field" style="margin-top:14px"><label>Email</label><input id="email" placeholder="email"></div><div class="field"><label>Mot de passe</label><input id="password" type="password" placeholder="mot de passe"></div><button class="btn" id="loginBtn">Entrer</button><button class="btn secondary" id="demoBtn">Démo locale</button></div></div></div></section>
<section id="appScreen" class="screen"><header class="top"><div><div class="brand">SetPoint</div><div id="tourneeLabel" class="subbrand">Chargement…</div></div><button class="role-pill" id="logoutBtn">Sortir</button></header><main class="main" id="main"></main><nav class="bottom" id="bottomNav"></nav></section>
</div>
<div class="modal" id="modal"><div class="sheet"><div class="sheet-head"><div class="card-title" id="modalTitle">Ajouter</div><button class="x" id="closeBtn">×</button></div><div id="modalBody"></div></div></div><div class="toast" id="toast"></div>
<script type="module">
import { createClient } from './supabase.bundle.js';
const SUPABASE_URL='https://oijaymahnevydzfgqlhi.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pamF5bWFobmV2eWR6ZmdxbGhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTA2ODYsImV4cCI6MjA5NjkyNjY4Nn0.MSbDrZazhsMubD75CW1LJT7snQar6MJJDuf1K2JFgYE';
const supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
const state={demo:false,profile:null,tab:'dashboard',tournee:null,players:[],coaches:[],events:[],debriefs:[],activePlayer:null};
const navs={admin:[['dashboard','🏠','Dashboard'],['planning','📅','Planning'],['players','👥','Joueurs'],['matches','🎾','Matchs'],['settings','⚙️','Réglages']],coach_principal:[['dashboard','🏠','Tournée'],['planning','📅','Planning'],['players','👥','Joueurs'],['matches','🎾','Matchs'],['debriefs','📝','Debriefs']],coach:[['dashboard','🏠','Tournée'],['planning','📅','Planning'],['matches','🎾','Matchs'],['debriefs','📝','Debriefs']],parent:[['dashboard','🏠','Accueil'],['matches','🎾','Matchs'],['tournee','🧳','Tournée'],['settings','👤','Profil']]};
$('loginBtn').onclick=login;$('demoBtn').onclick=startDemo;$('logoutBtn').onclick=logout;$('closeBtn').onclick=closeModal;
async function login(){try{const {data,error}=await supabase.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(error)throw error;await boot()}catch(e){toast(e.message||'Connexion impossible')}}
async function logout(){if(!state.demo)await supabase.auth.signOut();location.reload()}
async function boot(){await loadData();$('loginScreen').classList.remove('active');$('appScreen').classList.add('active');render()}
async function loadData(){if(state.demo)return loadDemo();const user=(await supabase.auth.getUser()).data.user;if(!user)throw new Error('Session introuvable');let {data:profile,error:pErr}=await supabase.from('profiles').select('*').eq('id',user.id).single();if(pErr)throw pErr;state.profile=profile;let {data:tournee,error:tErr}=await supabase.from('tournees').select('*').eq('status','active').order('start_date',{ascending:true}).limit(1).single();if(tErr)throw tErr;state.tournee=tournee;let {data:players}=await supabase.from('players').select('*').eq('tournee_id',tournee.id).order('full_name');state.players=players||[];state.activePlayer=profile.parent_player_id||state.players[0]?.id;let {data:coaches}=await supabase.from('tournee_coaches').select('is_principal,profiles(id,full_name,role)').eq('tournee_id',tournee.id);state.coaches=(coaches||[]).map(c=>({...c.profiles,is_principal:c.is_principal}));let {data:events}=await supabase.from('events').select('*, event_players(player_id)').eq('tournee_id',tournee.id).order('day_date').order('start_time');state.events=(events||[]).map(e=>({...e,players:(e.event_players||[]).map(x=>x.player_id)}));let {data:debriefs}=await supabase.from('debriefs').select('*').order('created_at',{ascending:false});state.debriefs=debriefs||[]}
function loadDemo(){state.profile={id:'demo-admin',full_name:'Jimmy',role:'coach_principal'};state.tournee={id:'tour-demo',name:'Tournée Été 2027',location:'Tours / Blois',start_date:'2027-07-12',end_date:'2027-07-18'};state.coaches=[{id:'c1',full_name:'Jimmy',role:'coach_principal',is_principal:true},{id:'c2',full_name:'Lohan',role:'coach'},{id:'c3',full_name:'Sarah',role:'coach'}];state.players=[{id:'p1',full_name:'Maïwenn',category:'13 ans',ranking:'15/1'},{id:'p2',full_name:'Lucas',category:'14 ans',ranking:'15/2'},{id:'p3',full_name:'Emma',category:'13 ans',ranking:'30'},{id:'p4',full_name:'Nathan',category:'15 ans',ranking:'15/3'}];state.activePlayer='p1';state.events=[{id:'e1',type:'match',day_date:'2027-07-12',start_time:'09:30',title:'Open de Tours — 1er tour',details:'Court 4 · adversaire à confirmer',coach_id:'c2',status:'planned',players:['p1'],score:null,result:null},{id:'e2',type:'training',day_date:'2027-07-12',start_time:'11:30',title:'Entraînement retour/service',details:'Terrain annexe · 1h15',coach_id:'c3',status:'planned',players:['p2','p3']},{id:'e3',type:'training',day_date:'2027-07-13',start_time:'10:00',title:'Entraînement tactique',details:'Schémas de jeu + retour croisé · 1h',coach_id:'c1',status:'planned',players:['p1','p4']}];state.debriefs=[]}
function startDemo(){state.demo=true;loadDemo();$('loginScreen').classList.remove('active');$('appScreen').classList.add('active');render()}
function canPlan(){return ['admin','coach_principal'].includes(state.profile?.role)}function roleName(){return state.profile?.role==='coach_principal'?'Coach principal':state.profile?.role==='parent'?'Parent':state.profile?.role==='coach'?'Coach':'Admin'}function nameOfPlayer(id){return state.players.find(p=>p.id===id)?.full_name||'Joueur'}function nameOfCoach(id){return state.coaches.find(c=>c.id===id)?.full_name||'Coach'}function fmtDate(d){return new Date(d+'T00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'})}function fmtTime(t){return (t||'').slice(0,5)}
function visibleEvents(){if(state.profile?.role==='parent')return state.events.filter(e=>e.type==='match'&&e.players.includes(state.activePlayer));return state.events}function render(){if(!state.profile)return;$('tourneeLabel').textContent=(state.tournee?.name||'Tournée')+' · '+(state.tournee?.location||'');renderNav();const views={dashboard:viewDashboard,planning:viewPlanning,players:viewPlayers,matches:viewMatches,debriefs:viewDebriefs,tournee:viewTournee,settings:viewSettings};$('main').innerHTML=(views[state.tab]||viewDashboard)()}function renderNav(){$('bottomNav').innerHTML=(navs[state.profile.role]||navs.parent).map(n=>`<button class="navbtn ${state.tab===n[0]?'active':''}" data-tab="${n[0]}"><span class="ico">${n[1]}</span><span class="lbl">${n[2]}</span></button>`).join('');document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()})}
function eventLine(e){return `<div class="event"><div class="row"><div class="event-time">${fmtTime(e.start_time)}</div><div class="event-main"><div class="event-name">${e.type==='training'?'🏋️':'🎾'} ${e.title}</div><div class="event-meta">Coach : ${nameOfCoach(e.coach_id)}<br>${e.details||''}</div><div class="chipline"><span class="pill ${e.type==='training'?'blue':'yellow'}">${e.type==='training'?'Entraînement':'Match'}</span>${e.players.map(id=>`<span class="pill">${nameOfPlayer(id)}</span>`).join('')}<span class="pill green">${e.status}</span></div></div></div></div>`}
function groupedEvents(list){const days=[...new Set(list.map(e=>e.day_date))];return days.map(d=>`<div class="day"><div class="day-head"><div class="day-title">${fmtDate(d)}</div><span class="pill">${list.filter(e=>e.day_date===d).length} créneau(x)</span></div>${list.filter(e=>e.day_date===d).sort((a,b)=>a.start_time.localeCompare(b.start_time)).map(eventLine).join('')}</div>`).join('')||'<div class="empty">Aucun créneau.</div>'}
function viewDashboard(){if(state.profile.role==='parent')return `<h1 class="title">Accueil parent</h1><p class="muted">Vue limitée à ${nameOfPlayer(state.activePlayer)} : matchs, résultats et infos tournée. Pas d'entraînements ni de debriefs.</p><div class="card"><div class="card-title">Prochain match</div>${groupedEvents(visibleEvents().slice(0,1))}</div>`;return `<h1 class="title">Programmation tournée</h1><p class="muted">Le coach principal programme la tournée : coachs, joueurs, matchs et entraînements multi-joueurs.</p><div class="grid2"><div class="stat"><div class="num">${state.players.length}</div><div class="txt">Joueurs</div></div><div class="stat"><div class="num">${state.coaches.length}</div><div class="txt">Coachs</div></div><div class="stat"><div class="num">${state.events.filter(e=>e.type==='match').length}</div><div class="txt">Matchs</div></div><div class="stat"><div class="num">${state.events.filter(e=>e.type==='training').length}</div><div class="txt">Entraînements</div></div></div><div class="card"><div class="card-title">Action rapide</div><div class="muted">Ajoute un match ou un entraînement avec plusieurs joueurs.</div>${canPlan()?'<button class="btn" id="addEventBtn">Programmer un créneau</button>':''}</div>`}
function viewPlanning(){setTimeout(bindAdd,0);return `<div class="row between"><div><h1 class="title">Planning</h1><p class="muted">Vue jour par jour : matchs + entraînements.</p></div>${canPlan()?'<button class="btn small" id="addEventBtn2">+ Créneau</button>':''}</div>${groupedEvents(visibleEvents())}`}function viewPlayers(){return `<h1 class="title">Joueurs tournée</h1><p class="muted">Un joueur appartient à une seule tournée active.</p>${state.players.map(p=>`<div class="player"><div class="avatar">${p.full_name[0]}</div><div class="player-info"><div class="player-name">${p.full_name}</div><div class="player-meta">${p.category||''} · ${p.ranking||''}</div></div><span class="pill green">actif</span></div>`).join('')}`}function viewMatches(){setTimeout(bindAdd,0);return `<div class="row between"><div><h1 class="title">Matchs</h1><p class="muted">Programmation et résultats.</p></div>${canPlan()?'<button class="btn small" id="addEventBtn2">+ Match</button>':''}</div>${groupedEvents(visibleEvents().filter(e=>e.type==='match'))}<div class="card"><div class="card-title">Résultats</div>${state.events.filter(e=>e.type==='match'&&e.score&&(state.profile.role!=='parent'||e.players.includes(state.activePlayer))).map(e=>`<div class="event"><div class="event-name">${e.result==='win'?'✅':'❌'} ${nameOfPlayer(e.players[0])} — ${e.title}</div><div class="event-meta">Score : ${e.score}</div></div>`).join('')||'<div class="empty">Aucun résultat.</div>'}</div>`}function viewDebriefs(){setTimeout(()=>{$('debriefBtn')&&($('debriefBtn').onclick=openDebrief)},0);return `<h1 class="title">Debriefs coach</h1><p class="muted">Non visible par les parents.</p><button class="btn" id="debriefBtn">Ajouter un debrief</button><div class="card">${state.debriefs.map(d=>`<div class="event"><div class="event-name">📝 ${nameOfPlayer(d.player_id)}</div><div class="event-meta">Mental ${d.mental}/5 · Service ${d.service}/5 · Retour ${d.return_game}/5<br>${d.comment||''}</div></div>`).join('')||'<div class="empty">Aucun debrief.</div>'}</div>`}function viewTournee(){return `<h1 class="title">Infos tournée</h1><div class="card"><div class="card-title">${state.tournee.name}</div><div class="muted">${state.tournee.location||''}<br>${state.tournee.start_date||''} → ${state.tournee.end_date||''}</div></div><div class="card"><div class="card-title">Contact</div><div class="muted">Coach principal : ${state.coaches.find(c=>c.is_principal)?.full_name||'À définir'}</div></div>`}function viewSettings(){return `<h1 class="title">Profil</h1><div class="card"><div class="card-title">Session</div><div class="muted">${state.profile.full_name}<br>${roleName()}<br>${state.demo?'Mode démo locale':'Mode Supabase'}</div><button class="btn secondary" onclick="location.reload()">Se déconnecter</button></div>`}
function bindAdd(){['addEventBtn','addEventBtn2'].forEach(id=>$(id)&&($(id).onclick=()=>openAddEvent()))}function playerChecks(){return `<div class="select-list">${state.players.map(p=>`<label class="pick"><input type="checkbox" name="evPlayers" value="${p.id}">${p.full_name}</label>`).join('')}</div>`}function openAddEvent(){$('modalTitle').textContent='Programmer un créneau';$('modalBody').innerHTML=`<div class="grid2"><div class="field"><label>Type</label><select id="evType"><option value="training">Entraînement</option><option value="match">Match</option></select></div><div class="field"><label>Date</label><input id="evDate" type="date" value="${state.tournee.start_date||''}"></div></div><div class="grid2"><div class="field"><label>Heure</label><input id="evTime" type="time" value="10:00"></div><div class="field"><label>Coach</label><select id="evCoach">${state.coaches.map(c=>`<option value="${c.id}">${c.full_name}</option>`).join('')}</select></div></div><div class="field"><label>Joueurs concernés</label>${playerChecks()}</div><div class="field"><label>Titre</label><input id="evTitle" value="Entraînement service / retour"></div><div class="field"><label>Détail</label><textarea id="evDetails">Terrain annexe · 1h15</textarea></div><button class="btn" id="saveEventBtn">Enregistrer</button>`;$('saveEventBtn').onclick=saveEvent;$('modal').classList.add('open')}async function saveEvent(){let players=[...document.querySelectorAll('input[name="evPlayers"]:checked')].map(x=>x.value);if($('evType').value==='match'&&players.length>1)players=[players[0]];if(!players.length)return toast('Sélectionne au moins un joueur');if(state.demo){state.events.push({id:'e'+Date.now(),type:$('evType').value,day_date:$('evDate').value,start_time:$('evTime').value,title:$('evTitle').value,details:$('evDetails').value,coach_id:$('evCoach').value,status:'planned',players});closeModal();render();return toast('Créneau ajouté en démo')}let {data,error}=await supabase.from('events').insert({tournee_id:state.tournee.id,type:$('evType').value,day_date:$('evDate').value,start_time:$('evTime').value,title:$('evTitle').value,details:$('evDetails').value,coach_id:$('evCoach').value,created_by:state.profile.id}).select().single();if(error)return toast(error.message);let {error:epErr}=await supabase.from('event_players').insert(players.map(player_id=>({event_id:data.id,player_id})));if(epErr)return toast(epErr.message);closeModal();await loadData();render();toast('Créneau enregistré dans Supabase')}function openDebrief(){let matches=state.events.filter(e=>e.type==='match');$('modalTitle').textContent='Ajouter un debrief';$('modalBody').innerHTML=`<div class="field"><label>Match</label><select id="dbEvent">${matches.map(e=>`<option value="${e.id}">${fmtDate(e.day_date)} ${fmtTime(e.start_time)} — ${e.title}</option>`).join('')}</select></div><div class="field"><label>Joueur</label><select id="dbPlayer">${state.players.map(p=>`<option value="${p.id}">${p.full_name}</option>`).join('')}</select></div><div class="grid2"><div class="field"><label>Mental /5</label><input id="dbMental" type="number" min="1" max="5" value="4"></div><div class="field"><label>Service /5</label><input id="dbService" type="number" min="1" max="5" value="4"></div></div><div class="field"><label>Commentaire</label><textarea id="dbComment">Bon engagement. Axe de travail à programmer au prochain entraînement.</textarea></div><button class="btn" id="saveDebriefBtn">Enregistrer</button>`;$('saveDebriefBtn').onclick=saveDebrief;$('modal').classList.add('open')}async function saveDebrief(){const row={event_id:$('dbEvent').value,player_id:$('dbPlayer').value,coach_id:state.profile.id,mental:+$('dbMental').value,service:+$('dbService').value,return_game:3,movement:3,tactics:3,emotion:3,comment:$('dbComment').value};if(state.demo){state.debriefs.unshift(row);closeModal();render();return toast('Debrief ajouté en démo')}let {error}=await supabase.from('debriefs').insert(row);if(error)return toast(error.message);closeModal();await loadData();render();toast('Debrief enregistré')}function closeModal(){$('modal').classList.remove('open')}function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('on'),2600)}
(async()=>{try{const {data}=await supabase.auth.getSession();if(data.session)await boot()}catch(e){console.warn(e)}})();
</script>
