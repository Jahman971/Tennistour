<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TennisTour — Planning tournée</title>

<style>
:root{
  --bg:#0f1115;
  --card:#181b22;
  --card2:#20242d;
  --line:#303541;
  --txt:#ffffff;
  --muted:#9ca3af;
  --accent:#d7e552;
  --red:#d65a3a;
  --green:#31a66a;
  --blue:#4f8cff;
  --radius:14px;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--txt);
  font-family:Arial, sans-serif;
}
#app{
  max-width:620px;
  margin:auto;
  min-height:100vh;
}
header{
  position:sticky;
  top:0;
  z-index:20;
  background:#11141a;
  border-bottom:1px solid var(--line);
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.brand{
  font-weight:900;
  letter-spacing:1px;
  color:var(--accent);
}
.role{
  font-size:12px;
  color:var(--muted);
  border:1px solid var(--line);
  padding:6px 10px;
  border-radius:999px;
}
main{
  padding:16px 16px 90px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:12px;
}
.card2{background:var(--card2)}
h1,h2,h3{margin:0 0 10px}
h2{font-size:21px}
h3{
  font-size:15px;
  text-transform:uppercase;
  letter-spacing:.8px;
}
p{margin:6px 0}
.muted{color:var(--muted);font-size:13px}
label{
  display:block;
  margin:12px 0 6px;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}
input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#11141a;
  color:var(--txt);
  font-size:15px;
}
textarea{min-height:80px}
button{
  border:0;
  border-radius:10px;
  padding:12px;
  font-weight:800;
  cursor:pointer;
}
.btn{
  width:100%;
  background:var(--accent);
  color:#111;
  margin-top:12px;
}
.btn2{
  background:var(--card2);
  color:var(--txt);
  border:1px solid var(--line);
}
.btn-red{background:var(--red);color:white}
.row{
  display:flex;
  gap:8px;
  align-items:center;
}
.between{justify-content:space-between}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.pill{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}
.live{background:rgba(214,90,58,.15);color:var(--red)}
.done{background:rgba(49,166,106,.15);color:var(--green)}
.plan{background:rgba(79,140,255,.15);color:var(--blue)}
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-width:620px;
  margin:auto;
  background:#11141a;
  border-top:1px solid var(--line);
  display:flex;
  padding:8px;
}
.nav button{
  flex:1;
  background:none;
  color:var(--muted);
  font-size:12px;
}
.nav button.active{color:var(--accent)}
.day-title{
  margin:20px 0 8px;
  color:var(--accent);
  text-transform:capitalize;
}
.event-time{
  font-weight:900;
  color:var(--accent);
}
.small{
  font-size:12px;
  padding:8px 10px;
  width:auto;
}
.empty{
  text-align:center;
  color:var(--muted);
  padding:30px 10px;
}
.code{
  display:inline-block;
  color:var(--accent);
  border:1px dashed var(--accent);
  padding:5px 9px;
  border-radius:8px;
  letter-spacing:2px;
}
</style>
</head>

<body>
<div id="app">Chargement...</div>

<script type="module">
import { createClient } from './supabase.bundle.js';

/* =========================
   CONFIG SUPABASE
========================= */

const SUPABASE_URL = 'https://oijaymahnevydzfgqlhi.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_49oduZZ5jt9TOo1p4oTbpw_LwpbWUXV';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const app = document.getElementById('app');

const STATE = {
  session:null,
  profile:null,
  route:'#/'
};

/* =========================
   HELPERS
========================= */

const esc = v => (v ?? '').toString().replace(/[&<>"']/g, c => ({
  '&':'&amp;',
  '<':'&lt;',
  '>':'&gt;',
  '"':'&quot;',
  "'":'&#39;'
}[c]));

const fullName = p => [p?.prenom, p?.nom].filter(Boolean).join(' ') || p?.nom || '—';

const formatDate = iso => {
  if(!iso) return 'Non planifié';
  return new Intl.DateTimeFormat('fr-FR',{
    weekday:'long',
    day:'numeric',
    month:'long'
  }).format(new Date(iso));
};

const formatTime = iso => {
  if(!iso) return '';
  return new Intl.DateTimeFormat('fr-FR',{
    hour:'2-digit',
    minute:'2-digit'
  }).format(new Date(iso));
};

function go(hash){
  location.hash = hash;
}

function toast(msg){
  alert(msg);
}

function genCode(){
  return Array.from({length:5}, () =>
    'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]
  ).join('');
}

/* =========================
   SHELL
========================= */

function shell(content, active='planning'){
  const role = STATE.profile?.role || 'parent';

  app.innerHTML = `
    <header>
      <div class="brand">🎾 TennisTour</div>
      <div class="role">${esc(role)}</div>
    </header>

    <main>${content}</main>

    ${STATE.profile ? `
    <div class="nav">
      <button class="${active==='tournees'?'active':''}" onclick="go('#/tournees')">Tournées</button>
      <button class="${active==='planning'?'active':''}" onclick="go('#/planning')">Planning</button>
      <button class="${active==='joueurs'?'active':''}" onclick="go('#/joueurs')">Joueurs</button>
      <button class="${active==='profil'?'active':''}" onclick="go('#/profil')">Profil</button>
    </div>` : ''}
  `;
}

window.go = go;

/* =========================
   LOGIN UNIQUE
========================= */

function viewLogin(){
  app.innerHTML = `
    <main style="padding-top:60px">
      <div style="text-align:center;margin-bottom:24px">
        <h1 style="color:var(--accent)">🎾 TennisTour</h1>
        <p class="muted">Programmation de tournée tennis</p>
      </div>

      <div class="card">
        <h3>Accès parent / joueur</h3>
        <p class="muted">Entre le code joueur donné par le superviseur.</p>

        <label>Code joueur</label>
        <input id="playerCode" placeholder="Ex : A7K2P" maxlength="5" style="text-transform:uppercase">

        <button class="btn" onclick="loginByPlayerCode()">Voir le planning</button>
      </div>

      <div class="card">
        <h3>Accès admin / superviseur / coach</h3>

        <label>Email</label>
        <input id="email" type="email" placeholder="email">

        <label>Mot de passe</label>
        <input id="password" type="password" placeholder="mot de passe">

        <button class="btn" onclick="login()">Se connecter</button>
      </div>
    </main>
  `;
}

window.login = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    alert(error.message);
    return;
  }

  await loadSession();
};

window.loginByPlayerCode = () => {
  const code = document.getElementById('playerCode').value.trim().toUpperCase();
  if(!code) return alert('Entre un code joueur.');
  go('#/parent/' + code);
};

window.logout = async () => {
  await supabase.auth.signOut();
  STATE.session = null;
  STATE.profile = null;
  go('#/');
};

/* =========================
   LOAD SESSION
========================= */

async function loadSession(){
  const { data } = await supabase.auth.getSession();
  STATE.session = data.session;

  if(!STATE.session){
    STATE.profile = null;
    router();
    return;
  }

  const { data: profile } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', STATE.session.user.id)
    .maybeSingle();

  STATE.profile = profile;

  if(!location.hash || location.hash === '#/'){
    go('#/planning');
  }else{
    router();
  }
}

/* =========================
   PLANNING CENTRAL
========================= */

async function getPlanningForPlayer(playerId){
  const items = [];

  const { data: matches } = await supabase
    .from('matches')
    .select(`
      *,
      tournaments(nom, lieu, tournee_id, tournees(nom))
    `)
    .or(`joueur1_id.eq.${playerId},joueur2_id.eq.${playerId}`);

  const { data: trainings } = await supabase
    .from('training_players')
    .select(`
      player_id,
      trainings(*, tournees(nom))
    `)
    .eq('player_id', playerId);

  const playerIds = new Set();

  (matches || []).forEach(m => {
    playerIds.add(m.joueur1_id);
    playerIds.add(m.joueur2_id);
  });

  let playersMap = {};

  if(playerIds.size){
    const { data: players } = await supabase
      .from('players')
      .select('*')
      .in('id', [...playerIds]);

    (players || []).forEach(p => playersMap[p.id] = p);
  }

  (matches || []).forEach(m => {
    items.push({
      type:'match',
      date:m.scheduled_at,
      title:`Match : ${fullName(playersMap[m.joueur1_id])} vs ${fullName(playersMap[m.joueur2_id])}`,
      subtitle:m.tournaments?.nom || '',
      lieu:m.court || m.tournaments?.lieu || '',
      status:m.statut,
      id:m.id
    });
  });

  (trainings || []).forEach(link => {
    const t = link.trainings;
    if(!t) return;

    items.push({
      type:'training',
      date:t.scheduled_at,
      title:`Entraînement : ${t.titre}`,
      subtitle:t.tournees?.nom || '',
      lieu:t.lieu || '',
      status:'planifie',
      id:t.id
    });
  });

  return sortAndGroup(items);
}

async function getPlanningForCoach(profileId){
  const items = [];

  const { data: etapeLinks } = await supabase
    .from('etape_coaches')
    .select('tournament_id')
    .eq('profile_id', profileId);

  const tournamentIds = (etapeLinks || []).map(x => x.tournament_id);

  const { data: trainingLinks } = await supabase
    .from('training_coaches')
    .select('training_id')
    .eq('profile_id', profileId);

  const trainingIds = (trainingLinks || []).map(x => x.training_id);

  if(tournamentIds.length){
    const { data: matches } = await supabase
      .from('matches')
      .select(`
        *,
        tournaments(nom, lieu, tournees(nom))
      `)
      .in('tournament_id', tournamentIds);

    const ids = new Set();

    (matches || []).forEach(m => {
      ids.add(m.joueur1_id);
      ids.add(m.joueur2_id);
    });

    let playersMap = {};

    if(ids.size){
      const { data: players } = await supabase
        .from('players')
        .select('*')
        .in('id', [...ids]);

      (players || []).forEach(p => playersMap[p.id] = p);
    }

    (matches || []).forEach(m => {
      items.push({
        type:'match',
        date:m.scheduled_at,
        title:`Match : ${fullName(playersMap[m.joueur1_id])} vs ${fullName(playersMap[m.joueur2_id])}`,
        subtitle:m.tournaments?.nom || '',
        lieu:m.court || m.tournaments?.lieu || '',
        status:m.statut,
        id:m.id
      });
    });
  }

  if(trainingIds.length){
    const { data: trainings } = await supabase
      .from('trainings')
      .select('*, tournees(nom)')
      .in('id', trainingIds);

    (trainings || []).forEach(t => {
      items.push({
        type:'training',
        date:t.scheduled_at,
        title:`Entraînement : ${t.titre}`,
        subtitle:t.tournees?.nom || '',
        lieu:t.lieu || '',
        status:'planifie',
        id:t.id
      });
    });
  }

  return sortAndGroup(items);
}

async function getPlanningForSupervisor(){
  const teamId = STATE.profile.team_id;
  const items = [];

  const { data: tournees } = await supabase
    .from('tournees')
    .select('id')
    .eq('team_id', teamId);

  const tourneeIds = (tournees || []).map(t => t.id);

  if(!tourneeIds.length) return [];

  const { data: tournaments } = await supabase
    .from('tournaments')
    .select('id')
    .in('tournee_id', tourneeIds);

  const tournamentIds = (tournaments || []).map(t => t.id);

  if(tournamentIds.length){
    const { data: matches } = await supabase
      .from('matches')
      .select(`
        *,
        tournaments(nom, lieu, tournees(nom))
      `)
      .in('tournament_id', tournamentIds);

    const ids = new Set();

    (matches || []).forEach(m => {
      ids.add(m.joueur1_id);
      ids.add(m.joueur2_id);
    });

    let playersMap = {};

    if(ids.size){
      const { data: players } = await supabase
        .from('players')
        .select('*')
        .in('id', [...ids]);

      (players || []).forEach(p => playersMap[p.id] = p);
    }

    (matches || []).forEach(m => {
      items.push({
        type:'match',
        date:m.scheduled_at,
        title:`Match : ${fullName(playersMap[m.joueur1_id])} vs ${fullName(playersMap[m.joueur2_id])}`,
        subtitle:m.tournaments?.nom || '',
        lieu:m.court || m.tournaments?.lieu || '',
        status:m.statut,
        id:m.id
      });
    });
  }

  const { data: trainings } = await supabase
    .from('trainings')
    .select('*, tournees(nom)')
    .in('tournee_id', tourneeIds);

  (trainings || []).forEach(t => {
    items.push({
      type:'training',
      date:t.scheduled_at,
      title:`Entraînement : ${t.titre}`,
      subtitle:t.tournees?.nom || '',
      lieu:t.lieu || '',
      status:'planifie',
      id:t.id
    });
  });

  return sortAndGroup(items);
}

function sortAndGroup(items){
  items.sort((a,b) => (a.date || '').localeCompare(b.date || ''));

  const groups = {};

  items.forEach(item => {
    const key = item.date ? item.date.slice(0,10) : 'non-planifie';
    if(!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  return Object.entries(groups);
}

/* =========================
   VIEW PLANNING
========================= */

async function viewPlanning(){
  shell(`<div class="empty">Chargement du planning...</div>`, 'planning');

  let groups = [];

  if(STATE.profile.role === 'coach' && !STATE.profile.superviseur){
    groups = await getPlanningForCoach(STATE.profile.id);
  }else{
    groups = await getPlanningForSupervisor();
  }

  shell(`
    <h2>Planning global</h2>
    <p class="muted">Vue semaine et journée selon ton profil.</p>
    ${renderPlanningGroups(groups)}
  `, 'planning');
}

async function viewParentPlanning(code){
  const { data: player } = await supabase
    .from('players')
    .select('*')
    .eq('code', code)
    .maybeSingle();

  if(!player){
    app.innerHTML = `
      <main>
        <div class="card">
          <h3>Code introuvable</h3>
          <p class="muted">Vérifie le code donné par le coach.</p>
          <button class="btn" onclick="go('#/')">Retour</button>
        </div>
      </main>
    `;
    return;
  }

  const groups = await getPlanningForPlayer(player.id);

  app.innerHTML = `
    <header>
      <div class="brand">🎾 TennisTour</div>
      <div class="role">Parent</div>
    </header>

    <main>
      <h2>${esc(fullName(player))}</h2>
      <p class="muted">Planning joueur — code <span class="code">${esc(player.code)}</span></p>

      ${renderPlanningGroups(groups)}

      <button class="btn btn2" onclick="go('#/')">Quitter</button>
    </main>
  `;
}

function renderPlanningGroups(groups){
  if(!groups.length){
    return `<div class="empty">Aucun événement planifié.</div>`;
  }

  return groups.map(([day, items]) => `
    <h3 class="day-title">${day === 'non-planifie' ? 'Non planifié' : formatDate(day)}</h3>

    ${items.map(item => `
      <div class="card ${item.type === 'training' ? 'card2' : ''}">
        <div class="row between">
          <div>
            <div class="event-time">${item.date ? formatTime(item.date) : '--:--'}</div>
            <strong>${esc(item.title)}</strong>
          </div>

          <span class="pill ${
            item.status === 'en_cours' ? 'live' :
            item.status === 'termine' ? 'done' : 'plan'
          }">
            ${item.type === 'match' ? 'Match' : 'Training'}
          </span>
        </div>

        <p class="muted">${esc(item.subtitle)}</p>
        ${item.lieu ? `<p class="muted">📍 ${esc(item.lieu)}</p>` : ''}

        ${item.type === 'match' && STATE.profile ? `
          <button class="btn2 small" onclick="go('#/match/${item.id}')">Ouvrir</button>
        ` : ''}
      </div>
    `).join('')}
  `).join('');
}

/* =========================
   VIEW TOURNÉES
========================= */

async function viewTournees(){
  shell(`<div class="empty">Chargement...</div>`, 'tournees');

  const teamId = STATE.profile.team_id;

  const { data: tournees } = await supabase
    .from('tournees')
    .select('*')
    .eq('team_id', teamId)
    .order('date_debut', { ascending:false });

  shell(`
    <h2>Tournées</h2>
    <p class="muted">Une tournée contient 1 à N tournois et 1 à N entraînements.</p>

    ${(tournees || []).map(t => `
      <div class="card" onclick="go('#/tournee/${t.id}')">
        <h3>${esc(t.nom)}</h3>
        <p class="muted">${esc(t.lieu || '')}</p>
        <p class="muted">${esc(t.date_debut || '')} → ${esc(t.date_fin || '')}</p>
      </div>
    `).join('') || `<div class="empty">Aucune tournée.</div>`}

    ${STATE.profile.role === 'admin' || STATE.profile.superviseur ? `
      <div class="card">
        <h3>Créer une tournée</h3>

        <label>Nom</label>
        <input id="tourneeNom" placeholder="Ex : Tournée été 2026">

        <label>Lieu</label>
        <input id="tourneeLieu" placeholder="Ex : Bretagne">

        <div class="grid2">
          <div>
            <label>Début</label>
            <input id="tourneeDebut" type="date">
          </div>
          <div>
            <label>Fin</label>
            <input id="tourneeFin" type="date">
          </div>
        </div>

        <button class="btn" onclick="createTournee()">Créer</button>
      </div>
    ` : ''}
  `, 'tournees');
}

window.createTournee = async () => {
  const payload = {
    nom:document.getElementById('tourneeNom').value.trim(),
    lieu:document.getElementById('tourneeLieu').value.trim(),
    date_debut:document.getElementById('tourneeDebut').value || null,
    date_fin:document.getElementById('tourneeFin').value || null,
    team_id:STATE.profile.team_id,
    created_by:STATE.profile.id
  };

  if(!payload.nom) return alert('Nom obligatoire.');

  const { error } = await supabase.from('tournees').insert(payload);

  if(error) return alert(error.message);

  viewTournees();
};

/* =========================
   DETAIL TOURNÉE
========================= */

async function viewTournee(id){
  shell(`<div class="empty">Chargement...</div>`, 'tournees');

  const { data: tournee } = await supabase
    .from('tournees')
    .select('*')
    .eq('id', id)
    .maybeSingle();

  const { data: tournaments } = await supabase
    .from('tournaments')
    .select('*')
    .eq('tournee_id', id)
    .order('date_debut');

  const { data: trainings } = await supabase
    .from('trainings')
    .select('*')
    .eq('tournee_id', id)
    .order('scheduled_at');

  const { data: playersLinks } = await supabase
    .from('tournee_players')
    .select('players(*)')
    .eq('tournee_id', id);

  const players = (playersLinks || []).map(x => x.players).filter(Boolean);

  shell(`
    <button class="btn2 small" onclick="go('#/tournees')">← Retour</button>

    <h2>${esc(tournee?.nom)}</h2>
    <p class="muted">${esc(tournee?.lieu || '')}</p>

    <div class="card">
      <h3>Pyramide de la tournée</h3>
      <p>🎾 ${tournaments?.length || 0} tournoi(s)</p>
      <p>🏋️ ${trainings?.length || 0} entraînement(s)</p>
      <p>👥 ${players.length} joueur(s)</p>
    </div>

    <div class="card">
      <h3>Joueurs de la tournée</h3>
      ${players.map(p => `
        <div class="row between" style="border-bottom:1px solid var(--line);padding:8px 0">
          <span>${esc(fullName(p))}</span>
          <span class="code">${esc(p.code)}</span>
        </div>
      `).join('') || `<p class="muted">Aucun joueur affecté.</p>`}
    </div>

    <div class="card">
      <h3>Tournois / étapes</h3>
      ${(tournaments || []).map(t => `
        <div class="card card2" onclick="go('#/tournoi/${t.id}')">
          <strong>${esc(t.nom)}</strong>
          <p class="muted">${esc(t.lieu || '')}</p>
          <p class="muted">${esc(t.date_debut || '')} → ${esc(t.date_fin || '')}</p>
        </div>
      `).join('') || `<p class="muted">Aucun tournoi.</p>`}
    </div>

    <div class="card">
      <h3>Entraînements</h3>
      ${(trainings || []).map(t => `
        <div class="card card2">
          <strong>${esc(t.titre)}</strong>
          <p class="muted">${t.scheduled_at ? formatDate(t.scheduled_at) + ' · ' + formatTime(t.scheduled_at) : 'Non planifié'}</p>
          <p class="muted">${esc(t.lieu || '')}</p>
        </div>
      `).join('') || `<p class="muted">Aucun entraînement.</p>`}
    </div>

    ${STATE.profile.role === 'admin' || STATE.profile.superviseur ? renderTourneeAdminForms(id) : ''}
  `, 'tournees');

function renderTourneeAdminForms(tourneeId){

async function viewJoueurs(){
  shell(`<div class="empty">Chargement...</div>`, 'joueurs');

  const { data: players } = await supabase
    .from('players')
    .select('*')
    .eq('team_id', STATE.profile.team_id)
    .order('nom');

  shell(`
    <h2>Joueurs</h2>

    ${(players || []).map(p => `
      <div class="card">
        <div class="row between">
          <strong>${esc(fullName(p))}</strong>
          <span class="code">${esc(p.code)}</span>
        </div>

    ${STATE.profile.role === 'admin' || STATE.profile.superviseur ? `
      <div class="card">
        <h3>Ajouter joueur</h3>

        <label>Prénom</label>
        <input id="playerPrenom">

        <label>Nom</label>
        <input id="playerNom">

        <button class="btn" onclick="createPlayer()">Ajouter</button>
      </div>
    ` : ''}
  `, 'joueurs');
}

window.createPlayer = async () => {
  const payload = {
    prenom:document.getElementById('playerPrenom').value.trim(),
    nom:document.getElementById('playerNom').value.trim(),
    team_id:STATE.profile.team_id,
    code:genCode()
  };

  if(!payload.nom) return alert('Nom obligatoire.');

  const { error } = await supabase.from('players').insert(payload);

  if(error) return alert(error.message);

  viewJoueurs();
};

/* =========================
   MATCH
========================= */

async function viewMatch(id){
  shell(`<div class="empty">Chargement match...</div>`, 'planning');

  const { data: match } = await supabase
    .from('matches')
    .select('*, tournaments(nom)')
    .eq('id', id)
    .maybeSingle();

  const { data: players } = await supabase
    .from('players')
    .select('*')
    .in('id', [match.joueur1_id, match.joueur2_id]);

  const p1 = players.find(p => p.id === match.joueur1_id);
  const p2 = players.find(p => p.id === match.joueur2_id);

  shell(`
    <button class="btn2 small" onclick="go('#/planning')">← Retour</button>

    <div class="card">
      <h3>${esc(match.tournaments?.nom || 'Match')}</h3>

      <p><strong>${esc(fullName(p1))}</strong> vs <strong>${esc(fullName(p2))}</strong></p>
      <p class="muted">${match.scheduled_at ? formatDate(match.scheduled_at) + ' · ' + formatTime(match.scheduled_at) : 'Non planifié'}</p>

      <label>Statut</label>
      <select id="matchStatus">
        <option value="a_venir" ${match.statut === 'a_venir' ? 'selected' : ''}>À venir</option>
        <option value="en_cours" ${match.statut === 'en_cours' ? 'selected' : ''}>En cours</option>
        <option value="termine" ${match.statut === 'termine' ? 'selected' : ''}>Terminé</option>
      </select>

      <label>Score</label>
      <input id="matchScore" value="${esc(match.score || '')}" placeholder="Ex : 6/3 4/6 10/8">

      <label>Débrief coach</label>
      <textarea id="matchDebrief">${esc(match.debrief || '')}</textarea>

      <button class="btn" onclick="saveMatch('${match.id}')">Enregistrer</button>
    </div>
  `, 'planning');
}

window.saveMatch = async id => {
  const payload = {
    statut:document.getElementById('matchStatus').value,
    score:document.getElementById('matchScore').value.trim(),
    debrief:document.getElementById('matchDebrief').value.trim()
  };

  const { error } = await supabase
    .from('matches')
    .update(payload)
    .eq('id', id);

  if(error) return alert(error.message);

  alert('Match enregistré.');
  go('#/planning');
};

/* =========================
   ROUTER
========================= */

async function router(){
  const hash = location.hash || '#/';

  if(hash === '#/'){
    viewLogin();
    return;
  }

  if(hash.startsWith('#/parent/')){
    const code = hash.split('/')[2];
    viewParentPlanning(code);
    return;
  }

  if(!STATE.session || !STATE.profile){
    viewLogin();
    return;
  }

  if(hash === '#/planning') return viewPlanning();
  if(hash === '#/tournees') return viewTournees();
  if(hash.startsWith('#/tournee/')) return viewTournee(hash.split('/')[2]);
  if(hash === '#/joueurs') return viewJoueurs();
  if(hash.startsWith('#/match/')) return viewMatch(hash.split('/')[2]);
  if(hash === '#/profil') return viewProfil();

  viewPlanning();
}

window.addEventListener('hashchange', router);

loadSession();
