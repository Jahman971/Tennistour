  document.getElementById('newPlayerForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const f = new FormData(e.target);
    const prenom = f.get('prenom').trim(), nom = f.get('nom').trim();
    if(!nom && !prenom){ toast('Saisis au moins le nom', true); return; }
    const code = genCode(), genre = f.get('genre')||null;
    const { data: pl, error } = await supabase.from('players').insert({ prenom:prenom||null, nom, code, genre, team_id: tournee.team_id, created_by: STATE.session.user.id }).select().single();
    if(error){ toast(error.message, true); return; }
    await supabase.from('tournee_players').insert({ tournee_id: tourneeId, player_id: pl.id });
    const etapeIds = [...e.target.querySelectorAll('input[name=etape_ids]:checked')].map(i=>i.value);
    if(etapeIds.length){
      await supabase.from('tournament_players').insert(etapeIds.map(eid=>({ tournament_id: eid, player_id: pl.id })));
    }
    toast(`${fullName(pl)} créé · code ${code}`);
    viewPersonnes(tourneeId);
  });
}

// ---------------------------------------------------------------
// VUE : COACH — Accueil selon rôle
// ---------------------------------------------------------------
async function viewCoachHome(){
  // Coach simple → redirige vers son planning
  if(!STATE.profile.superviseur){
    return viewMyPlanning();
  }
  // Superviseur → liste des tournées + création
  shell(`<div class="empty">Chargement…</div>`, 'home');
  const { data: myTeamLinks } = await supabase.from('coach_teams').select('team_id, teams(nom)').eq('profile_id', STATE.session.user.id);
  const myTeamIds = (myTeamLinks||[]).map(t=>t.team_id);
  const { data: tournees, error } = myTeamIds.length
    ? await supabase.from('tournees').select('*').in('team_id', myTeamIds).order('date_debut', { ascending:false })
    : { data: [], error: null };

  let list = '';
  if(error){ list = `<div class="error">${esc(error.message)}</div>`; }
  else if(!tournees.length){
    list = `<div class="empty-state"><div class="icon">🎾</div><p>Aucune tournée pour l'instant.<br>Commence par en créer une.</p></div>`;
  } else {
    list = tournees.map(t => `
      <div class="card" onclick="navigate('#/coach/tournee/${t.id}')" style="cursor:pointer">
        <h3 style="margin:0">${esc(t.nom)}</h3>
        <p class="muted">${esc(t.lieu||'')} ${t.date_debut?'· '+t.date_debut+(t.date_fin?(' → '+t.date_fin):''):''}</p>
      </div>`).join('');
  }

  // Validation des coachs adjoints en attente
  let pendingHtml = '';
  const { data: team } = await supabase.from('teams').select('*').eq('id', teamId).maybeSingle();
  if(team && (team.created_by === STATE.session.user.id || STATE.profile.superviseur)){
    const { data: pending } = await supabase.from('profiles')
      .select('id, nom, prenom').eq('team_id', teamId).eq('role','coach').eq('statut','en_attente');
    if(pending && pending.length){
      pendingHtml = `
        <div class="card" style="border-color:var(--accent)">
          <h3>Coachs en attente de validation</h3>
          ${pending.map(p=>`
            <div class="row between" style="padding:6px 0">
              <div>${esc(fullName(p))}</div>
              <button class="btn small" onclick="validateCoach('${p.id}')">Valider</button>
            </div>`).join('')}
        </div>`;
    }
  }

  shell(`
    <h2 style="margin:4px 0 14px">Mes tournées</h2>
    ${pendingHtml}
    ${list}
    <div class="card">
      <h3>Créer une tournée</h3>
      <form id="tourneeForm">
        <label>Nom de la tournée</label>
        <input name="nom" required placeholder="Ex: Tournée d'été 2026">
        <label>Lieu</label>
        <input name="lieu" placeholder="Ex: Île-de-France">
        <label>Date de début</label>
        <input type="date" name="date_debut">
        <label>Date de fin</label>
        <input type="date" name="date_fin">
        <button class="btn clay" type="submit">Créer</button>
        <div class="error" id="tourneeErr"></div>
      </form>
    </div>
  `, 'home');

  document.getElementById('tourneeForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const f = new FormData(e.target);
    const { data, error } = await supabase.from('tournees').insert({
      nom: f.get('nom'), lieu: f.get('lieu'),
      date_debut: f.get('date_debut')||null, date_fin: f.get('date_fin')||null,
      team_id: teamId, created_by: STATE.session.user.id
    }).select().single();
    if(error){ document.getElementById('tourneeErr').textContent = error.message; return; }
    navigate('#/coach/tournee/'+data.id);
  });
}
window.viewCoachTourneeTab = (id, tab) => {
  history.replaceState(null,'', location.pathname + location.search + '#/coach/tournee/' + id + '?tab=' + tab);
  viewCoachTournee(id);
};
window.validateCoach = async (profileId) => {
  const { error } = await supabase.from('profiles').update({ statut:'actif' }).eq('id', profileId);
  if(error){ toast(error.message, true); return; }
  toast('Coach validé');
  viewCoachHome();
};

// ---------------------------------------------------------------
// VUE : COACH — DÉTAIL TOURNÉE (étapes + entraînements + planning)
// ---------------------------------------------------------------
async function viewCoachTournee(id){
  STATE.activeTourneeId = id;
  shell(`<div class="empty">Chargement…</div>`, 'home');

  const { data: tournee } = await supabase.from('tournees').select('*').eq('id', id).maybeSingle();
  if(!tournee){ shell(`<div class="empty">Tournée introuvable.</div>`,'home'); return; }

  const { data: etapes } = await supabase.from('tournaments').select('*, formats(nom)').eq('tournee_id', id).order('date_debut');
  const etapeIds = (etapes||[]).map(e=>e.id);

  const { data: roster } = await supabase.from('players').select('*').eq('team_id', tournee.team_id).order('nom');

  const { data: tnp } = await supabase.from('tournee_players').select('player_id, players(*)').eq('tournee_id', id);
  const tourneePlayers = (tnp||[]).map(r=>r.players).filter(Boolean);
  const tourneePlayerIds = new Set(tourneePlayers.map(p=>p.id));
  const rosterAvailable = (roster||[]).filter(p=>!tourneePlayerIds.has(p.id));

  const { data: trainings } = await supabase.from('trainings').select('*, training_players(player_id)').eq('tournee_id', id).order('scheduled_at');

  let matches = [];
  if(etapeIds.length){
    const { data } = await supabase.from('matches').select('*, tournaments(nom)').in('tournament_id', etapeIds);
    matches = data || [];
  }

  // Coachs de l'équipe (pour affectation) + affectations existantes
  const { data: coachTeamLinks } = await supabase.from('coach_teams').select('profile_id, profiles(id,nom,prenom)').eq('team_id', tournee.team_id).eq('statut','actif');
  const teamCoaches = (coachTeamLinks||[]).map(l=>l.profiles).filter(Boolean);
  const coachName = pid => fullName((teamCoaches||[]).find(c=>c.id===pid));

  let etapeCoachMap = {}; // etapeId -> [profileId,...]
  if(etapeIds.length){
    const { data: ec } = await supabase.from('etape_coaches').select('*').in('tournament_id', etapeIds);
    (ec||[]).forEach(r=>{ (etapeCoachMap[r.tournament_id] ||= []).push(r.profile_id); });
  }
  const trainingIds = (trainings||[]).map(tr=>tr.id);
  let trainingCoachMap = {};
  if(trainingIds.length){
    const { data: tc } = await supabase.from('training_coaches').select('*').in('training_id', trainingIds);
    (tc||[]).forEach(r=>{ (trainingCoachMap[r.training_id] ||= []).push(r.profile_id); });
  }

  const playerName = pid => fullName((roster||[]).find(p=>p.id===pid));

  const { data: formats } = await supabase.from('formats').select('*').order('id');

  // --- Joueurs de la tournée ---
  const canDeletePlayer = STATE.profile?.role==='admin' || STATE.profile?.superviseur;
  const canManage = canDeletePlayer;
  const tourneePlayersHtml = tourneePlayers.length ? tourneePlayers.map(p=>`
    <div class="row between" style="padding:8px 0; border-bottom:1px solid var(--brd)">
      <div onclick="viewPlayerPlanning('${p.id}','${id}')" style="cursor:pointer; flex:1; display:flex; align-items:center; gap:6px;">
        <span>${p.genre==='F'?'👧':p.genre==='G'?'👦':'🎾'}</span>
        <span style="font-weight:600">${esc(fullName(p))}</span>
        <span style="font-size:11px; color:var(--accent2)">→</span>
      </div>
      <div class="row" style="gap:6px">
        <button class="btn small secondary" onclick="showPlayerCode('${p.code}','${esc(fullName(p)).replace(/'/g,"\\\\'")}')">📋 Code</button>
        ${canDeletePlayer ? `<button class="btn small clay" onclick="deletePlayer('${p.id}','${esc(fullName(p)).replace(/'/g,"\\\\'")}','${id}')">🗑</button>` : ''}
      </div>
    </div>`).join('') : `<p class="muted">Aucun joueur inscrit à cette tournée.</p>`;

  // --- Étapes ---
  const etapesHtml = (etapes||[]).length ? etapes.map(e=>{
    const assigned = etapeCoachMap[e.id] || [];
    return `
    <div class="card">
      <div class="row between">
        <div onclick="navigate('#/coach/tournoi/${e.id}')" style="cursor:pointer; flex:1">
          <h3 style="margin:0">${esc(e.nom)}</h3>
          <p class="muted">${esc(e.lieu||'')} ${e.date_debut?'· '+e.date_debut+(e.date_fin?(' → '+e.date_fin):''):''}</p>
          <p class="muted">Format : ${esc(e.formats?.nom||'—')}</p>
        </div>
        ${canManage ? `<button class="btn small clay" onclick="deleteEtape('${e.id}','${id}','${esc(e.nom).replace(/'/g,"\\\\'")}')">🗑</button>` : ''}
      </div>
      <p class="muted" style="margin-top:6px">🧑‍🏫 ${assigned.length ? assigned.map(coachName).map(esc).join(', ') : 'Aucun coach affecté'}</p>
      ${(teamCoaches||[]).length ? `
      <form class="etapeCoachForm" data-id="${e.id}" style="margin-top:6px">
        <label>Affecter des coachs à cette étape</label>
        <div class="chk-group">
          ${(teamCoaches||[]).map(c=>`<div class="chk-item"><input type="checkbox" name="coach_ids" value="${c.id}" id="ec_${e.id}_${c.id}" ${assigned.includes(c.id)?'checked':''}><label for="ec_${e.id}_${c.id}">${esc(fullName(c))}</label></div>`).join('')}
        </div>
        <button class="btn small secondary" type="submit">Enregistrer</button>
      </form>` : ''}
    </div>`;
  }).join('') : `<p class="muted">Aucune étape pour l'instant.</p>`;

  // --- Entraînements ---
  const trainingsHtml = (trainings||[]).length ? trainings.map(tr=>{
    const names = (tr.training_players||[]).map(tp=>playerName(tp.player_id)).join(', ');
    const when = tr.scheduled_at ? new Intl.DateTimeFormat('fr-FR',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(tr.scheduled_at)) : 'Non planifié';
    const assigned = trainingCoachMap[tr.id] || [];
    return `<div class="card">
      <div class="row between">
        <div><strong>${esc(tr.titre)}</strong><span class="muted"> · 🕐 ${esc(when)}</span></div>
        ${canManage ? `<button class="btn small clay" onclick="deleteTraining('${tr.id}','${id}')">🗑</button>` : ''}
      </div>
      ${tr.lieu ? `<p class="muted" style="margin:4px 0 0">📍 ${esc(tr.lieu)}</p>` : ''}
      ${tr.description ? `<p class="muted" style="margin:4px 0 0">${esc(tr.description)}</p>` : ''}
      <p class="muted" style="margin:4px 0 0">👥 ${esc(names || 'Aucun joueur assigné')}</p>
      <p class="muted" style="margin:4px 0 0">🧑‍🏫 ${assigned.length ? assigned.map(coachName).map(esc).join(', ') : 'Aucun coach affecté'}</p>
      ${(teamCoaches||[]).length ? `
      <form class="trainingCoachForm" data-id="${tr.id}" style="margin-top:6px">
        <label>Affecter des coachs à cet entraînement</label>
        <div class="chk-group">
          ${(teamCoaches||[]).map(c=>`<div class="chk-item"><input type="checkbox" name="coach_ids" value="${c.id}" id="tc_${tr.id}_${c.id}" ${assigned.includes(c.id)?'checked':''}><label for="tc_${tr.id}_${c.id}">${esc(fullName(c))}</label></div>`).join('')}
        </div>
        <button class="btn small secondary" type="submit">Enregistrer</button>
      </form>` : ''}
    </div>`;
  }).join('') : `<p class="muted">Aucun entraînement programmé.</p>`;

  // --- Planning combiné (matchs + entraînements, groupés par jour) ---
  const dateFmt = new Intl.DateTimeFormat('fr-FR', { weekday:'long', day:'numeric', month:'long' });
  const timeFmt = new Intl.DateTimeFormat('fr-FR', { hour:'2-digit', minute:'2-digit' });
  const items = [];
  matches.forEach(m=> items.push({ type:'match', date: m.scheduled_at, data:m }));
  (trainings||[]).forEach(tr=> items.push({ type:'training', date: tr.scheduled_at, data:tr }));
  const groups = new Map();
  items.forEach(it=>{
    const key = it.date ? it.date.slice(0,10) : 'none';
    if(!groups.has(key)) groups.set(key, []);
    groups.get(key).push(it);
  });
  const sortedKeys = [...groups.keys()].sort((a,b)=> a==='none'?1 : b==='none'?-1 : a.localeCompare(b));
  const planningHtml = items.length ? sortedKeys.map(key=>{
    const label = key==='none' ? 'Non planifié' : dateFmt.format(new Date(key+'T00:00:00'));
    const rows = groups.get(key).sort((a,b)=> (a.date||'').localeCompare(b.date||'')).map(it=>{
      const time = it.date ? timeFmt.format(new Date(it.date)) : '';
      if(it.type==='match'){
        const m = it.data;
        const statusPill = m.statut==='en_cours' ? '<span class="pill live">Live</span>'
          : m.statut==='termine' ? '<span class="pill done">Terminé</span>' : '<span class="pill upcoming">À venir</span>';
        return `<div class="card" onclick="navigate('#/coach/match/${m.id}')" style="cursor:pointer">
          <div class="row between"><div>🎾 <strong>${esc(playerName(m.joueur1_id))}</strong> vs <strong>${esc((m.joueur_ext_nom || playerName(m.joueur2_id)))}</strong></div>${statusPill}</div>
          <p class="muted">${time?`🕐 ${time} · `:''}${esc(m.tournaments?.nom||'')}${m.court?' · '+esc(m.court):''}</p>
        </div>`;
      } else {
        const tr = it.data;
        const names = (tr.training_players||[]).map(tp=>playerName(tp.player_id)).join(', ');
        return `<div class="card" style="background:var(--s3)">
          <div class="row between"><div>🏋️ <strong>${esc(tr.titre)}</strong></div></div>
          <p class="muted">${time?`🕐 ${time}`:''}${tr.lieu?' · 📍 '+esc(tr.lieu):''}</p>
          <p class="muted">👥 ${esc(names||"Toute l'équipe")}</p>
        </div>`;
      }
    }).join('');
    return `<h3 style="margin:18px 0 8px; text-transform:capitalize;">${esc(label)}</h3>${rows}`;
  }).join('') : `<div class="empty">Rien de programmé pour l'instant.</div>`;

  const tabParam = (new URLSearchParams(location.hash.split('?')[1]||'')).get('tab') || 'joueurs';

  const tabBar = `<div class="tabs" style="margin-bottom:12px">
    <button class="${tabParam==='joueurs'?'active':''}" onclick="viewCoachTourneeTab('${id}','joueurs')">👥 Joueurs</button>
    <button class="${tabParam==='etapes'?'active':''}" onclick="viewCoachTourneeTab('${id}','etapes')">🎾 Étapes</button>
    <button class="${tabParam==='training'?'active':''}" onclick="viewCoachTourneeTab('${id}','training')">🏋️ Entraîn.</button>
    <button class="${tabParam==='planning'?'active':''}" onclick="viewCoachTourneeTab('${id}','planning')">📆 Planning</button>
  </div>`;

  let tabContent = '';
  if(tabParam === 'joueurs'){
    tabContent = `
      ${tourneePlayersHtml}
      ${rosterAvailable.length ? `
      <form id="addTourneePlayerForm" style="margin-top:10px">
        <div class="row" style="gap:8px">
          <select name="player_id" style="flex:1">${rosterAvailable.map(p=>`<option value="${p.id}">${esc(p.prenom||p.nom||'?')} ${p.genre==='F'?'👧':'👦'}</option>`).join('')}</select>
          <button class="btn small" type="submit" style="width:auto">Inscrire</button>
        </div>
      </form>` : ''}
      <div style="border-top:1px solid var(--brd);margin-top:14px;padding-top:14px">
        <p style="font-weight:700;margin:0 0 10px;font-size:13px">+ Nouveau joueur</p>
        <form id="newTourneePlayerForm">
          <div class="row" style="gap:6px">
            <input name="prenom" placeholder="Prénom" style="flex:1">
            <input name="nom" placeholder="Nom" style="flex:1">
            <select name="genre" style="width:auto"><option value="">?</option><option value="G">👦</option><option value="F">👧</option></select>
          </div>
          ${(etapes||[]).length ? `<div class="chk-group" style="margin-top:8px">${(etapes||[]).map((e,i)=>`<div class="chk-item"><input type="checkbox" name="etape_ids" value="${e.id}" id="npe_${i}"><label for="npe_${i}">${esc(e.nom)}</label></div>`).join('')}</div>` : ''}
          <button class="btn small clay" type="submit" style="margin-top:8px">Créer</button>
        </form>
      </div>`;
  } else if(tabParam === 'etapes'){
    tabContent = `
      ${etapesHtml}
      <div class="card" style="border-style:dashed">
        <p style="font-weight:700;margin:0 0 10px">+ Ajouter une étape</p>
        <form id="etapeForm">
          <input name="nom" required placeholder="Ex: Tournoi de Brunoy">
          <input name="lieu" placeholder="Lieu">
          <div class="row" style="gap:8px"><input type="date" name="date_debut" style="flex:1"><input type="date" name="date_fin" style="flex:1"></div>
          <select name="format_id">${(formats||[]).map(f=>`<option value="${f.id}">${esc(f.nom)}</option>`).join('')}</select>
          <button class="btn clay" type="submit">Créer</button>
          <div class="error" id="etapeErr"></div>
        </form>
      </div>`;
  } else if(tabParam === 'training'){
    tabContent = `
      ${trainingsHtml}
      <div class="card" style="border-style:dashed">
        <p style="font-weight:700;margin:0 0 10px">+ Ajouter un entraînement</p>
        <form id="trainingForm">
          <input name="titre" required placeholder="Ex: Séance physique matinale">
          <input name="description" placeholder="Description (optionnel)">
          <input name="lieu" placeholder="Lieu (optionnel)">
          <input type="datetime-local" name="scheduled_at">
          <input type="number" name="duration_minutes" placeholder="Durée en minutes">
          <div class="chk-group">${tourneePlayers.map((p,i)=>`<div class="chk-item"><input type="checkbox" name="player_ids" value="${p.id}" id="tp_${i}"><label for="tp_${i}">${p.genre==='F'?'👧':'👦'} ${esc(p.prenom||p.nom||'?')}</label></div>`).join('')}</div>
          <p class="muted">Laisse tout décoché pour toute l'équipe.</p>
          <button class="btn clay" type="submit">Enregistrer</button>
          <div class="error" id="trainingErr"></div>
        </form>
      </div>`;
  } else {
    tabContent = planningHtml;
  }

  shell(`
    <button class="btn ghost" onclick="history.back()">← Tournées</button>
    <h2 style="margin:8px 0 2px">${esc(tournee.nom)}</h2>
    <p class="muted" style="margin-top:0;margin-bottom:12px">${esc(tournee.lieu||'')}${tournee.date_debut?' · '+tournee.date_debut+(tournee.date_fin?' → '+tournee.date_fin:''):''}</p>
    <div class="row" style="gap:8px;margin-bottom:14px">
      <button class="btn" style="flex:1" onclick="viewTourneePlanning('${id}',0,'joueurs')">📆 Semaine</button>
      <button class="btn secondary" style="flex:1" onclick="navigate('#/personnes/${id}')">👥 Personnes</button>
    </div>
    ${tabBar}
    <div class="card">${tabContent}</div>
  `, 'home');

  document.querySelectorAll('.etapeCoachForm').forEach(form=>{
    form.addEventListener('submit', async e=>{
      e.preventDefault();
      const etapeId = form.dataset.id;
      const selected = [...form.querySelectorAll('input[name=coach_ids]:checked')].map(i=>i.value);
      await supabase.from('etape_coaches').delete().eq('tournament_id', etapeId);
      if(selected.length){
        await supabase.from('etape_coaches').insert(selected.map(pid=>({ tournament_id: etapeId, profile_id: pid })));
      }
      toast('Affectation enregistrée');
      viewCoachTournee(id);
    });
  });
  document.querySelectorAll('.trainingCoachForm').forEach(form=>{
    form.addEventListener('submit', async e=>{
      e.preventDefault();
      const trainingId = form.dataset.id;
      const selected = [...form.querySelectorAll('input[name=coach_ids]:checked')].map(i=>i.value);
      await supabase.from('training_coaches').delete().eq('training_id', trainingId);
      if(selected.length){
        await supabase.from('training_coaches').insert(selected.map(pid=>({ training_id: trainingId, profile_id: pid })));
      }
      toast('Affectation enregistrée');
      viewCoachTournee(id);
    });
  });

  document.getElementById('addTourneePlayerForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const playerId = new FormData(e.target).get('player_id');
    const { error } = await supabase.from('tournee_players').insert({ tournee_id: id, player_id: playerId });
    if(error){ toast(error.message, true); return; }
    toast('Joueur inscrit à la tournée');
    viewCoachTournee(id);
  });

  document.getElementById('newTourneePlayerForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const f = new FormData(e.target);
    const prenom = f.get('prenom').trim(), nom = f.get('nom').trim();
    if(!nom && !prenom) return;
    const code = genCode();
    const genre = f.get('genre') || null;
    const { data: pl, error } = await supabase.from('players').insert({ prenom: prenom||null, nom, code, genre, team_id: tournee.team_id, created_by: STATE.session.user.id }).select().single();
    if(error){ toast(error.message, true); return; }
    // Inscription à la tournée
    await supabase.from('tournee_players').insert({ tournee_id: id, player_id: pl.id });
    // Inscription aux étapes cochées
    const etapeIds = [...e.target.querySelectorAll('input[name=etape_ids]:checked')].map(i=>i.value);
    if(etapeIds.length){
      await supabase.from('tournament_players').insert(etapeIds.map(eid=>({ tournament_id: eid, player_id: pl.id })));
    }
    toast(`${fullName(pl)} inscrit${etapeIds.length ? ` + ${etapeIds.length} étape(s)` : ''} · code ${code}`);
    viewCoachTournee(id);
  });

  document.getElementById('etapeForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const f = new FormData(e.target);
    const { data, error } = await supabase.from('tournaments').insert({
      nom: f.get('nom'), lieu: f.get('lieu'),
      date_debut: f.get('date_debut')||null, date_fin: f.get('date_fin')||null,
      format_id: f.get('format_id'), team_id: tournee.team_id, tournee_id: id, coach_id: STATE.session.user.id
    }).select().single();
    if(error){ document.getElementById('etapeErr').textContent = error.message; return; }
    navigate('#/coach/tournoi/'+data.id);
  });

  document.getElementById('trainingForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const f = new FormData(e.target);
    const scheduledAt = f.get('scheduled_at');
    const { data: tr, error } = await supabase.from('trainings').insert({
      tournee_id: id, titre: f.get('titre'), description: f.get('description')||null,
      lieu: f.get('lieu')||null,
      scheduled_at: scheduledAt ? new Date(scheduledAt).toISOString() : null,
      duration_minutes: f.get('duration_minutes')||null,
      created_by: STATE.session.user.id
    }).select().single();
    if(error){ document.getElementById('trainingErr').textContent = error.message; return; }
    const selected = [...e.target.querySelectorAll('input[name=player_ids]:checked')].map(i=>i.value);
    if(selected.length){
      await supabase.from('training_players').insert(selected.map(pid=>({ training_id: tr.id, player_id: pid })));
    }
    toast('Entraînement programmé');
    viewCoachTournee(id);
  });
}

// ---------------------------------------------------------------
// VUE : COACH — DÉTAIL TOURNOI (joueurs + matchs)
// ---------------------------------------------------------------
async function viewCoachTournament(id){
  shell(`<div class="empty">Chargement…</div>`, 'home');

  const { data: t } = await supabase.from('tournaments').select('*, formats(*)').eq('id', id).single();
  if(!t){ shell(`<div class="empty">Tournoi introuvable.</div>`,'home'); return; }
  if(t.tournee_id) STATE.activeTourneeId = t.tournee_id;

  const { data: tp } = await supabase.from('tournament_players')
    .select('player_id, players(*)').eq('tournament_id', id);
  const players = (tp||[]).map(r=>r.players).filter(Boolean);
  const playerIds = new Set(players.map(p=>p.id));

  // Joueurs de la tournée non encore inscrits à cette étape
  const { data: tnp } = await supabase.from('tournee_players').select('player_id, players(*)').eq('tournee_id', t.tournee_id);
  const tourneeRoster = (tnp||[]).map(r=>r.players).filter(Boolean);
  const rosterAvailable = tourneeRoster.filter(p=>!playerIds.has(p.id));

  const { data: matches } = await supabase.from('matches')
    .select('*, match_coaches(profile_id)').eq('tournament_id', id).order('scheduled_at',{ascending:true, nullsFirst:false});

  // Coachs de l'équipe
  const { data: etapeTeam } = await supabase.from('tournees').select('team_id').eq('id', t.tournee_id).maybeSingle();
  const { data: teamCoaches } = etapeTeam ? await supabase.from('profiles').select('id,nom,prenom').eq('team_id', etapeTeam.team_id).eq('role','coach').eq('statut','actif') : { data: [] };
  const coachName = cid => fullName((teamCoaches||[]).find(c=>c.id===cid));

  const playerName = pid => fullName(players.find(p=>p.id===pid));
  const canManage = STATE.profile?.role==='admin' || STATE.profile?.superviseur;

  // Planning : regroupement des matchs par jour
  const dateFmt = new Intl.DateTimeFormat('fr-FR', { weekday:'long', day:'numeric', month:'long' });
  const timeFmt = new Intl.DateTimeFormat('fr-FR', { hour:'2-digit', minute:'2-digit' });
  const groups = new Map(); // key: 'YYYY-MM-DD' or 'none' -> matches[]
  (matches||[]).forEach(m=>{
    const key = m.scheduled_at ? m.scheduled_at.slice(0,10) : 'none';
    if(!groups.has(key)) groups.set(key, []);
    groups.get(key).push(m);
  });
  const sortedKeys = [...groups.keys()].sort((a,b)=> a==='none'?1 : b==='none'?-1 : a.localeCompare(b));

  const matchCard = m => {
    const statusPill = m.statut==='en_cours' ? '<span class="pill live">Live</span>'
      : m.statut==='termine' ? '<span class="pill done">Terminé</span>'
      : '<span class="pill upcoming">À venir</span>';
    const time = m.scheduled_at ? timeFmt.format(new Date(m.scheduled_at)) : null;
    const coaches = (m.match_coaches||[]).map(mc=>coachName(mc.profile_id)).filter(Boolean);
    return `<div class="card">
      <div class="row between" onclick="navigate('#/coach/match/${m.id}')" style="cursor:pointer;flex:1">
        <div>
          <div><strong>${esc(playerName(m.joueur1_id))}</strong> <span class="muted">vs</span> <strong>${esc((m.joueur_ext_nom || playerName(m.joueur2_id)))}</strong></div>
          <p class="muted" style="margin:3px 0 0">${time ? `🕐 ${time} · ` : ''}${esc(m.tour||'')}${m.court?' · Court '+esc(m.court):''}${coaches.length?' · 🧑‍🏫 '+coaches.map(esc).join(', '):''}</p>
        </div>
        ${statusPill}
      </div>
      ${canManage ? `
      <div class="row" style="margin-top:10px;gap:6px;border-top:1px solid var(--brd);padding-top:10px">
        <button class="btn small secondary" style="flex:1" onclick="editMatch('${m.id}','${esc(playerName(m.joueur1_id)).replace(/'/g,"\\\\'")}','${esc(m.joueur_ext_nom||playerName(m.joueur2_id)).replace(/'/g,"\\\\'")}','${m.scheduled_at||''}','${m.tour||''}','${m.court||''}')">✏️ Modifier</button>
        <button class="btn small clay" onclick="deleteMatch('${m.id}','${id}')">🗑</button>
      </div>` : ''}
    </div>`;
  };

  const matchesHtml = (matches||[]).length ? sortedKeys.map(key=>{
    const label = key==='none' ? 'Non planifié' : (dateFmt.format(new Date(key+'T00:00:00')));
    return `<h3 style="margin:18px 0 8px; text-transform:capitalize;">${esc(label)}</h3>${groups.get(key).map(matchCard).join('')}`;
  }).join('') : `<div class="empty">Aucun match créé pour ce tournoi.</div>`;

  const playersHtml = players.length ? players.map(p=>`
    <div class="row between" style="padding:8px 0; border-bottom:1px solid var(--brd)">
      <div>${esc(fullName(p))}</div>
      <div class="code-badge" style="font-size:14px; padding:4px 8px;">${esc(p.code)}</div>
    </div>`).join('') : `<p class="muted">Aucun joueur inscrit.</p>`;

  shell(`
    <button class="btn ghost" onclick="history.back()">← Tournée</button>
    <h2 style="margin:8px 0 2px">${esc(t.nom)}</h2>
    <p class="muted" style="margin-top:0">${esc(t.formats?.nom||'')}</p>

    <div class="card">
      <h3>Joueurs inscrits</h3>
      ${playersHtml}
      ${rosterAvailable.length ? `
      <form id="rosterForm" style="margin-top:10px">
        <label>Inscrire depuis les joueurs de la tournée</label>
        <div class="row">
          <select name="player_id" style="flex:1">
            ${rosterAvailable.map(p=>`<option value="${p.id}">${esc(fullName(p))} (${esc(p.code)})</option>`).join('')}
          </select>
          <button class="btn small" type="submit" style="width:auto">Ajouter</button>
        </div>
      </form>` : `<p class="muted" style="margin-top:10px">Tous les joueurs de la tournée sont déjà inscrits à cette étape. Pour ajouter un nouveau joueur, fais-le depuis la page de la tournée.</p>`}
    </div>

    <h3 style="margin:18px 0 8px">Programmer un match</h3>
    <div class="card">
      <form id="matchForm">
        <label>Joueur de la tournée</label>
        <select name="j1">${players.map(p=>`<option value="${p.id}">${p.genre==='F'?'👧':'👦'} ${esc(fullName(p))}</option>`).join('')}</select>
        <label>Adversaire</label>
        <div class="tabs" style="margin-bottom:8px">
          <button type="button" class="active" onclick="setMatchAdvMode(this,'interne')">Joueur de l'étape</button>
          <button type="button" onclick="setMatchAdvMode(this,'externe')">Joueur externe</button>
        </div>
        <div id="matchAdvInterne">
          <select name="j2">${players.map(p=>`<option value="${p.id}">${p.genre==='F'?'👧':'👦'} ${esc(fullName(p))}</option>`).join('')}</select>
        </div>
        <div id="matchAdvExterne" style="display:none">
          <input name="joueur_ext_nom" placeholder="Prénom Nom de l'adversaire (ex: Lucas Martin)">
          <p class="muted" style="margin-top:4px">Joueur hors tournée (adversaire FFT, autre club…)</p>
        </div>
        <label>Date et heure (optionnel)</label>
        <input type="datetime-local" name="scheduled_at">
        <label>Tour / phase (optionnel)</label>
        <input name="tour" placeholder="Ex: Demi-finale">
        <label>Court (optionnel)</label>
        <input name="court" placeholder="Ex: Court 2">
        <label>Coach accompagnant (optionnel)</label>
        <div class="chk-group">
          ${(teamCoaches||[]).map((c,i)=>`<div class="chk-item"><input type="checkbox" name="match_coach_ids" value="${c.id}" id="mc_${i}"><label for="mc_${i}">${esc(fullName(c))}</label></div>`).join('') || '<p class="muted">Aucun coach disponible</p>'}
        </div>
        <button class="btn clay" type="submit">+ Créer le match</button>
        <div class="error" id="matchErr"></div>
      </form>
    </div>
    <h3 style="margin:18px 0 8px">Planning</h3>
    ${matchesHtml}
  `, 'home');

  window.setMatchAdvMode = (btn, mode) => {
    btn.closest('.tabs').querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('matchAdvInterne').style.display = mode==='interne' ? '' : 'none';
    document.getElementById('matchAdvExterne').style.display = mode==='externe' ? '' : 'none';
  };

  document.getElementById('rosterForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const playerId = new FormData(e.target).get('player_id');
    const { error } = await supabase.from('tournament_players').insert({ tournament_id: id, player_id: playerId });
    if(error){ toast(error.message, true); return; }
    toast('Joueur inscrit au tournoi');
    viewCoachTournament(id);
  });

  document.getElementById('matchForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const f = new FormData(e.target);
    const j1 = f.get('j1');
    const isExt = document.getElementById('matchAdvExterne')?.style.display !== 'none';
    const j2 = isExt ? null : f.get('j2');
    const extNom = f.get('joueur_ext_nom')?.trim();
    if(!isExt && (!j2 || j1===j2)){ document.getElementById('matchErr').textContent='Choisis deux joueurs différents.'; return; }
    if(isExt && !extNom){ document.getElementById('matchErr').textContent="Saisis le nom de l'adversaire externe."; return; }
    const live_state = initLiveState(t.formats);
    const scheduledAt = f.get('scheduled_at');
    const { data, error } = await supabase.from('matches').insert({
      tournament_id: id, joueur1_id:j1, joueur2_id:j2||null,
      joueur_ext_nom: isExt ? extNom : null,
      tour: f.get('tour')||null, court: f.get('court')||null,
      scheduled_at: scheduledAt ? new Date(scheduledAt).toISOString() : null,
      live_state
    }).select().single();
    if(error){ document.getElementById('matchErr').textContent = error.message; return; }
    const coachIds = [...document.querySelectorAll('#matchForm input[name=match_coach_ids]:checked')].map(i=>i.value);
    if(coachIds.length){
      await supabase.from('match_coaches').insert(coachIds.map(pid=>({ match_id: data.id, profile_id: pid })));
    }
    navigate('#/coach/match/'+data.id);
  });
}

// VUE : COACH — SAISIE DU SCORE EN DIRECT
// ---------------------------------------------------------------
async function viewCoachMatch(id){
  app.innerHTML = `<main style="padding-top:70px;text-align:center"><div class="muted">Chargement…</div></main>`;
  const { data: m } = await supabase.from('matches').select('*, tournaments(nom, format_id, tournee_id), match_coaches(profile_id, profiles(nom,prenom))').eq('id', id).single();
  if(!m){ shell(`<div class="empty">Match introuvable.</div>`,'home'); return; }
  const { data: p1 } = await supabase.from('players').select('nom,prenom').eq('id', m.joueur1_id).single();
  const n2 = m.joueur_ext_nom || (m.joueur2_id ? await supabase.from('players').select('nom,prenom').eq('id', m.joueur2_id).single().then(r=>fullName(r.data)) : '—');

  // Vérifier si le coach courant peut modifier le score
  const uid = STATE.session.user.id;
  const isAdmin = STATE.profile?.role === 'admin';
  const isSuperviseur = STATE.profile?.superviseur;
  const assignedCoaches = (m.match_coaches||[]).map(mc=>mc.profile_id);
  const hasAssignedCoaches = assignedCoaches.length > 0;
  const isAssigned = assignedCoaches.includes(uid);
  // Peut scorer si : admin OU superviseur OU (assigné à ce match) OU (aucun coach assigné = ouvert à tous les coachs de l'équipe)
  const canScore = isAdmin || isSuperviseur || isAssigned || !hasAssignedCoaches;

  // Charger les coachs de l'équipe pour la section d'affectation
  let teamCoaches = [];
  if(m.tournaments?.tournee_id){
    const { data: tournee } = await supabase.from('tournees').select('team_id').eq('id', m.tournaments.tournee_id).maybeSingle();
    if(tournee){
      const { data: coaches } = await supabase.from('profiles').select('id,nom,prenom').eq('team_id', tournee.team_id).eq('role','coach').eq('statut','actif');
      teamCoaches = coaches || [];
    }
  }
  STATE.history = [];
  STATE._matchTeamCoaches = teamCoaches;
  STATE._canScore = canScore;
  renderCoachMatch(m, fullName(p1), n2);
}

function lsSnack(msg){
  let el = document.getElementById('lsSnackEl');
  if(!el){ el=document.createElement('div'); el.id='lsSnackEl'; el.className='lsSnack'; document.body.appendChild(el); }
  el.innerHTML = msg;
  el.classList.add('show');
  clearTimeout(window._lsSnackT);
  window._lsSnackT = setTimeout(()=>el.classList.remove('show'), 2200);
}

function renderCoachMatch(m, n1, n2){
  const st = m.live_state;
  const tbActive = st.inTiebreak || st.inSuperTb;
  const modeLabel = st.inSuperTb ? 'Super TB' : (st.inTiebreak ? 'Tie-break' : 'Standard');
  const sw = setsWon(st);
  const disp1 = tbActive ? st.points[0] : st.games[0];
  const disp2 = tbActive ? st.points[1] : st.games[1];
  const ptLabel = ['0','15','30','40'];
  const ptDisp = (i) => {
    if(tbActive) return st.points[i];
    return ptLabel[Math.min(st.points?.[i]||0, 3)] || '0';
  };
  const canScore = STATE._canScore !== false; // true par défaut
  const isOver = m.statut === 'termine';
  const isLive = m.statut === 'en_cours';
  const unit = tbActive ? 'point' : 'jeu';

  // Sets précédents
  const setsHtml = (st.sets||[]).map((s,i)=>{
    const tbNote = s.tb ? `<sup class="board .tb-note">(${s.tb[0]}-${s.tb[1]})</sup>` : '';
    const w = s.superTb ? (s.tb[0]>s.tb[1]?0:1) : (s.games[0]>s.games[1]?0:1);
    return `<span style="font-size:11px; color:var(--dim)">S${i+1}: <b style="color:${w===0?'var(--accent)':'var(--light)'}">${s.games[0]}</b>-<b style="color:${w===1?'var(--accent)':'var(--light)'}">${s.games[1]}</b>${tbNote}</span>`;
  }).join(' &nbsp;');

  shell(`
    <button class="btn ghost" onclick="history.back()">← Retour</button>
    ${scoreboardHTML(m, n1, n2)}

    ${isLive ? `
    <div class="lsBoard">
      <div class="lsHeader">
        <span>🔴 Live — ${esc(modeLabel)}</span>
        <span style="display:flex;align-items:center;gap:8px">${setsHtml} ${(m.match_coaches||[]).map(mc=>esc(fullName(mc.profiles))).filter(Boolean).map(n=>`<span style="color:var(--light)">🧑‍🏫 ${n}</span>`).join(' ')}</span>
      </div>
      <div class="lsScoreRow">
        <div class="lsPlayer ${st.serve===0?'serving':''}">
          <div class="lsPlayerName">
            <span>${esc(n1)}</span>
            <span class="lsServeIcon" style="opacity:${st.serve===0?1:.2}">🎾</span>
          </div>
          <div class="lsBig">${disp1}</div>
          ${tbActive ? '' : `<div class="lsMini">
            <div class="lsMiniBox"><span class="k">Points</span><span class="v">${ptDisp(0)}</span></div>
            <div class="lsMiniBox"><span class="k">Sets</span><span class="v">${sw[0]}</span></div>
          </div>`}
        </div>
        <div class="lsVs">
          <span class="lsMode">${esc(modeLabel)}</span>
          <span class="lsSets">${sw[0]}-${sw[1]}</span>
          <span class="lsSetsSub">Sets</span>
        </div>
        <div class="lsPlayer ${st.serve===1?'serving':''}">
          <div class="lsPlayerName">
            <span class="lsServeIcon" style="opacity:${st.serve===1?1:.2}">🎾</span>
            <span>${esc(n2)}</span>
          </div>
          <div class="lsBig">${disp2}</div>
          ${tbActive ? '' : `<div class="lsMini">
            <div class="lsMiniBox"><span class="k">Points</span><span class="v">${ptDisp(1)}</span></div>
            <div class="lsMiniBox"><span class="k">Sets</span><span class="v">${sw[1]}</span></div>
          </div>`}
        </div>
      </div>
    </div>
    ${canScore ? `
    <div class="pointZone">
      <button class="pointBtn primary" onclick="scorePoint(0)">
        <span class="pbWho">${esc(n1)}</span>
        <span class="pbPlus">+1</span>
        <span class="pbUnit">+1 ${unit}</span>
      </button>
      <button class="pointBtn" onclick="scorePoint(1)">
        <span class="pbWho">${esc(n2)}</span>
        <span class="pbPlus">+1</span>
        <span class="pbUnit">+1 ${unit}</span>
      </button>
    </div>
    <div class="lsActions">
      <button class="btn secondary" onclick="toggleServe()">🎾 Chg. service</button>
      <button class="btn secondary" onclick="undoPoint()">↺ Annuler</button>
      <button class="btn secondary" onclick="resetMatch()">⟳ Réinit.</button>
    </div>` : `
    <div class="card" style="text-align:center;background:var(--s1);border-style:dashed">
      <p class="muted" style="margin:0">👁 Observateur — seul le coach assigné peut modifier le score.</p>
    </div>`}
    ` : ''}

    ${m.statut==='a_venir' ? (canScore ? `<button class="btn clay" style="font-size:18px; padding:20px" onclick="startMatch()">▶ Démarrer le match</button>` : `<div class="card" style="text-align:center;background:var(--s1);border-style:dashed"><p class="muted" style="margin:0">👁 Observateur — seul le coach assigné peut démarrer ce match.</p></div>`) : ''}

    <div class="card" style="margin-top:10px">
      <h3>🧑‍🏫 Coachs accompagnants</h3>
      ${(m.match_coaches||[]).length
        ? `<p class="muted" style="margin:0 0 8px">${(m.match_coaches||[]).map(mc=>esc(fullName(mc.profiles))).filter(Boolean).join(', ')}</p>`
        : `<p class="muted" style="margin:0 0 8px">Aucun coach affecté à ce match.</p>`}
      ${(STATE._matchTeamCoaches||[]).length ? `
      <form id="matchCoachForm">
        <div class="chk-group">
          ${(STATE._matchTeamCoaches||[]).map((c,i)=>{
            const checked = (m.match_coaches||[]).some(mc=>mc.profile_id===c.id);
            return `<div class="chk-item"><input type="checkbox" name="coach_ids" value="${c.id}" id="mca_${i}" ${checked?'checked':''}><label for="mca_${i}">${esc(fullName(c))}</label></div>`;
          }).join('')}
        </div>
        <button class="btn small secondary" type="submit">Enregistrer</button>
      </form>` : ''}
    </div>

    ${isOver ? `
    <div class="card" style="text-align:center; margin-bottom:10px">
      <h3 style="margin:0 0 4px">🏆 Match terminé</h3>
      <p class="muted">Vainqueur : <strong>${esc(st.winner===0?n1:n2)}</strong></p>
    </div>
    <div class="card">
      <h3>📝 Débrief — ${esc(n1)}</h3>
      <form id="debriefForm1">
        <textarea name="debrief" rows="4" placeholder="Ex: Bon match, travaille la première balle…">${esc(m.debrief||'')}</textarea>
        <button class="btn clay" type="submit">Enregistrer</button>
        <div class="error" id="debriefMsg1"></div>
      </form>
    </div>
    ${m.joueur2_id ? `
    <div class="card">
      <h3>📝 Débrief — ${esc(n2)}</h3>
      <form id="debriefForm2">
        <textarea name="debrief" rows="4" placeholder="Ex: Belle progression, travailler le revers…">${esc(m.debrief_j2||'')}</textarea>
        <button class="btn clay" type="submit">Enregistrer</button>
        <div class="error" id="debriefMsg2"></div>
      </form>
    </div>` : ''}
    <button class="btn secondary" style="margin-top:8px" onclick="resetMatch()">⟳ Réinitialiser le match</button>
    ` : ''}
  `, 'home');

  window._currentMatch = m;
  window._n1 = n1; window._n2 = n2;

  document.getElementById('matchCoachForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const selected = [...e.target.querySelectorAll('input[name=coach_ids]:checked')].map(i=>i.value);
    await supabase.from('match_coaches').delete().eq('match_id', m.id);
    if(selected.length){
      await supabase.from('match_coaches').insert(selected.map(pid=>({ match_id: m.id, profile_id: pid })));
    }
    // Recharger les match_coaches à jour
    const { data: mc } = await supabase.from('match_coaches').select('profile_id, profiles(nom,prenom)').eq('match_id', m.id);
    m.match_coaches = mc || [];
    toast('Coachs mis à jour');
    renderCoachMatch(m, n1, n2);
  });

  document.getElementById('debriefForm1')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const debrief = new FormData(e.target).get('debrief');
    const { error } = await supabase.from('matches').update({ debrief }).eq('id', m.id);
    if(error){ document.getElementById('debriefMsg1').style.color='var(--clay)'; document.getElementById('debriefMsg1').textContent = error.message; return; }
    m.debrief = debrief;
    toast('✅ Débrief enregistré');
    navigate('#/coach/planning');
  });
  document.getElementById('debriefForm2')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const debrief_j2 = new FormData(e.target).get('debrief');
    const { error } = await supabase.from('matches').update({ debrief_j2 }).eq('id', m.id);
    if(error){ document.getElementById('debriefMsg2').style.color='var(--clay)'; document.getElementById('debriefMsg2').textContent = error.message; return; }
    m.debrief_j2 = debrief_j2;
    toast('✅ Débrief enregistré');
    navigate('#/coach/planning');
  });
}

window.startMatch = async () => {
  const m = window._currentMatch;
  m.statut = 'en_cours';
  await supabase.from('matches').update({ statut:'en_cours', updated_at:new Date().toISOString() }).eq('id', m.id);
  renderCoachMatch(m, window._n1, window._n2);
};
window.scorePoint = async (p) => {
  const m = window._currentMatch;
  STATE.history.push(JSON.parse(JSON.stringify(m.live_state)));
  const prev = JSON.parse(JSON.stringify(m.live_state));
  addPoint(m.live_state, p);
  const tbActive = m.live_state.inTiebreak || m.live_state.inSuperTb;
  const wasGame = !tbActive && (m.live_state.games[p] > prev.games[p]);
  const wasSet = m.live_state.sets.length > prev.sets.length;
  const n = p===0 ? window._n1 : window._n2;
  if(m.live_state.finished){ m.statut='termine'; lsSnack(`🏆 Match terminé — ${esc(n)} gagne !`); }
  else if(wasSet){ lsSnack(`🏁 Set pour ${esc(n)}`); }
  else if(wasGame){ lsSnack(`🔥 +1 jeu — ${esc(n)}`); }
  else { lsSnack(`🟢 +1 ${tbActive?'point':'point'} — ${esc(n)}`); }
  await saveMatch(m);
};
window.undoPoint = async () => {
  const m = window._currentMatch;
  if(!STATE.history.length){ lsSnack('Rien à annuler'); return; }
  m.live_state = STATE.history.pop();
  m.statut = m.live_state.finished ? 'termine' : 'en_cours';
  lsSnack('↺ Annulé');
  await saveMatch(m);
};
window.resetMatch = async () => {
  const m = window._currentMatch;
  if(!confirm('Réinitialiser ce match à 0-0 ?')) return;
  m.live_state = initLiveState(m.live_state.format);
  m.statut = 'a_venir';
  lsSnack('⟳ Match réinitialisé');
  await saveMatch(m);
};
window.toggleServe = async () => {
  const m = window._currentMatch;
  STATE.history.push(JSON.parse(JSON.stringify(m.live_state)));
  m.live_state.serve = m.live_state.serve===0 ? 1 : 0;
  const n = m.live_state.serve===0 ? window._n1 : window._n2;
  lsSnack(`🎾 Service : ${esc(n)}`);
  await saveMatch(m);
};
async function saveMatch(m){
  const winner_id = m.live_state.finished ? (m.live_state.winner===0 ? m.joueur1_id : m.joueur2_id) : null;
  await supabase.from('matches').update({
    live_state: m.live_state, statut: m.statut, winner_id, updated_at: new Date().toISOString()
  }).eq('id', m.id);
  renderCoachMatch(m, window._n1, window._n2);
}

// ---------------------------------------------------------------
// VUE : PARENT / ENFANT — SUIVI
// ---------------------------------------------------------------
async function viewSuivi(){
  shell(`<div class="empty">Chargement…</div>`, 'home');
  const uid = STATE.session.user.id;

  // L'enfant peut "réclamer" sa fiche joueur via son code
  let myPlayer = null;
  if(STATE.profile.role === 'enfant'){
    const { data } = await supabase.from('players').select('*').eq('profile_id', uid).maybeSingle();
    myPlayer = data;
  }

  const { data: follows } = await supabase.from('follows').select('player_id, players(*)').eq('parent_id', uid);
  const followedPlayers = (follows||[]).map(f=>f.players).filter(Boolean);
  const allPlayerIds = [...followedPlayers.map(p=>p.id), ...(myPlayer ? [myPlayer.id] : [])];

  let matches = [];
  if(allPlayerIds.length){
    const { data } = await supabase.from('matches')
      .select('*, tournaments(nom)')
      .or(allPlayerIds.map(pid=>`joueur1_id.eq.${pid},joueur2_id.eq.${pid}`).join(','))
      .order('updated_at',{ascending:false});
    matches = data || [];
  }

  // Récup noms des joueurs présents dans les matchs
  const idsNeeded = new Set();
  matches.forEach(m=>{ idsNeeded.add(m.joueur1_id); idsNeeded.add(m.joueur2_id); });
  let namesMap = {};
  if(idsNeeded.size){
    const { data: pls } = await supabase.from('players').select('id,nom,prenom').in('id', [...idsNeeded]);
    (pls||[]).forEach(p=>namesMap[p.id]=fullName(p));
  }

  const order = { en_cours:0, a_venir:1, termine:2 };
  matches.sort((a,b)=> (order[a.statut]??3) - (order[b.statut]??3));

  const matchesHtml = matches.length ? matches.map(m => `
    <div onclick="navigate('#/match/${m.id}')" style="cursor:pointer">
      <p class="muted" style="margin:0 0 4px">${esc(m.tournaments?.nom||'')}</p>
      ${scoreboardHTML(m, namesMap[m.joueur1_id]||'—', namesMap[m.joueur2_id]||'—')}
    </div>`).join('') : `<div class="empty"><div class="big">🎾</div>Aucun match suivi pour l'instant.</div>`;

  const claimBox = (STATE.profile.role==='enfant' && !myPlayer) ? `
    <div class="card">
      <h3>Relier ma fiche joueur</h3>
      <p class="muted">Ton coach t'a donné un code à 5 caractères : entre-le ici pour voir automatiquement tes matchs.</p>
      <form id="claimForm">
        <input name="code" placeholder="CODE" style="text-transform:uppercase">
        <button class="btn clay" type="submit">Relier mon profil</button>
        <div class="error" id="claimErr"></div>
      </form>
    </div>` : '';

  const followBox = `
    <div class="card">
      <h3>Suivre un joueur</h3>
      <p class="muted">Entre le code donné par le coach pour suivre les matchs de cet enfant en direct.</p>
      <form id="followForm">
        <input name="code" placeholder="CODE" style="text-transform:uppercase">
        <button class="btn clay" type="submit">Suivre</button>
        <div class="error" id="followErr"></div>
      </form>
      ${followedPlayers.length ? `<p class="muted" style="margin-top:10px">Suivis : ${followedPlayers.map(p=>esc(fullName(p))).join(', ')}</p>` : ''}
    </div>`;

  shell(`
    <h2 style="margin:4px 0 14px">Mes matchs</h2>
    ${myPlayer ? `<p class="muted">Profil joueur lié : <strong>${esc(fullName(myPlayer))}</strong></p>` : ''}
    ${claimBox}
    ${followBox}
    ${matchesHtml}
  `, 'home');

  document.getElementById('followForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const code = new FormData(e.target).get('code').trim().toUpperCase();
    const { data: pl, error } = await supabase.from('players').select('*').eq('code', code).maybeSingle();
    if(error || !pl){ document.getElementById('followErr').textContent='Code introuvable.'; return; }
    const { error: fErr } = await supabase.from('follows').insert({ parent_id: uid, player_id: pl.id });
    if(fErr && !fErr.message.includes('duplicate')){ document.getElementById('followErr').textContent=fErr.message; return; }
    toast(`Tu suis maintenant ${fullName(pl)}`);
    viewSuivi();
  });

  document.getElementById('claimForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const code = new FormData(e.target).get('code').trim().toUpperCase();
    const { data: pl, error } = await supabase.from('players').select('*').eq('code', code).maybeSingle();
    if(error || !pl){ document.getElementById('claimErr').textContent='Code introuvable.'; return; }
    if(pl.profile_id){ document.getElementById('claimErr').textContent='Ce profil est déjà relié.'; return; }
    const { error: uErr } = await supabase.from('players').update({ profile_id: uid }).eq('id', pl.id);
    if(uErr){ document.getElementById('claimErr').textContent=uErr.message; return; }
    toast('Profil relié !');
    viewSuivi();
  });
}

// ---------------------------------------------------------------
// VUE : MATCH PUBLIC (live, lecture seule, niveau "jeu" + points en tie-break)
// ---------------------------------------------------------------
let liveChannel = null;
async function viewMatchPublic(id){
  app.innerHTML = `<main style="padding-top:70px;text-align:center"><div class="muted">Chargement…</div></main>`;
  const { data: m } = await supabase.from('matches').select('*, tournaments(nom)').eq('id', id).single();
  if(!m){ app.innerHTML = `<main><div class="empty-state"><div class="icon">😕</div><p>Match introuvable.</p></div></main>`; return; }
  const { data: p1 } = await supabase.from('players').select('nom,prenom').eq('id', m.joueur1_id).single();
  const n2 = m.joueur_ext_nom || (m.joueur2_id ? await supabase.from('players').select('nom,prenom').eq('id', m.joueur2_id).single().then(r=>fullName(r.data)) : '—');
  renderPublicMatch(m, fullName(p1), n2);

  if(liveChannel) supabase.removeChannel(liveChannel);
  liveChannel = supabase.channel('match-'+id)
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'matches', filter:`id=eq.${id}` }, payload => {
      renderPublicMatch(payload.new, fullName(p1), n2);
    }).subscribe();
}
function renderPublicMatch(m, n1, n2){
  const isLive = m.statut==='en_cours';
  const isOver = m.statut==='termine';
  const st = m.live_state;
  const sw = st ? setsWon(st) : [0,0];
  const tbActive = st && (st.inTiebreak||st.inSuperTb);

  const backBtn = STATE.profile ? `<button class="btn ghost" onclick="history.back()">← Retour</button>` : `<button class="btn ghost" onclick="navigate('#/')">← Accueil</button>`;

  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><span class="dot"></span> Tennistour</div>
      ${isLive ? `<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:var(--live);animation:blink 1s infinite"></div><span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--live)">Live</span></div>` : ''}
    </div>
    <main>
      ${backBtn}
      <p class="muted" style="margin:8px 0 12px;font-size:13px">${esc(m.tournaments?.nom||'')}${m.tour?' · '+esc(m.tour):''}${m.court?' · Court '+esc(m.court):''}</p>

      ${scoreboardHTML(m, n1, n2)}

      ${isLive && tbActive ? `
        <div class="card" style="text-align:center;border-color:var(--accent);background:var(--accent3);margin-top:-4px">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);font-weight:700;margin-bottom:8px">${st.inSuperTb?'Super tie-break':'Jeu décisif'}</div>
          <div style="display:flex;justify-content:center;gap:24px;align-items:center">
            <div style="text-align:center">
              <div style="font-size:11px;color:var(--gray);margin-bottom:4px">${esc(n1)}</div>
              <div style="font-family:var(--fnt-head);font-size:52px;font-weight:900;line-height:1;color:var(--accent)">${st.points[0]}</div>
            </div>
            <div style="font-size:24px;color:var(--brd)">–</div>
            <div style="text-align:center">
              <div style="font-size:11px;color:var(--gray);margin-bottom:4px">${esc(n2)}</div>
              <div style="font-family:var(--fnt-head);font-size:52px;font-weight:900;line-height:1;color:var(--accent)">${st.points[1]}</div>
            </div>
          </div>
        </div>` : ''}

      ${isLive ? `<p class="muted" style="text-align:center;font-size:12px;margin-top:8px">Score mis à jour en direct · Rafraîchissement automatique</p>` : ''}

      ${isOver && st?.winner !== null ? `
        <div class="card" style="text-align:center;border-color:var(--court);background:rgba(39,151,107,.08);padding:20px">
          <div style="font-size:32px;margin-bottom:8px">🏆</div>
          <div style="font-family:var(--fnt-head);font-size:24px;font-weight:900">${esc(st.winner===0?n1:n2)}</div>
          <div class="muted" style="margin-top:4px">Vainqueur</div>
        </div>` : ''}
    </main>`;
}

// ---------------------------------------------------------------
// ROUTAGE
// ---------------------------------------------------------------
function setLoadingStatus(text){
  const el = document.getElementById('boot-status');
  if(el) el.textContent = text;
}
function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error(`Délai dépassé (${label})`)), ms))
  ]);
}
async function loadSession(){
  setLoadingStatus('Connexion à Supabase…');
  try{
    const { data, error } = await withTimeout(supabase.auth.getSession(), 5000, 'session');
    if(error) throw error;
    STATE.session = data.session;
  }catch(err){
    console.warn('getSession a échoué/timeout', err);
    setLoadingStatus('Erreur session : ' + (err?.message || err));
    STATE.session = null;
  }
  if(STATE.session){
    setLoadingStatus('Chargement du profil…');
    try{
      const { data: profile, error } = await withTimeout(
        supabase.from('profiles').select('*').eq('id', STATE.session.user.id).maybeSingle(),
        5000, 'profil'
      );
      if(error) throw error;
      STATE.profile = profile;
      // Charger les équipes du coach + statut superviseur
      if(profile?.role === 'coach'){
        const { data: myTeams } = await supabase.from('coach_teams')
          .select('team_id, superviseur, statut, teams(nom)')
          .eq('profile_id', profile.id);
        STATE.coachTeams = myTeams || [];
        // superviseur = true si superviseur dans au moins une équipe
        STATE.profile.superviseur = (myTeams||[]).some(t=>t.superviseur);
        // team_id = première équipe active (compatibilité)
        const firstTeam = (myTeams||[]).find(t=>t.statut==='actif');
        if(firstTeam) STATE.profile.team_id = firstTeam.team_id;
      }
    }catch(err){
      console.warn('chargement du profil a échoué/timeout', err);
      setLoadingStatus('Erreur profil : ' + (err?.message || err));
      STATE.profile = null;
    }
  } else {
    STATE.profile = null;
  }
  setLoadingStatus('Affichage…');
  router();
}
function router(){
  const hash = location.hash || '#/';
  if(liveChannel && !location.hash.startsWith('#/match/')){ supabase.removeChannel(liveChannel); liveChannel=null; }

  // Accès public par code joueur (aucun compte requis)
  let mCode;
  if((mCode = hash.match(/^#\/j\/(.+)$/))) return viewPlayerCode(mCode[1].toUpperCase());

  let mTour, mMatch;

  // Routes publiques — accessibles sans compte
  if((mMatch = hash.match(/^#\/match\/(.+)$/))) return viewMatchPublic(mMatch[1]);
  if((mMatch = hash.match(/^#\/j\/(.+)$/))) return viewPlayerCode(mMatch[1]);

  if(!STATE.session){
    if(hash === '#/coach-login') return viewAuth();
    return viewLanding();
  }
  if(!STATE.profile){ shell(`<div class="empty">Profil introuvable. Reconnecte-toi.</div><button class="btn secondary" onclick="logout()">Déconnexion</button>`); return; }

  if(STATE.profile.must_change_password) return viewChangePassword();

  const role = STATE.profile.role;

  // Un coach doit appartenir à une équipe avant d'accéder au reste de l'app
  if(role === 'coach' && !STATE.profile.team_id && hash !== '#/profil'){
    // Coach sans équipe : afficher message d'attente au lieu de rediriger vers création
    shell(`
      <div class="empty-state" style="padding:48px 24px">
        <div class="icon">⏳</div>
        <p>Tu n'es encore affecté à aucune équipe.<br>L'administrateur va t'assigner à une équipe.</p>
        <button class="btn secondary" style="margin-top:16px" onclick="navigate('#/profil')">👤 Mon profil</button>
      </div>
    `);
    return;
  }
  // Un coach adjoint qui vient de rejoindre une équipe attend la validation du coach principal
  if(role === 'coach' && STATE.profile.team_id && STATE.profile.statut === 'en_attente' && hash !== '#/profil'){
    return viewWaitingValidation();
  }

  if(hash === '#/' || hash === '#/login' || hash === '#/coach-login'){
    navigate((role==='coach'||role==='admin') ? '#/coach' : '#/suivi'); return;
  }
  if(hash === '#/profil') return viewProfil();
  if(hash === '#/equipe') return viewTeamSetup();
  if(hash === '#/coach') return role==='admin' ? viewAdminHome() : viewCoachHome();
  if(hash === '#/mon-equipe') return STATE.profile.team_id ? viewCoachHome() : (navigate('#/coach'), undefined);
  if(hash === '#/coach/planning') return STATE.profile.team_id ? viewMyPlanning() : (navigate('#/coach'), undefined);
  if(hash === '#/admin/utilisateurs') return role==='admin' ? viewAdminUsers() : (navigate('#/coach'), undefined);
  if(hash === '#/suivi') return viewSuivi();
  if((mTour = hash.match(/^#\/planning\/tournee\/(.+)$/))) return viewTourneePlanning(mTour[1], 0);
  if((mTour = hash.match(/^#\/personnes\/(.+)$/))) return viewPersonnes(mTour[1]);
  if((mTour = hash.match(/^#\/coach\/tournee\/(.+)$/))) return viewCoachTournee(mTour[1]);
  if((mTour = hash.match(/^#\/coach\/tournoi\/(.+)$/))) return viewCoachTournament(mTour[1]);
  if((mMatch = hash.match(/^#\/coach\/match\/(.+)$/))) return viewCoachMatch(mMatch[1]);
  navigate((role==='coach'||role==='admin') ? '#/coach' : '#/suivi');
}
window.navigate = navigate;
window.addEventListener('hashchange', router);

supabase.auth.onAuthStateChange((_event, session) => {
  STATE.session = session;
  if(!session){ STATE.profile=null; navigate('#/'); router(); }
});

loadSession().catch(showFatalError);

// PWA : service worker
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
